name: Team 1 E2E — Docker Build Verification (Shift-Left Gate)

# ----------------------------------------------------------------------
# 목적 (Shift-Left CI gate):
#   PR #11 → #17 → #18 cascade 에서 발견된 5-layer 갭 (Dockerfile build
#   context 위반, Flutter SDK pin drift, intl pin 불일치, --web-renderer
#   폐기, --obfuscate web 미지원) 을 사람 눈 (또는 한밤 디버깅) 이 아닌
#   pre-merge CI 단계에서 즉시 검출한다.
#
# 트리거:
#   PR 이 lobby-web / cc-web 빌드에 영향을 주는 파일을 건드릴 때만.
#   (path filter — Flutter 빌드는 무거우므로 무관 PR 에는 비활성)
#
# 동작:
#   1. checkout
#   2. docker buildx setup + GitHub Actions cache backend
#   3. docker compose --profile web build lobby-web (Type A 갭 차단)
#   4. docker compose --profile web build cc-web    (cc-web Dockerfile 호환 검증)
#   5. 빌드된 image 의 healthcheck endpoint static probe (선택적)
#
# 차단 시나리오:
#   - team1-frontend/docker/lobby-web/Dockerfile 의 COPY paths 가 build
#     context 외부 경로 참조 → "not found" build error → CI Exit 1
#   - team1-frontend/pubspec.yaml 의존성 ↔ Flutter SDK pin 충돌 → pub get
#     error → CI Exit 1
#   - flutter build web 의 deprecated flag 사용 → "Could not find an option
#     named X" → CI Exit 1
# ----------------------------------------------------------------------

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'team1-frontend/**'
      - 'team4-cc/**'
      - 'shared/ebs_common/**'
      - 'docker-compose.yml'
      - '.github/workflows/team1-e2e.yml'
  workflow_dispatch:

# 같은 PR head 에 새 commit 이 push 되면 이전 run 취소 (queue 정리)
concurrency:
  group: team1-e2e-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write   # 실패 시 comment 용

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # Static Dockerfile lint (~5초). docker-build-gate 보다 먼저 실행하여
  # build context 위반을 fast-fail. 본 lint 의 존재 이유:
  #
  #   PR #21 (chaos test) 결과: Linux BuildKit 은 `COPY ../shared/...` 의
  #   `..` 를 silently normalize 하여 Type A 회귀를 detect 못 함.
  #   (로컬 Windows BuildKit 은 reject 하지만 GitHub Actions 는 silent pass)
  #
  # → BuildKit 과 독립적인 grep-based static check 로 OS-bound blind spot 보강.
  # → 5분 Flutter 빌드를 spin-up 하기 전에 1초 만에 fail. CI 비용 절감.
  # ──────────────────────────────────────────────────────────────────────
  dockerfile-lint:
    name: Dockerfile Static Lint (Type A guard)
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Forbid context boundary violation (COPY with ..)
        run: |
          set -e
          violations=0
          for df in \
            team1-frontend/docker/lobby-web/Dockerfile \
            team4-cc/docker/cc-web/Dockerfile
          do
            if [ ! -f "$df" ]; then
              echo "::warning::skip $df (file not found)"
              continue
            fi
            # Lint rule: COPY src 가 `../` 를 포함 (단, --from=stage 는 host context
            # 를 가리키지 않으므로 면제). grep 3-pipe 로 가독성 + 명확성 확보.
            if matches=$(grep -nE '^\s*COPY\b' "$df" \
                          | grep -v -- '--from' \
                          | grep -E '\.\./'); then
              echo "::error file=$df::Type A regression — COPY with .. (build context boundary violation)"
              echo "  $df:"
              echo "$matches" | sed 's/^/    /'
              violations=$((violations + 1))
            fi
          done

          if [ $violations -gt 0 ]; then
            cat <<'EOF'
          ::error::Type A regression detected — abort before docker build.

          📖 배경: Linux BuildKit 은 `COPY ../...` 의 `..` 를 silently
          normalize 하여 의도된 build context 외부 참조를 통과시킵니다.
          이는 로컬 Windows BuildKit 과 다른 동작입니다 (PR #21 chaos test 검증).

          🛠️ 해결:
            (1) docker-compose.yml 의 `build.context` 를 monorepo root (`.`) 로 승격
            (2) Dockerfile 의 모든 COPY 경로를 root-relative 로 변경
                예) `COPY ../shared/ebs_common ...` → `COPY shared/ebs_common ...`
                예) `COPY pubspec.yaml ./` → `COPY team1-frontend/pubspec.yaml ./`
            (3) compose 의 build.dockerfile 도 `team1-frontend/docker/lobby-web/Dockerfile` 등 root-relative

          참고: `P0_REMEDIATION_HANDOFF.md` (PR #17) 의 build context promotion 사례.
          EOF
            exit 1
          fi

          echo "✓ Dockerfile lint passed — no context boundary violations."

  # ──────────────────────────────────────────────────────────────────────
  # Hadolint — community Dockerfile best-practice linter.
  # 2026-04-28 (PR #25, P3 hardening) 도입.
  #
  # 본 lint 의 보완 관계:
  #   - dockerfile-lint (custom, 우리 lint): Type A / context boundary 차단
  #     → Linux BuildKit blind spot 보강 (PR #21 chaos test 발견)
  #   - hadolint (community): style + best-practice (DL3025 exec form, DL3045 절대경로 등)
  #     → 우리가 미처 cover 못 한 Dockerfile 패턴 검사
  #
  # 두 lint 는 병렬 실행 (independent jobs, 둘 다 docker-build-gate 의 needs 에 포함).
  # 보수적 ignore: DL3008/3018 (apt/apk 버전 pin — dev 베이스에 과한 요구),
  #                DL3059 (consecutive RUN — 가독성 trade-off, info 등급).
  # ──────────────────────────────────────────────────────────────────────
  hadolint:
    name: Hadolint Dockerfile Lint (best-practice)
    runs-on: ubuntu-latest
    timeout-minutes: 2

    strategy:
      fail-fast: false  # 한 Dockerfile fail 해도 나머지 결과 모두 출력 — 디버깅 비용 절감
      matrix:
        dockerfile:
          - team1-frontend/docker/lobby-web/Dockerfile
          - team4-cc/docker/cc-web/Dockerfile
          - team3-engine/ebs_game_engine/Dockerfile

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Hadolint — ${{ matrix.dockerfile }}
        # action 버전 pin (auto-bump PR 시 dependabot 이 새 PR 생성 → 본 CI gate 검증)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ matrix.dockerfile }}
          ignore: DL3008,DL3018,DL3059
          no-fail: false
          format: tty

  # ──────────────────────────────────────────────────────────────────────
  # Heavy gate: docker compose build (5-layer cascade 회귀 차단).
  # dockerfile-lint + hadolint 둘 다 통과 후에만 실행 → 1초 fail 가능한 케이스를
  # 5분 build 까지 가지 않게 함 (CI minutes 절감).
  # ──────────────────────────────────────────────────────────────────────
  docker-build-gate:
    name: Docker Compose Build Verification
    needs: [dockerfile-lint, hadolint]
    runs-on: ubuntu-latest
    timeout-minutes: 45  # Flutter 첫 빌드 ~10 min × 2 service = ~20 min, 여유 포함

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ───────────────────────────────────────────────────────────────
      # Buildx + GHA cache (build 시간 단축)
      # ───────────────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Expose GHA cache vars to compose
        # docker compose build 가 cache_from / cache_to 를 사용하지 않으므로
        # buildx 글로벌 driver-opt 로 GHA cache 활성화
        run: |
          echo "ACTIONS_CACHE_URL=$ACTIONS_CACHE_URL" >> "$GITHUB_ENV"
          echo "ACTIONS_RUNTIME_TOKEN=$ACTIONS_RUNTIME_TOKEN" >> "$GITHUB_ENV"

      # ───────────────────────────────────────────────────────────────
      # PRIMARY GATE: lobby-web build (P0 #2 회귀 차단)
      # ───────────────────────────────────────────────────────────────
      - name: Build lobby-web (Type A gate)
        env:
          DOCKER_BUILDKIT: "1"
          COMPOSE_DOCKER_CLI_BUILD: "1"
        run: |
          set -e
          echo "::group::lobby-web build"
          docker compose --profile web build lobby-web
          echo "::endgroup::"

          # 빌드 산출물 sanity check — Dockerfile 이 의도된 image 를 produce 했는지
          docker image inspect ebs/lobby-web:latest \
            --format '{{.Id}} {{.Config.ExposedPorts}} {{len .RootFS.Layers}}'

      # ───────────────────────────────────────────────────────────────
      # SECONDARY GATE: cc-web build (team4 Dockerfile 호환 검증)
      # ───────────────────────────────────────────────────────────────
      - name: Build cc-web (team4 cascade gate)
        env:
          DOCKER_BUILDKIT: "1"
          COMPOSE_DOCKER_CLI_BUILD: "1"
        run: |
          set -e
          echo "::group::cc-web build"
          docker compose --profile web build cc-web
          echo "::endgroup::"

          docker image inspect ebs/cc-web:latest \
            --format '{{.Id}} {{.Config.ExposedPorts}} {{len .RootFS.Layers}}'

      # ───────────────────────────────────────────────────────────────
      # Smoke probe — built nginx 안의 /healthz endpoint static 확인
      # ───────────────────────────────────────────────────────────────
      - name: Smoke probe — lobby-web nginx config
        run: |
          set -e
          # 빌드된 image 안의 nginx.conf 가 listen 3000 + /healthz 를 갖는지 확인
          docker run --rm --entrypoint sh ebs/lobby-web:latest -c "
            grep -q 'listen *3000' /etc/nginx/conf.d/default.conf
            grep -q '/healthz' /etc/nginx/conf.d/default.conf
            ls /usr/share/nginx/html/flutter_bootstrap.js >/dev/null
          "
          echo "lobby-web nginx config OK"

      - name: Smoke probe — cc-web nginx config
        run: |
          set -e
          docker run --rm --entrypoint sh ebs/cc-web:latest -c "
            grep -q 'listen *3001' /etc/nginx/conf.d/default.conf
            grep -q '/healthz' /etc/nginx/conf.d/default.conf
            ls /usr/share/nginx/html/flutter_bootstrap.js >/dev/null
          "
          echo "cc-web nginx config OK"

      # ───────────────────────────────────────────────────────────────
      # 실패 시 PR 코멘트 (cascade 갭 cheat-sheet)
      # ───────────────────────────────────────────────────────────────
      - name: Comment on failure
        if: failure() && github.event.pull_request != null
        uses: actions/github-script@v9
        with:
          script: |
            const body = [
              '❌ **Team 1 Docker Build Gate failed**',
              '',
              '`docker compose --profile web build lobby-web cc-web` 가 PR head 에서 실패했습니다.',
              '',
              '### 빈번한 cascade 갭 cheat-sheet (PR #17/#18 history 참조)',
              '',
              '| Layer | 증상 (build log) | 가능 원인 / 1차 점검 |',
              '|:-----:|------------------|---------------------|',
              '| L1 | `Type A regression — COPY with ..` (dockerfile-lint job) 또는 `COPY ../shared: not found` (build job) | docker-compose.yml `build.context` 가 `.` 이고 Dockerfile COPY paths 에 `team1-frontend/` prefix 가 있는지. **Linux BuildKit 은 `..` silently pass 하므로 dockerfile-lint job 결과를 우선 신뢰**. |',
              '| L2 | `Because ebs_lobby depends on intl ^X.Y` | pubspec.yaml `intl` pin 과 Flutter SDK 의 flutter_localizations pin 일치 여부 |',
              '| L3 | `requires SDK version >=X.Y` | Dockerfile `FROM ghcr.io/cirruslabs/flutter:3.41.7` 와 dev_dependencies 의 dart sdk 요구 일치 |',
              '| L4 | `Could not find an option named "--web-renderer"` | `--web-renderer=html` flag 폐기. 빌드 명령에서 제거 |',
              '| L5 | `Could not find an option named "--obfuscate"` | flutter build web 은 `--obfuscate` 미지원. flag 제거 + `mkdir -p build/debug-info` 로 runtime COPY 호환 |',
              '',
              '자세한 사후 분석: `P0_REMEDIATION_HANDOFF.md` (PR #17), `P1_FOLLOWUP_HANDOFF.md` (PR #18).',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
