name: Chat Server E2E — Playwright UI + Docker (B-222 L2)

# ----------------------------------------------------------------------
# 목적 (B-222 L2 자동 회귀 방어):
#   chat-server (FastAPI + SSE) + broker (host Python) 통합 동작을 PR 마다
#   자동 검증. Plan §L2 (Playwright + CI 통합).
#
# 트리거:
#   chat-server / broker / Playwright spec 영향 PR.
#
# 동작:
#   1. checkout
#   2. Python setup + 의존성 (broker + chat-server)
#   3. broker host detach 가동 (0.0.0.0:7383)
#   4. chat-server Docker compose up + healthcheck
#   5. Playwright run (b222-chat-ui.spec.ts) — 6 시나리오
#   6. teardown
# ----------------------------------------------------------------------

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'tools/chat_server/**'
      - 'tools/orchestrator/message_bus/**'
      - 'integration-tests/playwright/tests/b222-chat-ui.spec.ts'
      - '.github/workflows/chat-server-e2e.yml'
  workflow_dispatch:

concurrency:
  group: chat-server-e2e-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Fast-fail unit tests (broker ACL + chat-server endpoints)
  # ──────────────────────────────────────────────────────────────────
  unit-tests:
    name: chat-server + broker unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install chat-server + test deps
        run: |
          pip install -r tools/chat_server/requirements.txt
          pip install aiosqlite pyyaml

      - name: Run broker ACL tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest tools/orchestrator/message_bus/tests/test_topics_chat_acl.py -v

      - name: Run chat-server unit + integration mock tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest tools/chat_server/tests/ -v -m "not integration and not load and not resilience"

  # ──────────────────────────────────────────────────────────────────
  # E2E — broker (host) + chat-server (docker) + Playwright
  # ──────────────────────────────────────────────────────────────────
  e2e:
    name: Playwright E2E (6 scenarios)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: unit-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install broker deps
        run: |
          pip install -r tools/chat_server/requirements.txt
          pip install aiosqlite pyyaml

      - name: Boot broker (0.0.0.0:7383)
        run: |
          python tools/orchestrator/start_message_bus.py --detach
          sleep 3
          python tools/orchestrator/start_message_bus.py --probe

      - name: Build + start chat-server container
        run: |
          docker compose -f tools/chat_server/docker-compose.yml up -d --build
          # wait for healthcheck (max 30s)
          for i in $(seq 1 30); do
            status=$(docker inspect --format='{{.State.Health.Status}}' ebs-chat-server 2>/dev/null || echo "starting")
            if [ "$status" = "healthy" ]; then
              echo "chat-server healthy after ${i}s"
              break
            fi
            sleep 1
          done
          curl -fsS http://localhost:7390/health | python -m json.tool

      - name: Setup Node + Playwright
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: integration-tests/playwright/package-lock.json

      - name: Install Playwright deps
        working-directory: integration-tests/playwright
        run: |
          npm ci || npm install
          npx playwright install --with-deps chromium

      - name: Run Playwright (b222-chat-ui)
        working-directory: integration-tests/playwright
        run: npx playwright test tests/b222-chat-ui.spec.ts --reporter=list

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: integration-tests/playwright/playwright-report/
          retention-days: 7

      - name: Teardown chat-server
        if: always()
        run: docker compose -f tools/chat_server/docker-compose.yml down -v

      - name: Stop broker
        if: always()
        run: python tools/orchestrator/stop_message_bus.py || true
