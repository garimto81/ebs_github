name: dependency_check
on:
  pull_request:
    branches: [main]

jobs:
  verify-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Detect Stream
        id: detect
        run: |
          BRANCH="${{ github.head_ref }}"
          STREAM=$(echo "$BRANCH" | grep -oP 'work/\K(s\d+)' | tr '[:lower:]' '[:upper:]')
          echo "stream=${STREAM:-NONE}" >> $GITHUB_OUTPUT

      - name: Setup Python
        if: steps.detect.outputs.stream != 'NONE'
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install deps
        if: steps.detect.outputs.stream != 'NONE'
        run: pip install pyyaml

      - name: Check blocked_by streams merged
        if: steps.detect.outputs.stream != 'NONE'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STREAM: ${{ steps.detect.outputs.stream }}
        run: |
          python <<'PYEOF'
          import json
          import os
          import subprocess
          import sys
          import yaml

          stream = os.environ['STREAM']
          with open('docs/4. Operations/team_assignment_v10_3.yaml') as f:
              config = yaml.safe_load(f)

          stream_config = config['streams'].get(stream, {})
          blocked_by = stream_config.get('blocked_by', [])

          if not blocked_by:
              print(f"✓ {stream} has no upstream dependencies")
              sys.exit(0)

          violations = []
          for upstream in blocked_by:
              result = subprocess.run([
                  'gh', 'pr', 'list',
                  '--label', f'stream:{upstream}',
                  '--state', 'all',
                  '--limit', '5',
                  '--json', 'state,number'
              ], capture_output=True, text=True)
              prs = json.loads(result.stdout) if result.stdout else []
              merged = [p for p in prs if p['state'] == 'MERGED']
              if not merged:
                  violations.append(upstream)

          if violations:
              print(f"::error::{stream} blocked by unmerged upstream(s): {', '.join(violations)}")
              sys.exit(1)
          print(f"✓ All upstream Streams merged: {', '.join(blocked_by)}")
          PYEOF
