name: "[DISABLED V10] PR Auto-Merge (replaced by pr-sweep.yml)"

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "수동 발동 사유 (V10 비활성. pr-sweep.yml 사용 권장)"
        required: true
        type: string

permissions:
  contents: read
  pull-requests: read

jobs:
  notify-disabled:
    runs-on: ubuntu-latest
    steps:
      - name: Announce V10 deactivation
        run: |
          echo "::notice::V10 (2026-05-04) 으로 비활성. pr-sweep.yml 이 자율 처리."
          echo "::notice::사유: ${{ inputs.reason }}"
          exit 0
