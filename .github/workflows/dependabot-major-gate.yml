name: Dependabot — Semver Major Annotator (V10 advisory only)

# ──────────────────────────────────────────────────────────────────────────
# 2026-05-04 V10 — semver-major 차단 정책 폐기. CI gate 가 최종 판단자.
#
# V9 정책 (폐기):
#   semver-major → auto-merge 라벨 제거 + needs-manual-review 부착 + 사람 review 요구.
#   문제: 사용자 결정 떠넘김 (governance 위반). PR 적체 원인.
#
# V10 정책 (현재):
#   - dependabot semver-major 인지 → 라벨 정보로만 부착 (advisory)
#   - auto-merge 라벨 제거 안 함 — pr_sweep.py 가 CI 결과로 자율 판정
#   - CI 통과 시: pr_sweep 자동 머지
#   - CI 실패 시: pr_sweep 자동 close + 백로그 (보수적 default)
#   - 사용자 review 단계 없음
#
# 라벨:
#   `semver-major` — 정보 라벨 (필터/리포팅용)
#   `needs-manual-review` — 더 이상 부착 안 함 (deprecated)
#
# 보안:
#   pull_request_target + dependabot[bot] 가드. PR HEAD 코드 미실행.
# ──────────────────────────────────────────────────────────────────────────

on:
  pull_request_target:
    types: [opened, reopened, synchronize, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: dependabot-major-annotator-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  annotate:
    name: Annotate semver-major (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    if: github.actor == 'dependabot[bot]'

    steps:
      - name: Fetch dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply semver-major label (advisory only)
        if: steps.meta.outputs.update-type == 'version-update:semver-major'
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const labels = (pr.labels || []).map(l => l.name);

            // V10: advisory label only — do NOT remove auto-merge,
            // do NOT add needs-manual-review (deprecated).
            const toAdd = [];
            if (!labels.includes('semver-major')) toAdd.push('semver-major');

            if (toAdd.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: toAdd,
              });
              core.notice(`PR #${pr.number} annotated as semver-major (advisory).`);
            }

            // Cleanup deprecated needs-manual-review label
            if (labels.includes('needs-manual-review')) {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  name: 'needs-manual-review',
                });
                core.info(`Removed deprecated label 'needs-manual-review' from PR #${pr.number}`);
              } catch (e) {
                // ignore — label might not exist
              }
            }

            core.notice(
              `[V10 policy] CI gate is the final arbiter. ` +
              `pr_sweep.py will merge if CI green, close if CI fail.`
            );
