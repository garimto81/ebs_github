# EBS LAN Reverse Proxy — single nginx :80 entry, subdomain-based routing
#
# 2026-04-29 (PR #69, LAN domain deployment).
#
# 도메인 매핑 (모든 LAN 클라이언트 hosts file 또는 라우터 DNS 등록):
#   <HOST_LAN_IP> ebs.local lobby.ebs.local cc.ebs.local api.ebs.local engine.ebs.local
#
# 클라이언트 접근:
#   http://lobby.ebs.local/   →  team1 lobby (Flutter Web)
#   http://cc.ebs.local/      →  team4 command center (Flutter Web)
#   http://api.ebs.local/     →  team2 BO (FastAPI REST + WebSocket)
#   http://engine.ebs.local/  →  team3 game engine harness
#   http://ebs.local/         →  default → lobby (편의)
#
# WebSocket: api.ebs.local 의 /ws/* 는 자동 Upgrade 헤더 전달.

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format ebs '$remote_addr - $host [$time_local] "$request" '
                 '$status $body_bytes_sent "$http_referer" '
                 '"$http_user_agent" rt=$request_time';
  access_log /var/log/nginx/access.log ebs;
  error_log  /var/log/nginx/error.log warn;

  sendfile on;
  tcp_nopush on;
  keepalive_timeout 75s;

  # WebSocket upgrade map (Connection 헤더 자동 처리)
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  # ── Upstreams (Docker compose service names — ebs-net 내부) ──
  upstream lobby_upstream  { server lobby-web:3000; }
  upstream cc_upstream     { server cc-web:3001; }
  upstream bo_upstream     { server bo:8000; }
  upstream engine_upstream { server engine:8080; }

  # ── lobby.ebs.local + ebs.local (default) ──
  server {
    listen 80;
    server_name lobby.ebs.local ebs.local _;

    location = /healthz {
      access_log off;
      add_header Content-Type text/plain;
      return 200 "ok\n";
    }

    location / {
      proxy_pass http://lobby_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 60s;
    }
  }

  # ── cc.ebs.local ──
  server {
    listen 80;
    server_name cc.ebs.local;

    location = /healthz {
      access_log off;
      add_header Content-Type text/plain;
      return 200 "ok\n";
    }

    location / {
      proxy_pass http://cc_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 60s;
    }
  }

  # ── api.ebs.local — REST + WebSocket ──
  server {
    listen 80;
    server_name api.ebs.local;

    # CORS preflight (bo CORS_ORIGINS=["*"] default 와 함께 동작)
    location = /healthz {
      access_log off;
      return 200 "ok\n";
    }

    # WebSocket — /ws/* 는 Upgrade 헤더 강제 적용
    location /ws/ {
      proxy_pass http://bo_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_read_timeout 3600s;  # WS long-lived
      proxy_send_timeout 3600s;
    }

    # REST API + 기타
    location / {
      proxy_pass http://bo_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }
  }

  # ── engine.ebs.local ──
  server {
    listen 80;
    server_name engine.ebs.local;

    location = /healthz {
      access_log off;
      return 200 "ok\n";
    }

    location / {
      proxy_pass http://engine_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }
  }
}
