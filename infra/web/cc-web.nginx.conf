# EBS cc-web nginx config — runtime bind-mount override (S11 Cycle 9, 2026-05-12).
#
# 목적
#   team4-cc/docker/cc-web/nginx.conf 가 /api 와 /ws/ proxy 라우트를 누락하여 Command Center
#   Web -> BO REST/WebSocket 호출이 404/405 로 실패. 본 파일은 docker-compose.yml 의
#   bind-mount (./infra/web/cc-web.nginx.conf:/etc/nginx/conf.d/default.conf:ro) 로
#   image 내 stale config 를 runtime 에서 덮어쓴다.
#
# 책임
#   1. Flutter Web (Command Center) 정적 서빙 (port 3001, Lobby :3000 와 별개 컨테이너)
#   2. /api/  -> bo:8000/api/  reverse proxy
#   3. /ws/   -> bo:8000/ws/   WebSocket upgrade (CC monitoring + dealer events)
#   4. /engine/ -> engine:8080/ reverse proxy (옵션 — CC 가 engine 직접 호출 시)
#   5. SPA fallback + /healthz
#
# 향후 cleanup (S3 owner)
#   team4-cc/docker/cc-web/nginx.conf 를 본 파일과 동기화하면 bind-mount 제거 가능.
#   S11 Cycle 9 PR (issue #355) 의 협력 메모 참조.

server {
    listen       3001 default_server;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript
               application/json application/wasm image/svg+xml font/woff2;

    # Healthcheck
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Cache: hashed assets + .riv (Rive animation) 1년 immutable
    location ~* \.(?:js|css|woff2?|ttf|otf|svg|png|jpg|jpeg|webp|ico|map|wasm|riv)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # REST API reverse proxy
    location /api/ {
        proxy_pass http://bo:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # WebSocket reverse proxy
    location /ws/ {
        proxy_pass http://bo:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 10s;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Engine direct call (옵션 — CC 가 /engine/health 등 직접 호출 시)
    # SG-002 Engine_Dependency_Contract: CC 는 ENGINE_URL env 로 직접 접근하므로
    # 본 location 은 fallback 으로만 사용. 기본 트래픽은 ENGINE_URL=http://engine:8080.
    location /engine/ {
        proxy_pass http://engine:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 보안 헤더
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
