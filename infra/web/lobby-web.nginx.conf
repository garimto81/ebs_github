# EBS lobby-web nginx config — runtime bind-mount override (S11 Cycle 9, 2026-05-12).
#
# 목적
#   team1-frontend/docker/lobby-web/nginx.conf (Phase 5 stale) 가 /api 와 /ws/ proxy 라우트를
#   누락하여 lobby Web -> BO REST/WebSocket 호출이 404/405 로 실패. 본 파일은 docker-compose.yml
#   의 bind-mount (./infra/web/lobby-web.nginx.conf:/etc/nginx/conf.d/default.conf:ro) 로
#   image 내 stale config 를 runtime 에서 덮어쓴다.
#
# 책임
#   1. Flutter Web SPA 정적 서빙 (/usr/share/nginx/html, build_runner 산출물)
#   2. /api/  -> bo:8000/api/  reverse proxy (ebs-net 내부 service name 사용)
#   3. /ws/   -> bo:8000/ws/   WebSocket upgrade
#   4. SPA fallback (go_router path-routing)
#   5. /healthz endpoint (Docker HEALTHCHECK + compose 의존성 게이트)
#
# 브라우저 모델
#   클라이언트 (PC/모바일) 는 동일 origin (http://<lan-ip>:3000/) 으로 모든 요청 발생.
#   /api/* 와 /ws/* 는 nginx 가 reverse proxy 로 BO 컨테이너 (bo:8000) 와 통신.
#   .'. CORS preflight 미발생 -> BO 의 CORS_ORIGINS=["*"] dev 기본값 의존도 감소.
#
# 향후 cleanup (S2 owner)
#   team1-frontend/docker/lobby-web/nginx.conf 를 본 파일과 동기화하면 bind-mount 제거 가능.
#   S11 Cycle 9 PR (issue #355) 의 협력 메모 참조.

server {
    listen       3000 default_server;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # gzip 압축 (Flutter Web main.dart.js 크기 큼)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript
               application/json application/wasm image/svg+xml font/woff2;

    # Healthcheck — Docker HEALTHCHECK (curl /healthz) + compose depends_on healthy 게이트
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Cache: hashed assets - 1년 immutable (Flutter web build hash 포함)
    location ~* \.(?:js|css|woff2?|ttf|otf|svg|png|jpg|jpeg|webp|ico|map|wasm|riv)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html — 항상 신선 (배포 직후 즉시 반영)
    location = /index.html {
        add_header Cache-Control "no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # REST API reverse proxy — 동일 origin /api/* -> bo:8000/api/* (ebs-net 내부)
    # BO container 가 service_healthy 일 때만 lobby-web 기동되므로 cold-start 안전
    location /api/ {
        proxy_pass http://bo:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # WebSocket reverse proxy — /ws/* -> bo:8000/ws/* (Lobby + CC monitoring channels)
    # Upgrade 헤더 강제 + 장시간 연결 유지 (idle disconnect 방지)
    location /ws/ {
        proxy_pass http://bo:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 10s;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # SPA fallback — go_router path-routing 지원
    # /api/ 와 /ws/ 는 위 location 블록이 우선 매칭되므로 본 fallback 도달 안 함
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 보안 헤더
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # 민감 파일 보호
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
