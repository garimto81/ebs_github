<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0f1923; font-family: 'Segoe UI','Noto Sans KR',sans-serif; padding: 36px 48px; width: 1200px; color: #e0e0e0; }
h2 { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 24px; }
.compare { display: flex; gap: 80px; justify-content: center; align-items: flex-start; }
.side { text-align: center; }
.side-title { font-size: 14px; font-weight: 700; margin-bottom: 12px; }
.cards { display: flex; gap: 12px; justify-content: center; margin-bottom: 8px; }
.card {
  width: 80px; height: 110px; background: #fff; border-radius: 8px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  font-weight: 700; font-size: 24px; border: 3px solid #e67e22;
}
.card .suit { font-size: 18px; margin-top: -2px; }
.black { color: #1a1a1a; }
.red { color: #e03030; }
.card-back {
  width: 80px; height: 110px; border-radius: 8px; border: 3px solid #2a3a4a;
  background: repeating-linear-gradient(45deg, #1a2a3a, #1a2a3a 4px, #162030 4px, #162030 8px);
}
.caption { font-size: 12px; color: #667788; margin-top: 8px; }
.arrow { font-size: 36px; color: #445566; align-self: center; margin-top: 30px; }
</style>
</head>
<body>
<h2>"나만 보는 카드" — 플레이어 시점 vs 상대 시점</h2>
<div class="compare">
  <div class="side">
    <div class="side-title" style="color:#e67e22;">플레이어 시점</div>
    <div class="cards">
      <div class="card black"><span>A</span><span class="suit">♠</span></div>
      <div class="card red"><span>K</span><span class="suit">♥</span></div>
    </div>
    <div class="caption">"나는 볼 수 있다"</div>
  </div>
  <div class="arrow">→</div>
  <div class="side">
    <div class="side-title" style="color:#556677;">상대 시점</div>
    <div class="cards">
      <div class="card-back"></div>
      <div class="card-back"></div>
    </div>
    <div class="caption">"상대는 볼 수 없다"</div>
  </div>
</div>
<div style="text-align:center; margin-top:20px; font-size:13px; color:#e67e22;">같은 카드인데 보는 사람에 따라 다르다. 이것이 포커의 핵심!</div>
</body>
</html>
