<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0f1923; font-family: 'Segoe UI','Noto Sans KR',sans-serif; padding: 24px 32px; width: 1200px; color: #e0e0e0; }
.frame {
  display: inline-block; background: #141e2a; border: 1px solid #2a3a4a;
  border-radius: 12px; padding: 16px; text-align: center;
}
.frame img { max-height: 280px; border-radius: 6px; border: 1px solid #2a3a4a; }
.caption { font-size: 13px; color: #c0d0e0; font-weight: 600; margin-top: 12px; }
.source { font-size: 10px; color: #445566; margin-top: 4px; }
</style>
</head>
<body>
<div class="frame">
  <img src="../../../images/web/bnc-connector.jpg" alt="BNC Connector">
  <div class="caption">BNC 커넥터 — SDI 케이블의 연결 단자. 방송 장비 표준.</div>
  <div class="source">출처: Wikimedia Commons (CC)</div>
</div>
</body>
</html>
