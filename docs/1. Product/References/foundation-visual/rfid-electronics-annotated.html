<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0f1923; font-family: 'Segoe UI','Noto Sans KR',sans-serif; padding: 24px 32px; width: 1200px; color: #e0e0e0; }
h2 { font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 4px; }
.sub { font-size: 12px; color: #667788; margin-bottom: 16px; }
.img-container { position: relative; display: inline-block; }
.img-container img { height: 700px; border-radius: 8px; border: 1px solid #2a3a4a; }
.label {
  position: absolute; font-size: 11px; font-weight: 700; padding: 3px 10px;
  border-radius: 4px; white-space: nowrap;
}
.l-orange { background: rgba(230,126,34,0.9); color: #fff; }
.l-green { background: rgba(46,139,87,0.9); color: #fff; }
.l-blue { background: rgba(60,120,200,0.85); color: #fff; }
.l-purple { background: rgba(160,80,200,0.85); color: #fff; }
</style>
</head>
<body>
<h2>RFID 안테나 실물 — PCB 코일과 배선</h2>
<div class="sub">테이블 밑면에서 본 모습. 녹색 PCB가 안테나 코일이다.</div>
<div class="img-container">
  <img src="../../../images/prd/rfid-vpt-installed-electronics.png" alt="RFID installed electronics">
  <!-- Player 안테나 (좌상, 우상) -->
  <div class="label l-orange" style="top:2%; left:2%;">Player 안테나<br>(홀카드 감지)</div>
  <div class="label l-orange" style="top:2%; right:22%;">Player 안테나<br>(홀카드 감지)</div>
  <!-- Community (중앙 상단) -->
  <div class="label l-green" style="top:22%; left:32%;">Community 안테나<br>(보드 카드)</div>
  <!-- RFID Reader PCB (중앙) -->
  <div class="label l-purple" style="top:38%; left:28%;">RFID Reader PCB<br>ST25R3911B + ESP32</div>
  <!-- 배선 -->
  <div class="label l-blue" style="top:55%; left:2%;">Serial 배선<br>(폐쇄 네트워크)</div>
  <!-- Burn 안테나 (하단) -->
  <div class="label l-green" style="bottom:18%; left:32%;">Burn 안테나<br>(번 카드 감지)</div>
</div>
</body>
</html>
