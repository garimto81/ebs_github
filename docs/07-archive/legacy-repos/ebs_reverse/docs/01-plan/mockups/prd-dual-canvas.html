<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=720">
    <title>Dual Canvas Architecture</title>
    <style>
* {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #fff;
            color: #000;
            padding: 0;
            margin: 0;
            width: 720px;
        }

        .architecture {
            position: relative;
            width: 100%;
            height: 500px;
            padding: 16px;
        }

        /* GFX Server Node */
        .gfx-server {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            width: 148px;
            height: 48px;
            background: #222;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.5px;
            border: 2px solid #000;
        }

        /* Canvas Nodes */
        .canvas {
            position: absolute;
            width: 200px;
            height: 160px;
            background: #fff;
            border: 2px solid #333;
            padding: 14px;
            top: 140px;
        }

        .canvas-live {
            left: 36px;
            background: #f5f5f5;
        }

        .canvas-delayed {
            right: 36px;
            background: #f5f5f5;
        }

        .canvas-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
        }

        .canvas-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
        }

        .canvas-label {
            font-size: 15px;
            font-weight: 600;
            color: #111;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }

        .canvas-content {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card-display {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .card {
            width: 40px;
            height: 56px;
            border: 2px solid #333;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .card-hidden {
            background: #bbb;
            color: #555;
            font-size: 24px;
        }

        .card-revealed {
            background: #fff;
            color: #000;
            font-size: 16px;
        }

        .equity-bar-container {
            width: 100%;
        }

        .equity-bar {
            width: 100%;
            height: 12px;
            background: #ddd;
            overflow: hidden;
            position: relative;
        }

        .equity-fill {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 65%;
            background: #555;
        }

        .equity-text {
            font-size: 12px;
            text-align: right;
            color: #555;
            margin-top: 4px;
        }

        /* Output Targets */
        .output-target {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            top: 360px;
        }

        .output-live {
            left: 36px;
            width: 220px;
        }

        .output-delayed {
            right: 36px;
            width: 220px;
        }

        .output-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
        }

        .output-label {
            font-size: 14px;
            font-weight: 600;
            color: #111;
            letter-spacing: 0.3px;
        }

        .output-format {
            font-size: 13px;
            font-weight: 500;
            color: #666;
            letter-spacing: 1px;
        }

        /* SVG Connections */
        svg.connections {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .connection-line {
            fill: none;
            stroke: #999;
            stroke-width: 3;
            stroke-linecap: round;
        }

        .connection-live {
            stroke: #666;
        }

        .connection-delayed {
            stroke: #999;
        }

        .arrow-marker {
            fill: #999;
        }

        .arrow-live {
            fill: #666;
        }

        .arrow-delayed {
            fill: #999;
        }
    </style>
</head>
<body>
    <div class="architecture">
        <!-- SVG Layer -->
        <svg class="connections">
            <defs>
                <marker id="arrow-live" markerWidth="10" markerHeight="10"
                        refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
                    <path d="M0,0 L0,6 L9,3 z" class="arrow-live" />
                </marker>
                <marker id="arrow-delayed" markerWidth="10" markerHeight="10"
                        refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
                    <path d="M0,0 L0,6 L9,3 z" class="arrow-delayed" />
                </marker>
            </defs>

            <!-- Y-Split from GFX Server -->
            <path d="M 360 64
                     Q 360 76 360 88
                     Q 360 100 348 112
                     L 136 140"
                  class="connection-line connection-live"
                  marker-end="url(#arrow-live)" />

            <path d="M 360 64
                     Q 360 76 360 88
                     Q 360 100 372 112
                     L 584 140"
                  class="connection-line connection-delayed"
                  marker-end="url(#arrow-delayed)" />

            <!-- Canvas to Output connections -->
            <path d="M 136 300 L 136 360"
                  class="connection-line connection-live"
                  marker-end="url(#arrow-live)" />

            <path d="M 584 300 L 584 360"
                  class="connection-line connection-delayed"
                  marker-end="url(#arrow-delayed)" />
        </svg>

        <!-- GFX Server -->
        <div class="gfx-server">
            GFX Server
        </div>

        <!-- Venue Canvas -->
        <div class="canvas canvas-live">
            <div class="canvas-header">
                <div class="canvas-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2">
                        <rect x="5" y="11" width="14" height="10" rx="2" />
                        <path d="M8 11 V8 A4 4 0 0 1 16 8 V11" stroke-linecap="round" />
                    </svg>
                </div>
                <div class="canvas-label">Venue Canvas</div>
            </div>
            <div class="canvas-content">
                <div class="card-display">
                    <div class="card card-hidden"><span>?</span></div>
                    <div class="card card-hidden"><span>?</span></div>
                </div>
            </div>
        </div>

        <!-- Broadcast Canvas -->
        <div class="canvas canvas-delayed">
            <div class="canvas-header">
                <div class="canvas-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2">
                        <ellipse cx="12" cy="12" rx="9" ry="6" />
                        <circle cx="12" cy="12" r="2.5" fill="#333" />
                    </svg>
                </div>
                <div class="canvas-label">Broadcast Canvas</div>
            </div>
            <div class="canvas-content">
                <div class="card-display">
                    <div class="card card-revealed"><span>A♠</span></div>
                    <div class="card card-revealed"><span>K♥</span></div>
                </div>
                <div class="equity-bar-container">
                    <div class="equity-bar">
                        <div class="equity-fill"></div>
                    </div>
                    <div class="equity-text">65%</div>
                </div>
            </div>
        </div>

        <!-- Output Targets -->
        <div class="output-target output-live">
            <div class="output-icon">
                <svg width="36" height="36" viewBox="0 0 36 36" fill="none" stroke="#333" stroke-width="2">
                    <rect x="4" y="6" width="28" height="20" rx="2" />
                    <rect x="14" y="26" width="8" height="4" />
                </svg>
            </div>
            <div class="output-label">경기장 모니터</div>
            <div class="output-format">NDI / HDMI</div>
        </div>

        <div class="output-target output-delayed">
            <div class="output-icon">
                <svg width="36" height="36" viewBox="0 0 36 36" fill="none" stroke="#333" stroke-width="2">
                    <rect x="6" y="8" width="24" height="18" rx="2" />
                    <path d="M12 8 L9 2 M24 8 L27 2" />
                </svg>
            </div>
            <div class="output-label">방송 송출</div>
            <div class="output-format">NDI / HDMI</div>
        </div>
    </div>
</body>
</html>
