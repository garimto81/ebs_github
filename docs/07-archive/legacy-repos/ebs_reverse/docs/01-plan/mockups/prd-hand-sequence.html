<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Hand Sequence Diagram</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #fff; padding: 0; margin: 0; }
svg text { font-family: 'Segoe UI', Arial, sans-serif; }
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="940">
  <defs>
    <marker id="as" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 z" fill="#555"/>
    </marker>
    <marker id="ad" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 z" fill="#999"/>
    </marker>
  </defs>

  <!--
    Actor centers:  RFID=80  Server=215  ActionTracker=360  Engine=505  Overlay=640
    Phase bands start at y=50, each message row = 26px
    Phase padding: 8px top, 6px bottom
  -->

  <!-- ========== Phase Bands ========== -->
  <rect x="0" y="50"  width="720" height="118" fill="#f5f5f5"/>
  <rect x="0" y="168" width="720" height="118" fill="#fff"/>
  <rect x="0" y="286" width="720" height="92"  fill="#f5f5f5"/>
  <rect x="0" y="378" width="720" height="92"  fill="#fff"/>
  <rect x="0" y="470" width="720" height="92"  fill="#f5f5f5"/>
  <rect x="0" y="562" width="720" height="92"  fill="#fff"/>
  <rect x="0" y="654" width="720" height="92"  fill="#f5f5f5"/>
  <rect x="0" y="746" width="720" height="92"  fill="#fff"/>
  <rect x="0" y="838" width="720" height="66"  fill="#eee"/>

  <!-- Phase divider lines -->
  <line x1="30" y1="168" x2="720" y2="168" stroke="#ddd" stroke-width="0.5"/>
  <line x1="30" y1="286" x2="720" y2="286" stroke="#ddd" stroke-width="0.5"/>
  <line x1="30" y1="378" x2="720" y2="378" stroke="#ddd" stroke-width="0.5"/>
  <line x1="30" y1="470" x2="720" y2="470" stroke="#ddd" stroke-width="0.5"/>
  <line x1="30" y1="562" x2="720" y2="562" stroke="#ddd" stroke-width="0.5"/>
  <line x1="30" y1="654" x2="720" y2="654" stroke="#ddd" stroke-width="0.5"/>
  <line x1="30" y1="746" x2="720" y2="746" stroke="#ddd" stroke-width="0.5"/>
  <line x1="30" y1="838" x2="720" y2="838" stroke="#ddd" stroke-width="0.5"/>

  <!-- Phase labels (rotated) -->
  <text x="14" y="109" text-anchor="middle" transform="rotate(-90 14 109)" font-size="9" font-weight="600" fill="#aaa" letter-spacing="1">PREFLOP</text>
  <text x="14" y="227" text-anchor="middle" transform="rotate(-90 14 227)" font-size="9" font-weight="600" fill="#aaa" letter-spacing="1">BET 1</text>
  <text x="14" y="332" text-anchor="middle" transform="rotate(-90 14 332)" font-size="9" font-weight="600" fill="#aaa" letter-spacing="1">FLOP</text>
  <text x="14" y="424" text-anchor="middle" transform="rotate(-90 14 424)" font-size="9" font-weight="600" fill="#aaa" letter-spacing="1">BET 2</text>
  <text x="14" y="516" text-anchor="middle" transform="rotate(-90 14 516)" font-size="9" font-weight="600" fill="#aaa" letter-spacing="1">TURN</text>
  <text x="14" y="608" text-anchor="middle" transform="rotate(-90 14 608)" font-size="9" font-weight="600" fill="#aaa" letter-spacing="1">BET 3</text>
  <text x="14" y="700" text-anchor="middle" transform="rotate(-90 14 700)" font-size="9" font-weight="600" fill="#aaa" letter-spacing="1">RIVER</text>
  <text x="14" y="792" text-anchor="middle" transform="rotate(-90 14 792)" font-size="9" font-weight="600" fill="#aaa" letter-spacing="1">BET 4</text>
  <text x="14" y="871" text-anchor="middle" transform="rotate(-90 14 871)" font-size="9" font-weight="600" fill="#aaa" letter-spacing="1">SHOW</text>

  <!-- ========== Actor Headers ========== -->
  <rect x="35" y="10" width="90" height="30" rx="3" fill="#f5f5f5" stroke="#bbb" stroke-width="1.5"/>
  <text x="80" y="30" text-anchor="middle" font-size="11" font-weight="600" fill="#333">RFID</text>

  <rect x="170" y="10" width="90" height="30" rx="3" fill="#f5f5f5" stroke="#bbb" stroke-width="1.5"/>
  <text x="215" y="30" text-anchor="middle" font-size="11" font-weight="600" fill="#333">Server</text>

  <rect x="300" y="10" width="120" height="30" rx="3" fill="#f5f5f5" stroke="#bbb" stroke-width="1.5"/>
  <text x="360" y="30" text-anchor="middle" font-size="11" font-weight="600" fill="#333">ActionTracker</text>

  <rect x="460" y="10" width="90" height="30" rx="3" fill="#f5f5f5" stroke="#bbb" stroke-width="1.5"/>
  <text x="505" y="30" text-anchor="middle" font-size="11" font-weight="600" fill="#333">Engine</text>

  <rect x="595" y="10" width="90" height="30" rx="3" fill="#f5f5f5" stroke="#bbb" stroke-width="1.5"/>
  <text x="640" y="30" text-anchor="middle" font-size="11" font-weight="600" fill="#333">Overlay</text>

  <!-- ========== Lifelines ========== -->
  <line x1="80"  y1="40" x2="80"  y2="904" stroke="#ccc" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="215" y1="40" x2="215" y2="904" stroke="#ccc" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="360" y1="40" x2="360" y2="904" stroke="#ccc" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="505" y1="40" x2="505" y2="904" stroke="#ccc" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="640" y1="40" x2="640" y2="904" stroke="#ccc" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ========== PREFLOP (msgs: y=64, 90, 116, 142) ========== -->
  <!-- RFID → Server: Deal Cards -->
  <line x1="80" y1="64" x2="215" y2="64" stroke="#555" stroke-width="1.5" marker-end="url(#as)"/>
  <text x="147" y="58" text-anchor="middle" font-size="10" fill="#555">Deal Cards</text>

  <!-- Server → Overlay: Show Hand -->
  <line x1="215" y1="90" x2="640" y2="90" stroke="#555" stroke-width="1.5" marker-end="url(#as)"/>
  <text x="427" y="84" text-anchor="middle" font-size="10" fill="#555">Show Hand</text>

  <!-- RFID → Server: Holecards Read -->
  <line x1="80" y1="116" x2="215" y2="116" stroke="#555" stroke-width="1.5" marker-end="url(#as)"/>
  <text x="147" y="110" text-anchor="middle" font-size="10" fill="#555">Holecards Read</text>

  <!-- Server → Overlay: Card Overlay -->
  <line x1="215" y1="142" x2="640" y2="142" stroke="#555" stroke-width="1.5" marker-end="url(#as)"/>
  <text x="427" y="136" text-anchor="middle" font-size="10" fill="#555">Card Overlay</text>

  <!-- ========== BET 1 (msgs: y=182, 208, 234, 260) ========== -->
  <!-- ext ··> ActionTracker: BET -->
  <line x1="290" y1="182" x2="360" y2="182" stroke="#999" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ad)"/>
  <text x="325" y="176" text-anchor="middle" font-size="10" fill="#999" font-style="italic">BET</text>

  <!-- ActionTracker → Engine: Action -->
  <line x1="360" y1="208" x2="505" y2="208" stroke="#555" stroke-width="1.5" marker-end="url(#as)"/>
  <text x="432" y="202" text-anchor="middle" font-size="10" fill="#555">Action</text>

  <!-- Engine → Overlay: Pot Update -->
  <line x1="505" y1="234" x2="640" y2="234" stroke="#555" stroke-width="1.5" marker-end="url(#as)"/>
  <text x="572" y="228" text-anchor="middle" font-size="10" fill="#555">Pot Update</text>

  <!-- Engine → Overlay: Equity % -->
  <line x1="505" y1="260" x2="640" y2="260" stroke="#555" stroke-width="1.5" marker-end="url(#as)"/>
  <text x="572" y="254" text-anchor="middle" font-size="10" fill="#555">Equity %</text>

  <!-- ========== FLOP (msgs: y=300, 326, 352) ========== -->
  <!-- RFID → Server: Flop (3 cards) -->
  <line x1="80" y1="300" x2="215" y2="300" stroke="#555" stroke-width="1.5" marker-end="url(#as)"/>
  <text x="147" y="294" text-anchor="middle" font-size="10" fill="#555">Flop (3 cards)</text>

  <!-- Server → Engine: Board Cards -->
  <line x1="215" y1="326" x2="505" y2="326" stroke="#555" stroke-width="1.5" marker-end="url(#as)"/>
  <text x="360" y="320" text-anchor="middle" font-size="10" fill="#555">Board Cards</text>

  <!-- Engine → Overlay: Board GFX -->
  <line x1="505" y1="352" x2="640" y2="352" stroke="#555" stroke-width="1.5" marker-end="url(#as)"/>
  <text x="572" y="346" text-anchor="middle" font-size="10" fill="#555">Board GFX</text>

  <!-- ========== BET 2 (msgs: y=392, 418, 444) ========== -->
  <!-- ext ··> ActionTracker: BET -->
  <line x1="290" y1="392" x2="360" y2="392" stroke="#999" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ad)"/>
  <text x="325" y="386" text-anchor="middle" font-size="10" fill="#999" font-style="italic">BET</text>

  <!-- ActionTracker → Engine: Action -->
  <line x1="360" y1="418" x2="505" y2="418" stroke="#555" stroke-width="1.5" marker-end="url(#as)"/>
  <text x="432" y="412" text-anchor="middle" font-size="10" fill="#555">Action</text>

  <!-- Engine → Overlay: Update -->
  <line x1="505" y1="444" x2="640" y2="444" stroke="#555" stroke-width="1.5" marker-end="url(#as)"/>
  <text x="572" y="438" text-anchor="middle" font-size="10" fill="#555">Update</text>

  <!-- ========== TURN (msgs: y=484, 510, 536) ========== -->
  <!-- RFID → Server: Turn (1 card) -->
  <line x1="80" y1="484" x2="215" y2="484" stroke="#555" stroke-width="1.5" marker-end="url(#as)"/>
  <text x="147" y="478" text-anchor="middle" font-size="10" fill="#555">Turn (1 card)</text>

  <!-- Server → Engine: Board + Recalc -->
  <line x1="215" y1="510" x2="505" y2="510" stroke="#555" stroke-width="1.5" marker-end="url(#as)"/>
  <text x="360" y="504" text-anchor="middle" font-size="10" fill="#555">Board + Recalc</text>

  <!-- Engine → Overlay: Turn GFX -->
  <line x1="505" y1="536" x2="640" y2="536" stroke="#555" stroke-width="1.5" marker-end="url(#as)"/>
  <text x="572" y="530" text-anchor="middle" font-size="10" fill="#555">Turn GFX</text>

  <!-- ========== BET 3 (msgs: y=576, 602, 628) ========== -->
  <!-- ext ··> ActionTracker: BET -->
  <line x1="290" y1="576" x2="360" y2="576" stroke="#999" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ad)"/>
  <text x="325" y="570" text-anchor="middle" font-size="10" fill="#999" font-style="italic">BET</text>

  <!-- ActionTracker → Engine: Action -->
  <line x1="360" y1="602" x2="505" y2="602" stroke="#555" stroke-width="1.5" marker-end="url(#as)"/>
  <text x="432" y="596" text-anchor="middle" font-size="10" fill="#555">Action</text>

  <!-- Engine → Overlay: Update -->
  <line x1="505" y1="628" x2="640" y2="628" stroke="#555" stroke-width="1.5" marker-end="url(#as)"/>
  <text x="572" y="622" text-anchor="middle" font-size="10" fill="#555">Update</text>

  <!-- ========== RIVER (msgs: y=668, 694, 720) ========== -->
  <!-- RFID → Server: River (1 card) -->
  <line x1="80" y1="668" x2="215" y2="668" stroke="#555" stroke-width="1.5" marker-end="url(#as)"/>
  <text x="147" y="662" text-anchor="middle" font-size="10" fill="#555">River (1 card)</text>

  <!-- Server → Engine: Board + Recalc -->
  <line x1="215" y1="694" x2="505" y2="694" stroke="#555" stroke-width="1.5" marker-end="url(#as)"/>
  <text x="360" y="688" text-anchor="middle" font-size="10" fill="#555">Board + Recalc</text>

  <!-- Engine → Overlay: River GFX -->
  <line x1="505" y1="720" x2="640" y2="720" stroke="#555" stroke-width="1.5" marker-end="url(#as)"/>
  <text x="572" y="714" text-anchor="middle" font-size="10" fill="#555">River GFX</text>

  <!-- ========== BET 4 (msgs: y=760, 786, 812) ========== -->
  <!-- ext ··> ActionTracker: BET -->
  <line x1="290" y1="760" x2="360" y2="760" stroke="#999" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ad)"/>
  <text x="325" y="754" text-anchor="middle" font-size="10" fill="#999" font-style="italic">BET</text>

  <!-- ActionTracker → Engine: Action -->
  <line x1="360" y1="786" x2="505" y2="786" stroke="#555" stroke-width="1.5" marker-end="url(#as)"/>
  <text x="432" y="780" text-anchor="middle" font-size="10" fill="#555">Action</text>

  <!-- Engine → Overlay: Update -->
  <line x1="505" y1="812" x2="640" y2="812" stroke="#555" stroke-width="1.5" marker-end="url(#as)"/>
  <text x="572" y="806" text-anchor="middle" font-size="10" fill="#555">Update</text>

  <!-- ========== SHOWDOWN (msgs: y=852, 878) ========== -->
  <!-- Engine → Overlay: Winner -->
  <line x1="505" y1="852" x2="640" y2="852" stroke="#555" stroke-width="1.5" marker-end="url(#as)"/>
  <text x="572" y="846" text-anchor="middle" font-size="10" fill="#555">Winner</text>

  <!-- Overlay self-loop: Result -->
  <path d="M618,878 L648,878 L648,892 L618,892" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#as)"/>
  <text x="654" y="888" font-size="10" fill="#555">Result</text>

  <!-- ========== Legend ========== -->
  <line x1="200" y1="920" x2="240" y2="920" stroke="#555" stroke-width="1.5"/>
  <text x="246" y="924" font-size="10" fill="#666">Auto</text>
  <line x1="320" y1="920" x2="360" y2="920" stroke="#999" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="366" y="924" font-size="10" fill="#666">Manual (Operator)</text>
</svg>
</body>
</html>
