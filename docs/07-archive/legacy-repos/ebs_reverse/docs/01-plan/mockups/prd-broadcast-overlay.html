<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=720">
    <title>M8: Broadcast Overlay</title>
    <style>
* {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #fff;
            color: #000;
            padding: 0;
            margin: 0;
        }

        .container {
            max-width: 720px;
            margin: 0;
            padding: 15px;
            position: relative;
        }

        .broadcast-frame {
            width: 690px;
            height: 388px;
            margin: 0 auto;
            position: relative;
            background: #e0e0e0;
            border: 2px solid #999;
            overflow: hidden;
        }

        .pot-display {
            position: absolute;
            top: 49px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            padding: 12px 32px;
            border: 2px solid #000;
            z-index: 10;
        }

        .pot-amount {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.5px;
        }

        .board-cards {
            position: absolute;
            top: 86px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 5;
        }

        .card {
            width: 44px;
            height: 62px;
            background: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px solid #999;
            position: relative;
        }

        .card.empty {
            background: #f0f0f0;
            border: 2px dashed #bbb;
        }

        .card-rank {
            font-size: 18px;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 2px;
        }

        .card-suit {
            font-size: 20px;
            line-height: 1;
        }

        .card.red .card-rank,
        .card.red .card-suit {
            color: #333;
        }

        .card.black .card-rank,
        .card.black .card-suit {
            color: #000;
        }

        .players-row {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-evenly;
            padding: 0 25px 18px;
            gap: 12px;
        }

        .player-panel {
            width: 150px;
            background: #333;
            padding: 10px;
            border: 2px solid #555;
            position: relative;
        }

        .player-panel.folded {
            opacity: 0.3;
        }

        .player-panel.folded::after {
            content: 'FOLD';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 22px;
            font-weight: 900;
            color: #aaa;
            letter-spacing: 2px;
            z-index: 10;
        }

        .player-name {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }

        .player-stack {
            font-size: 20px;
            font-weight: 700;
            color: #ccc;
            margin-bottom: 12px;
        }

        .player-cards {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .player-card {
            width: 30px;
            height: 42px;
            background: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid #ccc;
        }

        .player-card.hidden {
            background: #555;
            border: 1px solid #333;
        }

        .player-card-rank {
            font-size: 11px;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 1px;
        }

        .player-card-suit {
            font-size: 13px;
            line-height: 1;
        }

        .equity-bar-container {
            width: 100%;
            height: 24px;
            background: #555;
            overflow: hidden;
            position: relative;
            border: 1px solid #666;
        }

        .equity-bar-fill {
            height: 100%;
            background: #888;
            position: relative;
        }

        .equity-percentage {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 13px;
            font-weight: 700;
            color: #fff;
        }

        .callout-badge {
            position: absolute;
            width: 28px;
            height: 28px;
            background: #333;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            color: #fff;
            border: 2px solid #000;
            z-index: 100;
        }

        .callout-line {
            position: absolute;
            stroke: #555;
            stroke-width: 2;
            fill: none;
            pointer-events: none;
            z-index: 99;
        }

        .legend {
            position: absolute;
            bottom: -50px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 24px;
            font-size: 12px;
            color: #666;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .legend-badge {
            width: 18px;
            height: 18px;
            background: #333;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 700;
            color: #fff;
            border: 1px solid #000;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="broadcast-frame">
            <svg class="callout-line" width="690" height="388">
                <path d="M 123 320 L 111 357" />
                <path d="M 185 320 L 172 357" />
                <path d="M 74 296 L 49 345" />
                <path d="M 234 320 L 246 357" />
                <path d="M 345 160 L 370 197" />
                <path d="M 345 74 L 370 37" />
                <path d="M 394 320 L 419 357" />
                <path d="M 591 123 L 616 86" />
            </svg>

            <div class="pot-display">
                <div class="pot-amount">POT $45,000</div>
            </div>

            <div class="board-cards">
                <div class="card red">
                    <div class="card-rank">K</div>
                    <div class="card-suit">♥</div>
                </div>
                <div class="card black">
                    <div class="card-rank">9</div>
                    <div class="card-suit">♠</div>
                </div>
                <div class="card red">
                    <div class="card-rank">4</div>
                    <div class="card-suit">♦</div>
                </div>
                <div class="card black">
                    <div class="card-rank">2</div>
                    <div class="card-suit">♣</div>
                </div>
                <div class="card empty"></div>
            </div>

            <div class="players-row">
                <div class="player-panel">
                    <div class="player-name">Alex Chen</div>
                    <div class="player-stack">$125,400</div>
                    <div class="player-cards">
                        <div class="player-card red">
                            <div class="player-card-rank">A</div>
                            <div class="player-card-suit">♥</div>
                        </div>
                        <div class="player-card black">
                            <div class="player-card-rank">K</div>
                            <div class="player-card-suit">♠</div>
                        </div>
                    </div>
                    <div class="equity-bar-container">
                        <div class="equity-bar-fill" style="width: 68%;"></div>
                        <div class="equity-percentage">68%</div>
                    </div>
                </div>

                <div class="player-panel folded">
                    <div class="player-name">Maria Garcia</div>
                    <div class="player-stack">$87,200</div>
                    <div class="player-cards">
                        <div class="player-card hidden"></div>
                        <div class="player-card hidden"></div>
                    </div>
                    <div class="equity-bar-container">
                        <div class="equity-bar-fill" style="width: 0%;"></div>
                        <div class="equity-percentage">0%</div>
                    </div>
                </div>

                <div class="player-panel">
                    <div class="player-name">James Lee</div>
                    <div class="player-stack">$203,800</div>
                    <div class="player-cards">
                        <div class="player-card red">
                            <div class="player-card-rank">Q</div>
                            <div class="player-card-suit">♦</div>
                        </div>
                        <div class="player-card red">
                            <div class="player-card-rank">J</div>
                            <div class="player-card-suit">♥</div>
                        </div>
                    </div>
                    <div class="equity-bar-container">
                        <div class="equity-bar-fill" style="width: 24%;"></div>
                        <div class="equity-percentage">24%</div>
                    </div>
                </div>

                <div class="player-panel">
                    <div class="player-name">Sophie Park</div>
                    <div class="player-stack">$156,600</div>
                    <div class="player-cards">
                        <div class="player-card black">
                            <div class="player-card-rank">10</div>
                            <div class="player-card-suit">♣</div>
                        </div>
                        <div class="player-card black">
                            <div class="player-card-rank">9</div>
                            <div class="player-card-suit">♠</div>
                        </div>
                    </div>
                    <div class="equity-bar-container">
                        <div class="equity-bar-fill" style="width: 8%;"></div>
                        <div class="equity-percentage">8%</div>
                    </div>
                </div>
            </div>

            <div class="callout-badge" style="top: 314px; left: 117px;">1</div>
            <div class="callout-badge" style="top: 314px; left: 179px;">2</div>
            <div class="callout-badge" style="top: 290px; left: 68px;">3</div>
            <div class="callout-badge" style="top: 314px; left: 228px;">4</div>
            <div class="callout-badge" style="top: 154px; left: 339px;">5</div>
            <div class="callout-badge" style="top: 68px; left: 339px;">6</div>
            <div class="callout-badge" style="top: 314px; left: 388px;">7</div>
            <div class="callout-badge" style="top: 117px; left: 585px;">8</div>
        </div>

        <div class="legend">
            <div class="legend-item">
                <div class="legend-badge">1</div>
                <span>Player Name</span>
            </div>
            <div class="legend-item">
                <div class="legend-badge">2</div>
                <span>Stack Amount</span>
            </div>
            <div class="legend-item">
                <div class="legend-badge">3</div>
                <span>Hole Cards</span>
            </div>
            <div class="legend-item">
                <div class="legend-badge">4</div>
                <span>Equity Bar</span>
            </div>
            <div class="legend-item">
                <div class="legend-badge">5</div>
                <span>Board Cards</span>
            </div>
            <div class="legend-item">
                <div class="legend-badge">6</div>
                <span>Pot Display</span>
            </div>
            <div class="legend-item">
                <div class="legend-badge">7</div>
                <span>Fold Indicator</span>
            </div>
            <div class="legend-item">
                <div class="legend-badge">8</div>
                <span>Broadcast Background</span>
            </div>
        </div>
    </div>
</body>
</html>
