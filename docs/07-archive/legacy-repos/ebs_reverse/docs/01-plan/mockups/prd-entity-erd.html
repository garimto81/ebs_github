<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=720">
    <title>Entity Relationship Diagram</title>
    <style>
* {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #fff;
            color: #000;
            padding: 0;
            margin: 0;
            width: 720px;
        }

        .diagram-container {
            width: 700px;
            height: 700px;
            margin: 0;
            padding: 15px;
            position: relative;
        }

        svg {
            width: 100%;
            height: 100%;
        }

        .entity {
            rx: 0px;
            stroke-width: 2;
        }

        .entity.core {
            fill: #fff;
            stroke: #1a1a1a;
        }

        .entity.derived {
            fill: #f5f5f5;
            stroke: #666;
            stroke-dasharray: 4 3;
        }

        .entity-text {
            font-size: 15px;
            font-weight: 600;
            fill: #1a1a1a;
            text-anchor: middle;
            dominant-baseline: middle;
        }

        .relationship {
            stroke: #333;
            stroke-width: 2;
            fill: none;
        }

        .relationship.derived {
            stroke: #999;
            stroke-dasharray: 6 4;
        }

        .cardinality-text {
            font-size: 11px;
            fill: #555;
            text-anchor: middle;
        }

        .legend {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: #666;
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .legend-line {
            width: 40px;
            height: 2px;
            background: #333;
        }

        .legend-line.dashed {
            background: repeating-linear-gradient(
                to right,
                #999 0px,
                #999 6px,
                transparent 6px,
                transparent 10px
            );
        }
    </style>
</head>
<body>
    <div class="diagram-container">
        <svg viewBox="0 0 700 700" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <!-- Markers for crow's foot notation -->
                <!-- One (mandatory) - single line -->
                <marker id="one" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="8" markerHeight="8">
                    <line x1="5" y1="0" x2="5" y2="10" stroke="#333" stroke-width="2"/>
                </marker>

                <!-- Many (crow's foot) - circle + three lines -->
                <marker id="many" viewBox="0 0 20 20" refX="10" refY="10" markerWidth="12" markerHeight="12">
                    <circle cx="10" cy="10" r="3" fill="none" stroke="#333" stroke-width="1.5"/>
                    <line x1="10" y1="10" x2="0" y2="5" stroke="#333" stroke-width="1.5"/>
                    <line x1="10" y1="10" x2="0" y2="10" stroke="#333" stroke-width="1.5"/>
                    <line x1="10" y1="10" x2="0" y2="15" stroke="#333" stroke-width="1.5"/>
                </marker>

                <!-- Derived markers (grey) -->
                <marker id="many-derived" viewBox="0 0 20 20" refX="10" refY="10" markerWidth="12" markerHeight="12">
                    <circle cx="10" cy="10" r="3" fill="none" stroke="#999" stroke-width="1.5"/>
                    <line x1="10" y1="10" x2="0" y2="5" stroke="#999" stroke-width="1.5"/>
                    <line x1="10" y1="10" x2="0" y2="10" stroke="#999" stroke-width="1.5"/>
                    <line x1="10" y1="10" x2="0" y2="15" stroke="#999" stroke-width="1.5"/>
                </marker>

                <marker id="one-derived" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="8" markerHeight="8">
                    <line x1="5" y1="0" x2="5" y2="10" stroke="#999" stroke-width="2"/>
                </marker>
            </defs>

            <!-- Entity Nodes -->

            <!-- Event (top center) -->
            <rect class="entity core" x="294" y="40" width="98" height="50"/>
            <text class="entity-text" x="343" y="65">Event</text>

            <!-- TournamentState (top right, derived) -->
            <rect class="entity derived" x="504" y="40" width="112" height="50"/>
            <text class="entity-text" x="560" y="65">TournamentState</text>

            <!-- GameSession (center, largest, core) -->
            <rect class="entity core central" x="287" y="230" width="112" height="60"/>
            <text class="entity-text" x="343" y="260">GameSession</text>

            <!-- TableState (left of center) -->
            <rect class="entity core" x="91" y="235" width="98" height="50"/>
            <text class="entity-text" x="140" y="260">TableState</text>

            <!-- PlayerState (right of center) -->
            <rect class="entity core" x="497" y="235" width="98" height="50"/>
            <text class="entity-text" x="546" y="260">PlayerState</text>

            <!-- BettingState (left side, derived) -->
            <rect class="entity derived" x="77" y="380" width="98" height="50"/>
            <text class="entity-text" x="126" y="405">BettingState</text>

            <!-- DisplayState (right side, derived) -->
            <rect class="entity derived" x="511" y="380" width="98" height="50"/>
            <text class="entity-text" x="560" y="405">DisplayState</text>

            <!-- Action (bottom center) -->
            <rect class="entity core" x="294" y="520" width="98" height="50"/>
            <text class="entity-text" x="343" y="545">Action</text>

            <!-- Relationships -->

            <!-- Event to GameSession (1:N) -->
            <line class="relationship" x1="343" y1="90" x2="343" y2="230" marker-start="url(#one)" marker-end="url(#many)"/>
            <text class="cardinality-text" x="357" y="160">1:N</text>

            <!-- Event to TournamentState (1:N, derived, dashed) -->
            <path class="relationship derived" d="M 392 65 L 504 65" marker-start="url(#one-derived)" marker-end="url(#many-derived)"/>
            <text class="cardinality-text" x="448" y="55">1:N</text>

            <!-- GameSession to TableState (1:1) -->
            <line class="relationship" x1="287" y1="260" x2="189" y2="260" marker-start="url(#one)" marker-end="url(#one)"/>
            <text class="cardinality-text" x="238" y="250">1:1</text>

            <!-- GameSession to PlayerState (1:N) -->
            <line class="relationship" x1="399" y1="260" x2="497" y2="260" marker-start="url(#one)" marker-end="url(#many)"/>
            <text class="cardinality-text" x="448" y="250">1:N</text>

            <!-- GameSession to BettingState (1:N, derived, dashed) -->
            <path class="relationship derived" d="M 301 290 L 154 380" marker-start="url(#one-derived)" marker-end="url(#many-derived)"/>
            <text class="cardinality-text" x="217" y="330">1:N</text>

            <!-- GameSession to DisplayState (1:1, derived, dashed) -->
            <path class="relationship derived" d="M 385 290 L 546 380" marker-start="url(#one-derived)" marker-end="url(#one-derived)"/>
            <text class="cardinality-text" x="469" y="330">1:1</text>

            <!-- GameSession to Action (1:N) -->
            <line class="relationship" x1="343" y1="290" x2="343" y2="520" marker-start="url(#one)" marker-end="url(#many)"/>
            <text class="cardinality-text" x="357" y="405">1:N</text>
        </svg>

        <div class="legend">
            <div class="legend-item">
                <div class="legend-line"></div>
                <span>core</span>
            </div>
            <div class="legend-item">
                <div class="legend-line dashed"></div>
                <span>derived</span>
            </div>
            <div class="legend-item">
                <span>||─ one</span>
            </div>
            <div class="legend-item">
                <span>─o{ many</span>
            </div>
        </div>
    </div>
</body>
</html>
