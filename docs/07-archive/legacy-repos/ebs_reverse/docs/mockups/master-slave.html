<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master-Slave Network Topology</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 760px;
            background: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            padding: 25px 30px;
            margin: 0;
            color: #000000;
        }
        h1 {
            font-size: 22px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 8px;
            border-bottom: 2px solid #000;
        }
        .topology {
            display: flex;
            align-items: flex-start;
            gap: 0;
            position: relative;
        }
        .master-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-shrink: 0;
        }
        .server-box {
            border: 3px solid #000;
            background: #f0f0f0;
            text-align: center;
            border-radius: 4px;
        }
        .master-box {
            width: 220px;
            padding: 20px 15px;
            background: #d8d8d8;
            border-width: 3px;
        }
        .slave-box {
            width: 200px;
            padding: 15px 12px;
        }
        .server-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .server-port {
            font-size: 13px;
            color: #333;
        }
        .server-type {
            font-size: 11px;
            color: #666;
            margin-top: 4px;
        }
        .connections {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
            gap: 40px;
            padding: 0;
        }
        .conn-group {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .conn-label {
            font-size: 11px;
            font-weight: 700;
            background: #fff;
            border: 1px solid #999;
            padding: 2px 8px;
            border-radius: 3px;
            margin-bottom: 4px;
        }
        .slaves-col {
            display: flex;
            flex-direction: column;
            gap: 30px;
            flex-shrink: 0;
        }
        .sync-box {
            border: 2px solid #000;
            background: #f9f9f9;
            padding: 12px 15px;
            margin-top: 20px;
            border-radius: 4px;
            width: 100%;
        }
        .sync-title {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 6px;
            border-bottom: 1px solid #ccc;
            padding-bottom: 4px;
        }
        .sync-item {
            font-size: 12px;
            color: #333;
            line-height: 1.7;
            padding-left: 8px;
        }
        svg.arrow-svg {
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <h1>Master-Slave Network Topology</h1>

    <div class="topology">
        <!-- Master -->
        <div class="master-col">
            <div class="server-box master-box">
                <div class="server-title">Master VPT Server</div>
                <div class="server-port">Port 9001</div>
                <div class="server-type">Primary Control Node</div>
            </div>
        </div>

        <!-- Arrows (SVG) -->
        <div class="connections">
            <div class="conn-group">
                <div class="conn-label">TCP Sync</div>
                <svg class="arrow-svg" width="120" height="40" viewBox="0 0 120 40">
                    <!-- Forward arrow -->
                    <line x1="0" y1="14" x2="108" y2="14" stroke="#000" stroke-width="3"/>
                    <polygon points="108,7 120,14 108,21" fill="#000"/>
                    <!-- Return arrow -->
                    <line x1="120" y1="28" x2="12" y2="28" stroke="#000" stroke-width="3"/>
                    <polygon points="12,21 0,28 12,35" fill="#000"/>
                </svg>
            </div>
            <div class="conn-group">
                <div class="conn-label">TCP Sync</div>
                <svg class="arrow-svg" width="120" height="40" viewBox="0 0 120 40">
                    <line x1="0" y1="14" x2="108" y2="14" stroke="#000" stroke-width="3"/>
                    <polygon points="108,7 120,14 108,21" fill="#000"/>
                    <line x1="120" y1="28" x2="12" y2="28" stroke="#000" stroke-width="3"/>
                    <polygon points="12,21 0,28 12,35" fill="#000"/>
                </svg>
            </div>
        </div>

        <!-- Slaves -->
        <div class="slaves-col">
            <div class="server-box slave-box">
                <div class="server-title">Slave 1 VPT</div>
                <div class="server-port">Port 9001</div>
                <div class="server-type">Secondary Node</div>
            </div>
            <div class="server-box slave-box">
                <div class="server-title">Slave 2 VPT</div>
                <div class="server-port">Port 9001</div>
                <div class="server-type">Secondary Node</div>
            </div>
        </div>
    </div>

    <!-- Sync Info -->
    <div class="sync-box">
        <div class="sync-title">동기화 항목</div>
        <div class="sync-item">&#8226; 게임 상태 (실시간) &nbsp;&nbsp; &#8226; 핸드 로그 &nbsp;&nbsp; &#8226; 스킨 파일 (.vpt)</div>
        <div class="sync-item">&#8226; 그래픽 설정 &nbsp;&nbsp; &#8226; ATEM 스위처 주소 &nbsp;&nbsp; &#8226; Twitch 채널</div>
    </div>
</body>
</html>
