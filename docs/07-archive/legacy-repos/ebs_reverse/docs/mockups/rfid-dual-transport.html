<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RFID Dual Transport Architecture</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 760px;
            background: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            padding: 25px 30px;
            margin: 0;
            color: #000000;
        }
        h1 {
            font-size: 22px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 8px;
            border-bottom: 2px solid #000;
        }
        .tree {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .module-box {
            border: 3px solid #000;
            background: #f0f0f0;
            text-align: center;
            border-radius: 4px;
        }
        .root-box {
            width: 280px;
            padding: 18px 20px;
            background: #d8d8d8;
        }
        .module-title {
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .module-subtitle {
            font-size: 13px;
            color: #444;
        }
        .children {
            display: flex;
            gap: 40px;
            margin-top: 0;
        }
        .child-box {
            width: 300px;
            padding: 18px 20px;
        }
        .conn-label {
            font-size: 12px;
            font-weight: 600;
            margin-top: 10px;
            margin-bottom: 4px;
            color: #333;
        }
        .tag-row {
            display: flex;
            gap: 6px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 4px;
        }
        .tag {
            display: inline-block;
            background: #e0e0e0;
            border: 2px solid #666;
            padding: 4px 10px;
            font-size: 12px;
            font-weight: 600;
            border-radius: 4px;
        }
        .tag-primary {
            background: #d0d0d0;
            border-color: #000;
        }
        .section-label {
            font-size: 11px;
            font-weight: 700;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 10px;
            margin-bottom: 2px;
        }
    </style>
</head>
<body>
    <h1>RFID Dual Transport Architecture</h1>

    <div class="tree">
        <!-- Root -->
        <div class="module-box root-box">
            <div class="module-title">reader_module</div>
            <div class="module-subtitle">통합 RFID 관리</div>
        </div>

        <!-- SVG Tree Connector -->
        <svg width="640" height="50" viewBox="0 0 640 50" style="display:block;">
            <!-- Trunk down from center -->
            <line x1="320" y1="0" x2="320" y2="20" stroke="#000" stroke-width="3"/>
            <!-- Horizontal bar -->
            <line x1="150" y1="20" x2="490" y2="20" stroke="#000" stroke-width="3"/>
            <!-- Left branch down -->
            <line x1="150" y1="20" x2="150" y2="42" stroke="#000" stroke-width="3"/>
            <polygon points="143,40 150,52 157,40" fill="#000"/>
            <!-- Right branch down -->
            <line x1="490" y1="20" x2="490" y2="42" stroke="#000" stroke-width="3"/>
            <polygon points="483,40 490,52 497,40" fill="#000"/>
        </svg>

        <!-- Children -->
        <div class="children">
            <!-- SkyeTek (Legacy) -->
            <div class="module-box child-box">
                <div class="module-title">skye_module</div>
                <div class="module-subtitle">SkyeTek (구형)</div>
                <div class="section-label">연결 방식</div>
                <div class="tag-row">
                    <span class="tag">USB HID only</span>
                </div>
            </div>

            <!-- v2 (Modern) -->
            <div class="module-box child-box">
                <div class="module-title">v2_module</div>
                <div class="module-subtitle">Rev2 (신형)</div>
                <div class="section-label">Primary</div>
                <div class="tag-row">
                    <span class="tag tag-primary">TCP/WiFi Network</span>
                    <span class="tag tag-primary">BearSSL TLS 1.2</span>
                </div>
                <div class="section-label">Fallback</div>
                <div class="tag-row">
                    <span class="tag">USB</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
