<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <title>Type A vs Type B 개념 비교</title>
  <style>
    body { background: #fff; margin: 0; padding: 20px; font-family: Inter, sans-serif; }
  </style>
</head>
<body>
<svg viewBox="0 0 700 320" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">

  <!-- ==================== TYPE A ==================== -->
  <text x="170" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#222">Type A</text>
  <text x="170" y="46" text-anchor="middle" font-size="11" fill="#888">전용 테이블 (Full Build)</text>

  <!-- Simple table shape -->
  <rect x="50" y="65" width="240" height="130" rx="8" fill="#f0f0f0" stroke="#999" stroke-width="1.5"/>

  <!-- Label: EBS 전체 제작 -->
  <text x="170" y="100" text-anchor="middle" font-size="13" fill="#555" font-weight="500">EBS 전체 제작</text>

  <!-- Antenna icon inside -->
  <rect x="110" y="115" width="120" height="30" rx="4" fill="#e0e0e0" stroke="#888" stroke-width="1"/>
  <g fill="none" stroke="#555" stroke-width="1.5">
    <ellipse cx="140" cy="130" rx="12" ry="3"/>
    <ellipse cx="170" cy="130" rx="12" ry="3"/>
    <ellipse cx="200" cy="130" rx="12" ry="3"/>
  </g>
  <text x="170" y="160" text-anchor="middle" font-size="10" fill="#777">RFID 안테나 매립</text>

  <!-- Legs -->
  <line x1="100" y1="195" x2="100" y2="220" stroke="#888" stroke-width="3"/>
  <line x1="240" y1="195" x2="240" y2="220" stroke="#888" stroke-width="3"/>
  <line x1="85" y1="220" x2="115" y2="220" stroke="#888" stroke-width="2"/>
  <line x1="225" y1="220" x2="255" y2="220" stroke="#888" stroke-width="2"/>

  <!-- Key point -->
  <rect x="70" y="238" width="200" height="32" rx="6" fill="#f8faf8" stroke="#6a6a6a" stroke-width="1"/>
  <text x="170" y="258" text-anchor="middle" font-size="11" fill="#333" font-weight="600">카드↔안테나 ~7mm</text>

  <!-- Use case -->
  <text x="170" y="290" text-anchor="middle" font-size="10" fill="#888">상설 스튜디오 / WSOP 피처</text>

  <!-- ==================== DIVIDER ==================== -->
  <line x1="350" y1="55" x2="350" y2="300" stroke="#ddd" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="350" y="310" text-anchor="middle" font-size="10" fill="#bbb">vs</text>

  <!-- ==================== TYPE B ==================== -->
  <text x="530" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#222">Type B</text>
  <text x="530" y="46" text-anchor="middle" font-size="11" fill="#888">휴대형 부착킷 (Portable Kit)</text>

  <!-- Existing table (lighter, dashed) -->
  <rect x="410" y="65" width="240" height="80" rx="8" fill="#fafafa" stroke="#bbb" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="530" y="100" text-anchor="middle" font-size="13" fill="#999" font-weight="500">기존 테이블</text>
  <text x="530" y="116" text-anchor="middle" font-size="10" fill="#bbb">(가공하지 않음)</text>

  <!-- EBS Kit attached below -->
  <rect x="410" y="150" width="240" height="45" rx="4" fill="#e8f5e8" stroke="#222" stroke-width="1.5"/>
  <g fill="none" stroke="#333" stroke-width="1.5">
    <ellipse cx="470" cy="172" rx="12" ry="3"/>
    <ellipse cx="530" cy="172" rx="12" ry="3"/>
    <ellipse cx="590" cy="172" rx="12" ry="3"/>
  </g>
  <text x="530" y="167" text-anchor="middle" font-size="10" fill="#222" font-weight="600">EBS 부착킷</text>
  <text x="530" y="187" text-anchor="middle" font-size="9" fill="#555">스테이플러로 하판에 부착</text>

  <!-- Arrow showing attachment -->
  <line x1="530" y1="145" x2="530" y2="152" stroke="#d44" stroke-width="2" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#d44"/>
    </marker>
  </defs>

  <!-- Key point -->
  <rect x="430" y="210" width="200" height="32" rx="6" fill="#fff8f8" stroke="#d44" stroke-width="1"/>
  <text x="530" y="230" text-anchor="middle" font-size="11" fill="#d44" font-weight="600">카드↔안테나 ~22mm</text>

  <!-- Use case -->
  <text x="530" y="262" text-anchor="middle" font-size="10" fill="#888">원정 방송 / 외부 행사 / 데모</text>

  <!-- Portable icon -->
  <text x="530" y="290" text-anchor="middle" font-size="20">📦</text>
  <text x="530" y="308" text-anchor="middle" font-size="10" fill="#888">~8kg 캐리 케이스</text>

</svg>
</body>
</html>
