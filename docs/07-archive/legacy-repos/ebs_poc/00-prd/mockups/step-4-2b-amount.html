<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Step 4.2b - AMOUNT 2,000</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; display: flex; justify-content: center; padding: 20px; }
  .at-window { width: 640px; background: #f5f5f5; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }

  /* Toolbar */
  .toolbar { display: flex; align-items: center; justify-content: space-between; background: #fff; padding: 8px 16px; border-bottom: 1px solid #e0e0e0; height: 40px; }
  .toolbar-left { display: flex; align-items: center; gap: 12px; }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; }
  .status-dot.on { background: #4caf50; }
  .status-dot.off { background: #ccc; }
  .toolbar-label { font-size: 11px; color: #666; }
  .hand-num { font-size: 13px; font-weight: 700; color: #333; }

  /* Table area */
  .table-area { position: relative; height: 240px; background: #e8e8e8; margin: 8px; border-radius: 8px; }
  .table-felt { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 280px; height: 140px; background: #2d5a27; border-radius: 70px; border: 3px solid #3a7a32; }

  /* Seats */
  .seat { position: absolute; display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .seat-avatar { width: 36px; height: 36px; border-radius: 50%; border: 2px solid #ccc; display: flex; align-items: center; justify-content: center; font-size: 14px; background: #fff; }
  .seat-name { font-size: 10px; font-weight: 600; color: #333; }
  .seat-info { font-size: 9px; color: #666; }
  .seat-pos { font-size: 8px; font-weight: 700; padding: 1px 4px; border-radius: 3px; color: #fff; }
  .pos-d { background: #f44336; }
  .pos-sb { background: #2196f3; }
  .pos-bb { background: #ff9800; }
  .pos-utg { background: #9c27b0; }

  .seat.s1 { top: 20px; left: 50%; transform: translateX(-50%); }
  .seat.s3 { top: 50%; right: 20px; transform: translateY(-50%); }
  .seat.s5 { bottom: 20px; left: 50%; transform: translateX(-50%); }
  .seat.s8 { top: 50%; left: 20px; transform: translateY(-50%); }

  /* Card slots */
  .card-slots { display: flex; gap: 3px; margin-top: 2px; }
  .card-slot { width: 20px; height: 28px; border-radius: 2px; border: 1px dashed #999; background: #ddd; }
  .card-slot.dealt { background: #4a90d9; border: 1px solid #357abd; }

  /* Action glow */
  .seat.active .seat-avatar { border-color: #ffeb3b; box-shadow: 0 0 12px #ffeb3b, 0 0 24px rgba(255,235,59,0.4); animation: glow 1.2s ease-in-out infinite alternate; }
  @keyframes glow { from { box-shadow: 0 0 8px #ffeb3b; } to { box-shadow: 0 0 20px #ffeb3b, 0 0 40px rgba(255,235,59,0.3); } }

  /* Folded */
  .seat.folded { opacity: 0.35; }
  .seat.folded .seat-avatar { border-color: #999; box-shadow: none; animation: none; }

  /* All-in glow */
  .seat.allin .seat-avatar { border-color: #ff6b35; box-shadow: 0 0 12px #ff6b35, 0 0 24px rgba(255,107,53,0.4); }

  /* Community cards */
  .community { display: flex; gap: 4px; justify-content: center; margin-top: 4px; }
  .comm-card { width: 28px; height: 38px; border-radius: 3px; border: 1px dashed #666; background: #3a7a32; }

  /* Pot */
  .pot-display { text-align: center; margin-top: 6px; font-size: 12px; font-weight: 700; color: #fff; background: rgba(0,0,0,0.5); padding: 2px 12px; border-radius: 10px; display: inline-block; }
  .pot-row { text-align: center; }

  /* Action buttons */
  .action-bar { display: flex; gap: 6px; padding: 10px 16px; background: #fff; border-top: 1px solid #e0e0e0; }
  .action-btn { flex: 1; padding: 12px 0; border: 2px solid transparent; border-radius: 6px; font-size: 13px; font-weight: 700; cursor: pointer; text-align: center; transition: all 0.15s; }
  .btn-fold { background: #333; color: #fff; }
  .btn-call { background: #333; color: #fff; }
  .btn-bet { background: #e0e0e0; color: #333; }
  .btn-allin { background: #fff; color: #7c4dff; border: 2px solid #7c4dff; }

  /* Highlight */
  .action-btn.highlight { box-shadow: 0 0 0 3px #ff1744, 0 0 12px rgba(255,23,68,0.4); position: relative; }
  .action-btn.highlight::after { content: attr(data-label); position: absolute; top: -22px; left: 50%; transform: translateX(-50%); background: #ff1744; color: #fff; font-size: 10px; padding: 2px 8px; border-radius: 3px; white-space: nowrap; }

  /* Amount row */
  .amount-row { display: flex; align-items: center; gap: 8px; padding: 6px 16px; background: #f9f9f9; border-top: 1px solid #eee; }
  .amount-row.inactive { opacity: 0.3; }
  .amount-row.highlight-row { box-shadow: inset 0 0 0 2px #ff1744; border-radius: 4px; }
  .amount-label { font-size: 11px; color: #666; font-weight: 600; }
  .amount-input { flex: 1; padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; font-weight: 700; background: #fff; }
  .amount-input.has-value { border-color: #7c4dff; background: #f3f0ff; }

  /* Blind info */
  .blind-info { text-align: center; padding: 4px; font-size: 10px; color: #999; background: #fafafa; border-top: 1px solid #eee; }
</style>
</head>
<body>
<!-- This is the BASE template. Each step file will modify classes for:
     - .seat.active / .seat.folded / .seat.allin
     - .action-btn.highlight
     - .amount-row.inactive / .highlight-row
     - .amount-input value
-->
<div class="at-window">
  <div class="toolbar">
    <div class="toolbar-left">
      <div class="status-dot on"></div>
      <span class="toolbar-label">USB</span>
      <div class="status-dot on"></div>
      <span class="toolbar-label">WiFi</span>
    </div>
    <span class="hand-num">HAND #1</span>
  </div>

  <div class="table-area">
    <div class="table-felt">
      <div class="community" style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);">
        <div class="comm-card"></div>
        <div class="comm-card"></div>
        <div class="comm-card"></div>
        <div class="comm-card"></div>
        <div class="comm-card"></div>
      </div>
      <div class="pot-row" style="position:absolute; bottom:8px; left:50%; transform:translateX(-50%);">
        <span class="pot-display">POT: 1,500</span>
      </div>
    </div>

    <!-- S1 (D) eric — top -->
    <div class="seat s1 active" id="seat-s1">
      <span class="seat-pos pos-d">D</span>
      <div class="seat-avatar">E</div>
      <span class="seat-name">eric</span>
      <span class="seat-info">30,000</span>
      <div class="card-slots"><div class="card-slot dealt"></div><div class="card-slot dealt"></div></div>
    </div>

    <!-- S3 (SB) kurt23 — right -->
    <div class="seat s3" id="seat-s3">
      <span class="seat-pos pos-sb">SB</span>
      <div class="seat-avatar">K</div>
      <span class="seat-name">kurt23</span>
      <span class="seat-info">24,500</span>
      <div class="card-slots"><div class="card-slot dealt"></div><div class="card-slot dealt"></div></div>
    </div>

    <!-- S5 (BB) james — bottom -->
    <div class="seat s5" id="seat-s5">
      <span class="seat-pos pos-bb">BB</span>
      <div class="seat-avatar">J</div>
      <span class="seat-name">james</span>
      <span class="seat-info">39,000</span>
      <div class="card-slots"><div class="card-slot dealt"></div><div class="card-slot dealt"></div></div>
    </div>

    <!-- S8 (UTG) Ken — left -->
    <div class="seat s8 folded" id="seat-s8">
      <span class="seat-pos pos-utg">UTG</span>
      <div class="seat-avatar">K</div>
      <span class="seat-name">Ken</span>
      <span class="seat-info">20,000</span>
      <div class="card-slots"><div class="card-slot dealt"></div><div class="card-slot dealt"></div></div>
    </div>
  </div>

  <div class="action-bar">
    <div class="action-btn btn-fold" data-label="FOLD">FOLD</div>
    <div class="action-btn btn-call" data-label="CALL">CALL</div>
    <div class="action-btn btn-bet" data-label="BET">BET</div>
    <div class="action-btn btn-allin" data-label="ALL IN">ALL IN</div>
  </div>

  <div class="amount-row highlight-row">
    <span class="amount-label">AMOUNT</span>
    <input class="amount-input has-value" type="text" value="2,000" readonly>
  </div>

  <div class="blind-info">SB 500 / BB 1,000 &nbsp;|&nbsp; HOLD'EM &nbsp;|&nbsp; 4 Players</div>
</div>
</body>
</html>
