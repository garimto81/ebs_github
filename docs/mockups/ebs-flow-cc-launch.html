<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1000">
<title>EBS Flow — Command Center Launch</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Suisse Intl', 'Helvetica Neue', sans-serif; background: #fff; color: #111; font-size: 11px; }

  .hdr { background: #1a1a1a; color: #fff; padding: 6px 16px; display: flex; justify-content: space-between; align-items: center; font-size: 10px; }
  .hdr-left { font-weight: 700; letter-spacing: 1px; }
  .hdr-right { display: flex; align-items: center; gap: 12px; }
  .cc-btn { background: #333; color: #fff; padding: 3px 10px; font-size: 9px; font-weight: 700; border: none; letter-spacing: 0.5px; }
  .cc-btn .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #28a745; margin-left: 4px; vertical-align: middle; }
  .hdr-user { font-size: 9px; color: #999; }

  .bc { padding: 6px 16px; font-size: 10px; color: #888; border-bottom: 1px solid #eee; }
  .bc .cur { color: #111; font-weight: 700; }

  .flow { display: flex; align-items: flex-start; gap: 0; padding: 12px 16px; }
  .step { flex: 1; border: 1px solid #ddd; padding: 10px; background: #fafafa; }
  .step.highlight { border-color: #28a745; background: #f8fff8; }
  .step-num { font-size: 8px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #999; margin-bottom: 4px; }
  .step.highlight .step-num { color: #28a745; }

  .arrow { display: flex; align-items: center; justify-content: center; width: 28px; flex-shrink: 0; font-size: 18px; color: #ccc; font-weight: 300; padding-top: 20px; }

  /* Table row simulation */
  .tbl-row { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border: 1px solid #eee; background: #fff; font-size: 10px; }
  .tbl-name { font-weight: 700; width: 80px; }
  .status-idle { color: #999; font-weight: 600; }
  .status-live { color: #28a745; font-weight: 700; }
  .btn-act { font-size: 8px; font-weight: 700; padding: 2px 8px; border: 1px solid #222; cursor: pointer; }
  .btn-launch { background: #222; color: #fff; border-color: #222; }
  .btn-open { background: #fff; color: #222; }
  .op-info { font-size: 9px; color: #888; }
  .hand-info { font-size: 9px; color: #666; font-weight: 600; }

  /* Modal */
  .modal { border: 2px solid #222; padding: 12px; background: #fff; }
  .modal-title { font-size: 11px; font-weight: 700; margin-bottom: 8px; }
  .modal-field { margin-bottom: 6px; }
  .modal-label { font-size: 9px; color: #888; font-weight: 600; display: block; margin-bottom: 2px; }
  .modal-input { width: 100%; padding: 4px 6px; border: 1px solid #ccc; font-size: 10px; background: #fafafa; }
  .modal-actions { display: flex; gap: 6px; margin-top: 8px; }
  .btn-modal { font-size: 9px; padding: 3px 12px; border: 1px solid #222; font-weight: 700; cursor: pointer; }
  .btn-modal.primary { background: #222; color: #fff; }
  .btn-modal.secondary { background: #fff; color: #222; }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-left">EBS LOBBY</div>
  <div class="hdr-right">
    <button class="cc-btn">Active CC<span class="dot"></span>3</button>
    <span class="hdr-user">Admin: J.Kim</span>
  </div>
</div>
<div class="bc"><span class="cur">Command Center Launch Flow</span></div>

<div class="flow">
  <div class="step">
    <div class="step-num">Step 1 — Idle Table</div>
    <div class="tbl-row">
      <span class="tbl-name">Table #070</span>
      <span class="status-idle">○ IDLE</span>
      <span style="flex:1;"></span>
      <button class="btn-act btn-launch">Launch</button>
    </div>
    <div style="font-size:9px; color:#999; margin-top:4px;">No Command Center active</div>
  </div>

  <div class="arrow">→</div>

  <div class="step">
    <div class="step-num">Step 2 — Authentication</div>
    <div class="modal">
      <div class="modal-title">Launch Command Center</div>
      <div class="modal-field">
        <span class="modal-label">Table</span>
        <span style="font-weight:700;">Table #070</span>
      </div>
      <div class="modal-field">
        <span class="modal-label">Event Password</span>
        <input type="password" class="modal-input" value="••••••••" readonly>
      </div>
      <div class="modal-actions">
        <button class="btn-modal primary">Confirm</button>
        <button class="btn-modal secondary">Cancel</button>
      </div>
    </div>
  </div>

  <div class="arrow">→</div>

  <div class="step highlight">
    <div class="step-num">Step 3 — Live</div>
    <div class="tbl-row" style="border-color:#28a745;">
      <span class="tbl-name">Table #070</span>
      <span class="status-live">● LIVE</span>
      <span class="op-info">Op.A</span>
      <span class="hand-info">Hand #1</span>
      <span style="flex:1;"></span>
      <button class="btn-act btn-open">Open</button>
    </div>
    <div style="font-size:9px; color:#28a745; margin-top:4px; font-weight:600;">Command Center activated</div>
  </div>
</div>

</body>
</html>
