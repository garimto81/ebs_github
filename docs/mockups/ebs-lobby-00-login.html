<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=500">
<title>EBS Lobby — Screen 0: Login</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Suisse Intl', 'Helvetica Neue', sans-serif; background: #fff; color: #111; font-size: 11px; }

  /* Header - login version (logo only) */
  .hdr { background: #1a1a1a; color: #fff; padding: 6px 16px; display: flex; align-items: center; font-size: 10px; }
  .hdr-left { font-weight: 700; letter-spacing: 1px; }

  /* Login Container */
  .login-wrap { display: flex; justify-content: center; align-items: center; padding: 32px 16px 24px; }
  .login-box { width: 340px; border: 1px solid #e0e0e0; padding: 28px 32px; background: #fff; }
  .login-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; letter-spacing: 0.5px; }

  .form-group { margin-bottom: 14px; display: flex; align-items: center; gap: 10px; }
  .form-icon { width: 20px; text-align: center; color: #888; font-size: 13px; }
  .form-input { flex: 1; padding: 8px 10px; border: 1px solid #ccc; font-size: 11px; font-family: inherit; }
  .form-input:focus { outline: none; border-color: #888; }

  .forgot { text-align: right; margin-bottom: 16px; }
  .forgot a { font-size: 10px; color: #666; text-decoration: underline; }

  .btn-login { width: 100%; padding: 9px; background: #1a1a1a; color: #fff; border: none; font-size: 12px; font-weight: 700; cursor: pointer; letter-spacing: 0.5px; margin-bottom: 10px; }
  .btn-login:hover { background: #333; }

  .btn-entra { width: 100%; padding: 8px; background: #fff; border: 1px solid #ccc; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; color: #555; }
  .entra-icon { width: 14px; height: 14px; background: #0078d4; display: inline-block; }
  .tbd { font-size: 9px; color: #999; margin-left: 4px; }
</style>
</head>
<body>

<!-- Header -->
<div class="hdr">
  <div class="hdr-left">EBS</div>
</div>

<!-- Login Form -->
<div class="login-wrap">
  <div class="login-box">
    <div class="login-title">Login</div>

    <div class="form-group">
      <span class="form-icon">👤</span>
      <input type="text" class="form-input" placeholder="Email">
    </div>

    <div class="form-group">
      <span class="form-icon">🔒</span>
      <input type="password" class="form-input" placeholder="Password">
    </div>

    <div class="forgot"><a href="#">Forgot your Password?</a></div>

    <button class="btn-login">Login</button>

    <button class="btn-entra">
      <span class="entra-icon"></span>
      Sign In With Entra ID <span class="tbd">(TBD)</span>
    </button>
  </div>
</div>

</body>
</html>
