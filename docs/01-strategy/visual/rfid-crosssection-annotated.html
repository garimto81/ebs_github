<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0f1923; font-family: 'Segoe UI','Noto Sans KR',sans-serif; padding: 24px 32px; width: 1200px; color: #e0e0e0; }
h2 { font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 4px; }
.sub { font-size: 12px; color: #667788; margin-bottom: 16px; }
.img-container { position: relative; display: inline-block; }
.img-container img { width: 1136px; border-radius: 8px; border: 1px solid #2a3a4a; }
.label {
  position: absolute; font-size: 11px; font-weight: 700; padding: 3px 10px;
  border-radius: 4px; white-space: nowrap;
}
.l-orange { background: rgba(230,126,34,0.9); color: #fff; }
.l-green { background: rgba(46,139,87,0.9); color: #fff; }
.l-blue { background: rgba(60,120,200,0.85); color: #fff; }
.arrow-line {
  position: absolute; border-left: 2px solid; height: 30px;
}
</style>
</head>
<body>
<h2>RFID 테이블 3D 단면도 — 안테나 배치</h2>
<div class="sub">테이블 천 아래에 12개 안테나가 매립되어 있다</div>
<div class="img-container">
  <img src="../../../images/prd/rfid-vpt-3d-crosssection.png" alt="RFID 3D crosssection">
  <!-- Player Hole Cards 안테나 (양쪽) -->
  <div class="label l-orange" style="top:38%; left:8%;">Player ×10<br>홀카드 감지</div>
  <div class="label l-orange" style="top:38%; right:10%;">Player ×10<br>홀카드 감지</div>
  <!-- Community Cards 안테나 (중앙 상단) -->
  <div class="label l-green" style="top:18%; left:42%;">Community ×1<br>보드 카드 감지</div>
  <!-- Dealer Burn Cards (중앙 하단) -->
  <div class="label l-blue" style="top:62%; left:42%;">Burn ×1<br>번 카드 감지</div>
  <!-- RFID Reader (중앙) -->
  <div class="label" style="top:42%; left:44%; background:rgba(160,80,200,0.85); color:#fff;">RFID Reader<br>ST25R3911B+ESP32</div>
</div>
</body>
</html>
