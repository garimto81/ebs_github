<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0f1923; font-family: 'Segoe UI','Noto Sans KR',sans-serif; padding: 36px 48px; width: 1200px; color: #e0e0e0; }
h2 { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 6px; }
.sub { font-size: 13px; color: #667788; margin-bottom: 24px; }
.row { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 16px; }
.card {
  width: 68px; height: 94px; background: #fff; border-radius: 7px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  font-weight: 700; font-size: 20px;
}
.card .s { font-size: 15px; margin-top: -2px; }
.bk { color: #1a1a1a; }
.rd { color: #e03030; }
.border-gold { border: 3px solid #e67e22; }
.border-green { border: 3px solid #3a8a5a; }
.border-dim { border: 3px solid #2a3a4a; opacity: 0.4; }
.border-best { border: 3px solid #e67e22; box-shadow: 0 0 12px rgba(230,126,34,0.3); }
.label { font-size: 13px; font-weight: 700; }
.sym { font-size: 28px; color: #445566; }
.group { text-align: center; }
.group-title { font-size: 12px; color: #667788; margin-bottom: 8px; }
.badge { display: inline-block; padding: 4px 14px; border-radius: 6px; font-size: 13px; font-weight: 700; }
</style>
</head>
<body>
<h2>7장 중 최고 5장으로 승부</h2>
<div class="sub">내 비공개 2장 + 공유 5장 = 총 7장 → 이 중 가장 강한 5장 조합을 선택</div>

<div class="row">
  <div class="group">
    <div class="group-title" style="color:#e67e22;">비공개 2장</div>
    <div style="display:flex; gap:8px;">
      <div class="card bk border-gold"><span>A</span><span class="s">♠</span></div>
      <div class="card rd border-gold"><span>K</span><span class="s">♥</span></div>
    </div>
  </div>
  <div class="sym">+</div>
  <div class="group">
    <div class="group-title" style="color:#3a8a5a;">공유 5장</div>
    <div style="display:flex; gap:8px;">
      <div class="card rd border-green"><span>A</span><span class="s">♦</span></div>
      <div class="card bk border-green"><span>7</span><span class="s">♣</span></div>
      <div class="card bk border-dim"><span>2</span><span class="s">♠</span></div>
      <div class="card rd border-green"><span>K</span><span class="s">♦</span></div>
      <div class="card bk border-green"><span>10</span><span class="s">♣</span></div>
    </div>
  </div>
  <div class="sym">=</div>
  <div class="group">
    <div class="group-title" style="color:#e67e22;">최고 5장!</div>
    <div style="display:flex; gap:8px;">
      <div class="card bk border-best"><span>A</span><span class="s">♠</span></div>
      <div class="card rd border-best"><span>A</span><span class="s">♦</span></div>
      <div class="card rd border-best"><span>K</span><span class="s">♥</span></div>
      <div class="card rd border-best"><span>K</span><span class="s">♦</span></div>
      <div class="card bk border-best"><span>10</span><span class="s">♣</span></div>
    </div>
  </div>
</div>

<div style="text-align:center;">
  <span class="badge" style="background:#2a1a10; color:#e67e22;">Two Pair — A와 K 두 쌍</span>
  <span style="font-size:12px; color:#556677; margin-left:12px;">2♠은 조합에서 제외 (가장 약한 카드)</span>
</div>
</body>
</html>
