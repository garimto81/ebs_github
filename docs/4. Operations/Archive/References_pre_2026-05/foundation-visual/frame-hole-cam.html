<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0f1923; font-family: 'Segoe UI','Noto Sans KR',sans-serif; padding: 24px 32px; width: 1200px; color: #e0e0e0; }
.frame {
  display: inline-block; background: #141e2a; border: 1px solid #2a3a4a;
  border-radius: 12px; padding: 16px; text-align: center;
}
.frame img { max-height: 320px; border-radius: 6px; border: 1px solid #2a3a4a; }
.caption { font-size: 13px; color: #c0d0e0; font-weight: 600; margin-top: 12px; }
.source { font-size: 10px; color: #445566; margin-top: 4px; }
.year-badge {
  display: inline-block; background: #e67e22; color: #fff;
  font-size: 12px; font-weight: 700; padding: 2px 10px; border-radius: 10px;
  margin-right: 8px;
}
</style>
</head>
<body>
<div class="frame">
  <img src="../../../images/web/hole-card-cam-history.jpeg" alt="Hole Card Camera - WPT">
  <div class="caption"><span class="year-badge">2002</span>WPT 홀카메라 — 테이블 유리판 아래에 카메라를 설치</div>
  <div class="source">출처: World Poker Tour</div>
</div>
</body>
</html>
