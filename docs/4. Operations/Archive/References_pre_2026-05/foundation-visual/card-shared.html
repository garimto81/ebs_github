<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0f1923; font-family: 'Segoe UI','Noto Sans KR',sans-serif; padding: 36px 48px; width: 1200px; color: #e0e0e0; }
h2 { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 6px; }
.sub { font-size: 13px; color: #667788; margin-bottom: 24px; }
.board { display: flex; gap: 12px; justify-content: center; margin-bottom: 12px; }
.card {
  width: 80px; height: 110px; background: #fff; border-radius: 8px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  font-weight: 700; font-size: 24px; border: 3px solid #3a8a5a;
}
.card .suit { font-size: 18px; margin-top: -2px; }
.black { color: #1a1a1a; }
.red { color: #e03030; }
.caption { text-align: center; font-size: 13px; color: #3a8a5a; margin-top: 8px; }
</style>
</head>
<body>
<h2>"모두가 공유하는 카드" — 커뮤니티 카드</h2>
<div class="sub">테이블 가운데에 모든 플레이어가 함께 사용하는 카드가 놓인다</div>
<div class="board">
  <div class="card red"><span>A</span><span class="suit">♦</span></div>
  <div class="card black"><span>7</span><span class="suit">♣</span></div>
  <div class="card black"><span>2</span><span class="suit">♠</span></div>
  <div class="card red"><span>K</span><span class="suit">♦</span></div>
  <div class="card black"><span>10</span><span class="suit">♣</span></div>
</div>
<div class="caption">이 5장은 모든 플레이어가 같이 봅니다</div>
</body>
</html>
