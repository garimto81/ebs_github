version: 10.3.0
project_name: ebs
project_root: C:/claude/ebs
worktree_sibling_dir: C:/claude
orchestrator: conductor (single user, AI-centric)
streams:
  S1:
    name: Foundation
    role: 기획 기초 + 핵심 비전 문서
    worktree: C:/claude/ebs-foundation
    absorbs_existing: []
    phases:
      P1:
        scope_owns:
        - docs/1. Product/Foundation.md
        scope_read:
        - docs/1. Product/References/**
    blocked_by: []
    blocks: []
    meta_files_blocked:
    - CLAUDE.md
    - MEMORY.md
    - docs/2. Development/2.5 Shared/team-policy.json
    - docs/4. Operations/team_assignment_v10_3.yaml
    - docs/4. Operations/Multi_Session_Design_v10.3.md
  S2:
    name: Lobby Stream
    role: Lobby 기획 + Frontend Lobby 코드
    worktree: C:/claude/ebs-lobby-stream
    absorbs_existing:
    - team1-frontend
    phases:
      P2:
        scope_owns:
        - docs/2. Development/2.1 Frontend/Lobby/**
        - docs/1. Product/Lobby_PRD.md
        scope_read:
        - docs/1. Product/Foundation.md
        - team1-frontend/CLAUDE.md
        blocked:
        - team1-frontend/src/**
        - team1-frontend/test/**
      P5:
        scope_owns:
        - team1-frontend/**
        - docs/2. Development/2.1 Frontend/Lobby/**
        scope_read:
        - docs/1. Product/Lobby_PRD.md
    blocked_by: []
    blocks: []
    meta_files_blocked: &id001
    - CLAUDE.md
    - MEMORY.md
    - docs/2. Development/2.5 Shared/team-policy.json
    - docs/4. Operations/team_assignment_v10_3.yaml
  S3:
    name: Command Center Stream
    role: CC 기획 + CC 코드
    worktree: C:/claude/ebs-cc-stream
    absorbs_existing:
    - team4-cc
    phases:
      P2:
        scope_owns:
        - docs/2. Development/2.4 Command Center/**
        - docs/1. Product/Command_Center_PRD.md
        scope_read:
        - docs/1. Product/Foundation.md
        - team4-cc/CLAUDE.md
        blocked:
        - team4-cc/src/**
      P5:
        scope_owns:
        - team4-cc/**
        - docs/2. Development/2.4 Command Center/**
    blocked_by: []
    blocks: []
    meta_files_blocked: *id001
  S4:
    name: RIVE Standards
    role: Rive 오버레이 그래픽 표준 (state machine, 이벤트 프로토콜)
    worktree: C:/claude/ebs-rive-standards
    absorbs_existing: []
    phases:
      P2:
        scope_owns:
        - docs/2. Development/2.5 Shared/RIVE_Standards.md
        - docs/2. Development/2.5 Shared/RIVE_Event_Protocol.md
        scope_read:
        - docs/1. Product/Foundation.md
    blocked_by: []
    blocks: []
    meta_files_blocked: *id001
  S5:
    name: AI Track Restructuring
    role: AI 전용 문서 재구조화 (rule 13 v3.1 호환 형식)
    worktree: C:/claude/ebs-ai-track
    absorbs_existing: []
    phases:
      P3:
        scope_owns:
        - tools/ai_track/**
        - docs/_generated/**
        scope_read:
        - docs/2. Development/**
        - docs/4. Operations/**
    blocked_by: []
    blocks: []
    meta_files_blocked: *id001
  S6:
    name: Prototype Stream
    role: 프로토타입 빌드 plan + 통합 테스트
    worktree: C:/claude/ebs-prototype
    absorbs_existing:
    - integration-tests
    phases:
      P3:
        scope_owns:
        - docs/4. Operations/Prototype_Build_Plan.md
        - integration-tests/**
        scope_read:
        - docs/1. Product/**
        - docs/2. Development/**
    blocked_by: []
    blocks: []
    meta_files_blocked: *id001
future_streams:
  S7:
    name: Backend Stream
    worktree: C:/claude/ebs-backend-stream
    absorbs_existing:
    - team2-backend
    activation_trigger: 사용자가 'backend 코드 시작' 요청 시
    inferred_blocked_by: []
  S8:
    name: Engine Stream
    worktree: C:/claude/ebs-engine-stream
    absorbs_existing:
    - team3-engine
    activation_trigger: 사용자가 'engine 코드 시작' 요청 시
    inferred_blocked_by: []
  S9:
    name: QA Stream
    worktree: C:/claude/ebs-qa
    absorbs_existing: []
    activation_trigger: 사용자가 'QA 추가' 요청 시
    inferred_blocked_by: []
meta_files:
  owner: orchestrator
  files:
  - CLAUDE.md
  - MEMORY.md
  - docs/2. Development/2.5 Shared/team-policy.json
  - docs/4. Operations/team_assignment_v10_3.yaml
  - docs/4. Operations/Multi_Session_Design_v10.3.md
work_declaration_protocol:
  on_start:
  - 'Run: python tools/orchestrator/team_session_start.py --title=''<제목>'''
  - 'Auto-creates: GitHub Issue + Draft PR with stream label'
  on_complete:
  - 'Run: python tools/orchestrator/team_session_end.py --message=''<요약>'''
  - 'Auto: PR ready, auto-merge enabled, branch deleted on merge'
monitoring:
  command: python tools/orchestrator/orchestrator_monitor.py --config=docs/4. Operations/team_assignment_v10_3.yaml
  interval_seconds: 30
  metrics:
  - team_idle_time
  - issue_age
  - pr_age
  - last_commit_time
  - dependency_violations
