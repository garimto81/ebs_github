future_streams:
  S9:
    name: QA Stream
    worktree: C:/claude/ebs-qa
    absorbs_existing: []
    activation_trigger: 사용자가 'QA 추가' 요청 시
    inferred_blocked_by: []
meta_files:
  owner: orchestrator
  files:
  - CLAUDE.md
  - MEMORY.md
  - docs/2. Development/2.5 Shared/team-policy.json
  - docs/4. Operations/team_assignment_v10_3.yaml
  - docs/4. Operations/Multi_Session_Design_v10.3.md
work_declaration_protocol:
  on_start:
  - 'Run: python tools/orchestrator/team_session_start.py --title=''<제목>'''
  - 'Auto-creates: GitHub Issue + Draft PR with stream label'
  on_complete:
  - 'Run: python tools/orchestrator/team_session_end.py --message=''<요약>'''
  - 'Auto: PR ready, auto-merge enabled, branch deleted on merge'
monitoring:
  command: python tools/orchestrator/orchestrator_monitor.py --config=docs/4. Operations/team_assignment_v10_3.yaml
  interval_seconds: 30
  metrics:
  - team_idle_time
  - issue_age
  - pr_age
  - last_commit_time
  - dependency_violations
