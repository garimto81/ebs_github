# EBS 통합 Docker Compose — Multi-Service LAN 네트워크 배포
#
# 2026-04-27 — SG-022 (단일 Desktop 바이너리) 공식 폐기. Multi-Service Docker 채택.
# Lobby (team1) 와 CC (team4) 는 단일 앱이 아니며 각각 독립 Flutter 프로젝트로 존재.
# Docker 격리 컨테이너로 기동되어 ebs-net 네트워크에서 BO/Engine 과 협력.
#
# 서비스 토폴로지 (모두 ebs-net 공유):
#   bo (team2)         :8000   ← REST/WebSocket Backend
#   redis              :6380   ← session/pub-sub
#   engine (team3)     :8080   ← Game Engine harness
#   lobby-web (team1)  :3000   ← Flutter Web (운영자 대시보드)        [profile: web]
#   cc-web (team4)     :3001   ← Flutter Web (Command Center)         [profile: web]
#
# 사용법:
#   개발 (localhost):       docker compose up -d
#   LAN:                   EBS_EXTERNAL_HOST=192.168.1.100 docker compose up -d
#   LAN + 모든 Web:         EBS_EXTERNAL_HOST=192.168.1.100 docker compose --profile web up -d
#   Lobby Web 만:           docker compose --profile web up -d lobby-web
#   CC Web 만:              docker compose --profile web up -d cc-web
#   CC 개발 최소:            docker compose up -d bo redis engine
#   로그 추적:               docker compose logs -f bo
#   전체 중지:               docker compose down
#
# CC 네이티브 디버깅 (개발자 전용, 배포 아님):
#   cd team4-cc/src
#   flutter run -d windows --dart-define=DEMO_MODE=true \
#     --dart-define=BO_URL=http://192.168.1.100:8000 \
#     --dart-define=ENGINE_URL=http://192.168.1.100:8080
#
# ── 환경 변수 설명 ──────────────────────────────────────────────────────────
# EBS_EXTERNAL_HOST  — BO 서버의 LAN/WAN IP (default: localhost)
#                      launch-cc 응답의 ws_url, rest_url 생성에 사용됨
# CORS_ORIGINS       — CORS 허용 오리진 JSON 배열 (default: ["*"])
#                      prod 환경에서는 명시적 Origin 목록 설정 필수
# JWT_SECRET         — JWT 서명 시크릿 (prod에서 반드시 변경)
# AUTH_PROFILE       — 인증 프로파일: dev (자동 로그인) / prod (정식 인증)
# LOG_LEVEL          — 로그 레벨: DEBUG / INFO / WARNING / ERROR
# RFID_MODE          — RFID 모드: mock (시뮬) / real (하드웨어)

services:
  # ── Backend / Back Office (team2) ──────────────────────────────────────────
  bo:
    build: team2-backend/
    container_name: ebs-bo
    networks:
      - ebs-net
    ports:
      - "8000:8000"
    environment:
      # DB: SQLite (dev) — prod에서 PostgreSQL 전환 가능
      - DATABASE_URL=sqlite:///data/ebs.db
      # Redis: 세션/캐시/pub-sub
      - REDIS_URL=redis://redis:6379/0
      # JWT 인증 설정
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-me-in-production}
      - JWT_ALGORITHM=HS256
      - AUTH_PROFILE=dev          # dev=자동 로그인, prod=정식 인증
      - JWT_ACCESS_TTL_S=3600     # 토큰 만료: 1시간
      # 하드웨어 모드
      - RFID_MODE=mock            # mock=시뮬레이션, real=ST25R3911B
      - LOG_LEVEL=DEBUG
      # CORS: dev 기본값 ["*"] — prod에서는 명시적 Origin 설정 필수
      - CORS_ORIGINS=${CORS_ORIGINS:-["*"]}
      # LAN 배포: BO 서버의 외부 IP (launch-cc 응답의 ws_url/rest_url 생성용)
      - EBS_EXTERNAL_HOST=${EBS_EXTERNAL_HOST:-localhost}
      # Multi-Service Docker (SG-022 폐기 cascade) — 상대 서비스 위치 주입
      - LOBBY_URL=${LOBBY_URL:-http://lobby-web:3000}
      - CC_URL=${CC_URL:-http://cc-web:3001}
    volumes:
      - bo-data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ebs-redis
    networks:
      - ebs-net
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      # 2026-05-03 — Windows dynamic-port-range (1024-15001) collision on 6380/6381.
      # Internal `redis:6379` (ebs-net) unaffected. Host debug port shifted above
      # dynamic range to avoid bind contention with WinNAT/Hyper-V allocations.
      # 2026-05-11 (S11 Day-1) — wslrelay PID 55860 hijacked 16379 after redis Exit(255)
      # 4 days ago; port stays allocated by Docker Desktop relay until DD reset. Shifted
      # to 16380 (verified free). Recovery procedure: docs/4. Operations/Docker_Runtime.md
      # §"Redis revival after wslrelay port hijack". 127.0.0.1 bind constrains exposure.
      - "127.0.0.1:16380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    # 2026-05-11 (S11 Day-1 후속) — restart policy 누락으로 redis Exit(255) 4 일간
    # silent down → bo healthcheck (/health only) 가 redis 의존성을 masking 하여 발견 지연.
    # bo/engine/lobby-web/cc-web/proxy 모두 `unless-stopped` 정책 보유, redis 만 누락이었음.
    # 자동 재시도로 transient wsl/docker networking glitch 회복 시간 단축.
    restart: unless-stopped

  # ── Game Engine Harness (team3) ────────────────────────────────────────────
  engine:
    build: team3-engine/ebs_game_engine/
    container_name: ebs-engine
    networks:
      - ebs-net
    ports:
      - "8080:8080"
    environment:
      - LOG_LEVEL=debug
      # Multi-Service Docker (SG-022 폐기 cascade)
      - BO_URL=${BO_URL:-http://bo:8000}
    healthcheck:
      # 2026-04-28 — P2 정렬. team3 engine binary 에 /health endpoint 추가됨
      # (lib/harness/server.dart). 이전 cosmetic `/` fix 는 standardize 되지 않아
      # 다음 healthcheck 도구와 UX 비대칭 — bo `/health`, lobby/cc `/healthz`,
      # engine 단독 `/` 였음. 본 commit 으로 engine 도 표준 `/health` 사용.
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  # ── Lobby Web (team1, Flutter Web 빌드) ────────────────────────────────────
  # 2026-04-27 — SG-022 폐기 cascade. 단일 Desktop 통합 폐기, Web Multi-Service 채택.
  # 운영자가 브라우저로 http://<lan-ip>:3000/ 접속.
  # 빌드: docker compose --profile web build lobby-web
  lobby-web:
    image: ebs/lobby-web:${LOBBY_WEB_TAG:-latest}
    build:
      # 2026-04-28 — Type A 갭 (Monorepo build context promotion).
      # 이전: context=./team1-frontend → COPY ../shared/ebs_common 컨텍스트 위반.
      # 변경: context=. (project root) → ebs_common (path:../shared/ebs_common 의존)
      # 정상 접근 가능. Dockerfile COPY paths 도 team1-frontend/ prefix 됨.
      context: .
      dockerfile: team1-frontend/docker/lobby-web/Dockerfile
      args:
        ENV_FILE: production.json
        # 2026-05-07: 빌드 식별자 — `tools/build_lobby.sh` 가 BUILD_ID env 로 자동 주입.
        # 미설정 시 default `dev` (Dockerfile ARG) → login/sidebar footer 에 표시.
        BUILD_ID: ${BUILD_ID:-dev}
    container_name: ebs-lobby-web
    profiles: ["web"]
    networks:
      - ebs-net
    ports:
      - "3000:3000"
    environment:
      - BO_URL=${BO_URL:-http://bo:8000}
      - ENGINE_URL=${ENGINE_URL:-http://engine:8080}
      - CC_URL=${CC_URL:-http://cc-web:3001}
    # 2026-05-12 (S11 Cycle 9, issue #355) — nginx config runtime override.
    # team1-frontend/docker/lobby-web/nginx.conf (Phase 5 stale) 는 /api/, /ws/ proxy 부재.
    # bind-mount 로 image 내 default.conf 를 infra/web/lobby-web.nginx.conf 로 덮어쓰면
    # /api/v1/auth/login 등이 nginx → bo:8000 reverse proxy 됨 (동일 origin, CORS 무관).
    # S2 가 향후 in-image config 와 sync 하면 본 mount 제거 가능.
    volumes:
      - ./infra/web/lobby-web.nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      bo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/healthz"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
    restart: unless-stopped
    labels:
      - "ebs.team=team1"
      - "ebs.service=lobby-web"
      - "ebs.phase=5-production"
      - "ebs.deprecates=SG-022"

  # ── CC Web (team4, Flutter Web 빌드) ────────────────────────────────────
  # 2026-04-27 — SG-022 폐기 cascade. team1 lobby-web 패턴 복제 (multi-stage build).
  # Demo Mode 정규 LAN 배포. 브라우저 접속: http://<lan-ip>:3001/
  # 빌드: docker compose --profile web build cc-web
  cc-web:
    image: ebs/cc-web:${CC_WEB_TAG:-latest}
    build:
      context: ./team4-cc
      dockerfile: docker/cc-web/Dockerfile
      args:
        ENV_FILE: production.json
    container_name: ebs-cc-web
    profiles: ["web"]
    networks:
      - ebs-net
    ports:
      - "3001:3001"
    environment:
      - BO_URL=${BO_URL:-http://bo:8000}
      - ENGINE_URL=${ENGINE_URL:-http://engine:8080}
      - LOBBY_URL=${LOBBY_URL:-http://lobby-web:3000}
    # 2026-05-12 (S11 Cycle 9, issue #355) — nginx config runtime override.
    # team4-cc/docker/cc-web/nginx.conf 도 동일하게 /api/, /ws/ proxy 부재. lobby-web 패턴 적용.
    volumes:
      - ./infra/web/cc-web.nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      bo:
        condition: service_healthy
      engine:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3001/healthz"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
    restart: unless-stopped
    labels:
      - "ebs.team=team4"
      - "ebs.service=cc-web"
      - "ebs.phase=5-production"
      - "ebs.deprecates=SG-022"

  # ── LAN Reverse Proxy (subdomain routing on :80) ────────────────────────────
  # 2026-04-29 (PR #69, LAN domain deployment). hostname-based access:
  #   http://lobby.ebs.local/   → lobby-web:3000
  #   http://cc.ebs.local/      → cc-web:3001
  #   http://api.ebs.local/     → bo:8000   (REST + WS /ws/*)
  #   http://engine.ebs.local/  → engine:8080
  #   http://ebs.local/         → lobby (default)
  #
  # 사용자 LAN 클라이언트는 hosts file 또는 라우터 DNS 에 다음 매핑 등록:
  #   <HOST_LAN_IP> ebs.local lobby.ebs.local cc.ebs.local api.ebs.local engine.ebs.local
  #
  # 자동 등록: tools/setup_lan_access.{ps1,sh}
  # 가이드: docs/4. Operations/LAN_DEPLOYMENT.md
  proxy:
    image: nginx:1.27-alpine
    container_name: ebs-proxy
    profiles: ["web"]   # lobby/cc 와 동일 profile (full LAN deployment 시 활성화)
    networks:
      - ebs-net
    ports:
      - "80:80"
    volumes:
      - ./infra/proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      lobby-web:
        condition: service_healthy
      cc-web:
        condition: service_healthy
      bo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
    restart: unless-stopped
    labels:
      - "ebs.team=conductor"
      - "ebs.service=proxy"
      - "ebs.phase=5-production"

volumes:
  bo-data:
    driver: local
  redis-data:
    driver: local

# ── 네트워크 (ebs-net) ──────────────────────────────────────────────────────
# 모든 서비스가 ebs-net 단일 bridge 네트워크에서 협력.
# 컨테이너 간 통신은 service name 으로 (예: http://bo:8000, http://lobby-web:3000).
# 호스트 → 외부 노출:
#   bo        → localhost:8000
#   engine    → localhost:8080
#   redis     → localhost:6380
#   lobby-web → localhost:3000  (profile web)
#   cc-web    → localhost:3001  (profile web)
networks:
  ebs-net:
    driver: bridge
    name: ebs-net
