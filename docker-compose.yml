# EBS 통합 Docker Compose — LAN 네트워크 배포
#
# 서비스: BO (team2) + Redis + Engine (team3) + Lobby Web (team1) + CC Web (team4)
# 데스크톱 앱 (team1 Lobby / team4 CC) 는 호스트에서 별도 실행 가능 (병행).
#
# 사용법:
#   개발 (localhost):       docker compose up -d
#   LAN:                   EBS_EXTERNAL_HOST=192.168.1.100 docker compose up -d
#   LAN + 모든 Web:         EBS_EXTERNAL_HOST=192.168.1.100 docker compose --profile web up -d
#   Lobby Web 만:           docker compose --profile web up -d lobby-web
#   CC 개발 최소:            docker compose up -d bo redis engine
#   로그 추적:               docker compose logs -f bo
#   전체 중지:               docker compose down
#
# CC 호스트 실행 (LAN IP 예시):
#   cd team4-cc/src
#   flutter run -d windows --dart-define=DEMO_MODE=true \
#     --dart-define=BO_URL=http://192.168.1.100:8000 \
#     --dart-define=ENGINE_URL=http://192.168.1.100:8080
#
# ── 환경 변수 설명 ──────────────────────────────────────────────────────────
# EBS_EXTERNAL_HOST  — BO 서버의 LAN/WAN IP (default: localhost)
#                      launch-cc 응답의 ws_url, rest_url 생성에 사용됨
# CORS_ORIGINS       — CORS 허용 오리진 JSON 배열 (default: ["*"])
#                      prod 환경에서는 명시적 Origin 목록 설정 필수
# JWT_SECRET         — JWT 서명 시크릿 (prod에서 반드시 변경)
# AUTH_PROFILE       — 인증 프로파일: dev (자동 로그인) / prod (정식 인증)
# LOG_LEVEL          — 로그 레벨: DEBUG / INFO / WARNING / ERROR
# RFID_MODE          — RFID 모드: mock (시뮬) / real (하드웨어)

services:
  # ── Backend / Back Office (team2) ──────────────────────────────────────────
  bo:
    build: team2-backend/
    ports:
      - "8000:8000"
    environment:
      # DB: SQLite (dev) — prod에서 PostgreSQL 전환 가능
      - DATABASE_URL=sqlite:///data/ebs.db
      # Redis: 세션/캐시/pub-sub
      - REDIS_URL=redis://redis:6379/0
      # JWT 인증 설정
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-me-in-production}
      - JWT_ALGORITHM=HS256
      - AUTH_PROFILE=dev          # dev=자동 로그인, prod=정식 인증
      - JWT_ACCESS_TTL_S=3600     # 토큰 만료: 1시간
      # 하드웨어 모드
      - RFID_MODE=mock            # mock=시뮬레이션, real=ST25R3911B
      - LOG_LEVEL=DEBUG
      # CORS: dev 기본값 ["*"] — prod에서는 명시적 Origin 설정 필수
      - CORS_ORIGINS=${CORS_ORIGINS:-["*"]}
      # LAN 배포: BO 서버의 외부 IP (launch-cc 응답의 ws_url/rest_url 생성용)
      - EBS_EXTERNAL_HOST=${EBS_EXTERNAL_HOST:-localhost}
    volumes:
      - bo-data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── Game Engine Harness (team3) ────────────────────────────────────────────
  engine:
    build: team3-engine/ebs_game_engine/
    ports:
      - "8080:8080"
    environment:
      - LOG_LEVEL=debug
    restart: unless-stopped

  # ── Lobby Web (team1, Flutter Web + nginx reverse proxy) ─────────────
  # LAN 내 브라우저 접속: http://LAN_IP:3000
  # Dockerfile 내부에서 Flutter SDK 받아 build web 수행 후 nginx 로 서빙.
  # nginx 가 /api, /ws 를 bo:8000 으로 reverse proxy → 브라우저 CORS 불필요.
  # 재빌드: docker compose --profile web build --no-cache lobby-web
  # 기획/배포 SSOT: docs/2. Development/2.1 Frontend/Deployment.md
  lobby-web:
    build:
      context: .
      dockerfile: team1-frontend/Dockerfile
    image: ebs-lobby-web
    ports:
      - "3000:80"
    depends_on:
      - bo
    restart: unless-stopped
    healthcheck:
      # busybox wget (alpine) IPv6 우선 시도로 localhost 실패 → 127.0.0.1 명시
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    profiles:
      - web  # docker compose --profile web up -d lobby-web

  # ── CC Web (team4, Flutter Web 빌드) ────────────────────────────────────
  # Demo Mode 전용. LAN 내 브라우저 접속: http://LAN_IP:3100
  # 빌드 전 실행 필요: cd team4-cc/src && flutter build web --release --dart-define=DEMO_MODE=true
  cc-web:
    image: nginx:alpine
    ports:
      - "3100:80"
    volumes:
      - ./team4-cc/src/build/web:/usr/share/nginx/html:ro
    depends_on:
      - bo
      - engine
    restart: unless-stopped
    profiles:
      - web  # docker compose --profile web up -d 로 활성화

volumes:
  bo-data:
    driver: local
  redis-data:
    driver: local

# ── 네트워크 ────────────────────────────────────────────────────────────────
# Docker Compose 기본 네트워크에서 서비스 간 통신:
#   bo → redis (redis://redis:6379)
#   engine → 독립 (외부 요청만 수신)
#   호스트 → bo (localhost:8000), engine (localhost:8080)
#   CC (호스트) → bo (LAN_IP:8000), engine (LAN_IP:8080)
