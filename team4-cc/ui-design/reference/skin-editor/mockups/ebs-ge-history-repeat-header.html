<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=720">
<title>GE — History (Repeating Header)</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ── EBS Dark Tokens ── */
  body.body--dark {
    --ebs-surface: #2d2d30;
    --ebs-panel: #252526;
    --ebs-border: #3e3e42;
    --ebs-bg: #1e1e1e;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    line-height: 1.2;
    background: var(--ebs-bg);
    margin: 0;
    padding: 0;
    max-width: 720px;
  }

  /* ── Annotation Tokens ── */
  .eid { font-size: 10px; color: #808080; font-weight: 400; margin-left: 4px; }
  .eid-block { font-size: 9px; color: #808080; font-weight: 400; display: block; margin-bottom: 0; }

  /* ── Mode Toggle ── */
  body.clean .eid,
  body.clean .eid-block { display: none !important; }

  body.annotated .eid,
  body.annotated .eid-block { display: none !important; }

  /* Zone bounding boxes */
  body.annotated .zone-canvas {
    outline: 2px solid #9C27B0; outline-offset: 3px; position: relative;
  }
  body.annotated .zone-canvas::before {
    content: 'Canvas 345:33 (1 element)';
    position: absolute; top: -14px; left: 0;
    font-size: 9px; font-weight: 600; padding: 1px 6px;
    background: #9C27B0; color: white; border-radius: 2px; z-index: 10;
  }

  /* Individual field bounding boxes */
  body.annotated .af {
    position: relative;
    outline: 1px solid var(--zc, #999);
    outline-offset: 1px;
    border-radius: 3px;
  }
  body.annotated .af::before {
    content: attr(data-eid);
    position: absolute; top: -11px; left: 0;
    font-size: 8px; font-weight: 600; padding: 0px 3px;
    background: var(--zc, #999); color: white;
    border-radius: 2px; line-height: 1.4;
    z-index: 10; white-space: nowrap;
  }
  .zone-canvas .af { --zc: #9C27B0; }

  /* ── Layout ── */
  .ebs-dialog {
    background: var(--ebs-panel);
    border-radius: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    overflow: hidden;
    width: 600px;
    max-width: 720px;
  }
  .ebs-titlebar {
    background: #1a1a1b;
    color: #cccccc;
    padding: 3px 10px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.2px;
    display: flex;
    align-items: center;
    border-bottom: 1px solid var(--ebs-border);
    height: 24px;
    box-sizing: border-box;
    gap: 6px;
  }
  .ebs-titlebar .spacer { flex: 1; }
  .ebs-titlebar .close-btn {
    font-size: 13px; color: #808080; cursor: default;
    background: none; border: none; padding: 0 2px;
    font-family: 'Inter', sans-serif; line-height: 1;
  }

  /* ── Canvas Zone ── */
  .ge-canvas-zone {
    contain: inline-size;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
  }
  .ge-canvas-area {
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1a1a1a;
    height: 120px;
    box-sizing: border-box;
    padding: 0 4px;
  }
  .ge-canvas {
    aspect-ratio: 345 / 33;
    height: 60px;
    max-width: 100%;
    position: relative;
    background: #2a2a2a;
    overflow: hidden;
  }
  .ge-canvas-el {
    position: absolute;
    border: 1px dashed rgba(255,255,255,0.2);
    font-size: 9px;
    color: #bdbdbd;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 1px;
    box-sizing: border-box;
    overflow: hidden;
    white-space: nowrap;
  }
  .ge-canvas-el.selected {
    border: 1px dashed #FFD700;
    color: #FFD700;
  }
  .ge-bg-inline {
    height: 20px;
    box-sizing: border-box;
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 0 6px;
    font-size: 9px;
    color: #aaaaaa;
    background: var(--ebs-panel);
    border-bottom: 1px solid var(--ebs-border);
  }
  .ge-bg-inline .spacer { flex: 1; }

  /* ── Footer ── */
  .ebs-footer {
    text-align: center;
    padding: 1px 0;
    font-size: 9px;
    color: #555;
    background: var(--ebs-bg);
    line-height: 1;
    overflow: hidden;
    height: 4px;
  }
</style>
</head>
<body class="body--dark">

<div class="ebs-dialog">

  <!-- Titlebar -->
  <div class="ebs-titlebar">
    GE &mdash; History (Repeating Header)
    <span class="spacer"></span>
    <button class="close-btn">&#10005;</button>
  </div>

  <!-- Canvas Zone -->
  <div class="ge-canvas-zone zone-canvas">
    <div class="ge-canvas-area af" data-eid="GE-01">
      <div class="ge-canvas">
        <div class="ge-canvas-el selected" style="left:0%;top:0%;width:100%;height:100%;">Rep. Header</div>
      </div>
    </div>
    <div class="ge-bg-inline af" data-eid="GE-23">
      <span class="label">BG:</span>
      <button class="btn btn-sm" style="font-size:9px;padding:1px 4px;">Import</button>
      <button class="btn btn-sm" style="font-size:9px;padding:1px 4px;">Delete</button>
      <span class="spacer"></span>
      <span class="label">Mode</span>
      <select style="font-size:9px;padding:1px 2px;">
        <option>Header</option>
        <option selected>Repeating header</option>
        <option>Repeating detail</option>
        <option>Footer</option>
      </select>
      <span class="eid">GE-23</span>
    </div>
  </div>

  <!-- Footer -->
  <div class="ebs-footer">mockups/ebs-ge-history-repeat-header.html</div>

</div><!-- .ebs-dialog -->

<script>
var q = location.search;
if (q.includes('clean')) document.body.classList.add('clean');
if (q.includes('annotated')) document.body.classList.add('annotated');
</script>
</body>
</html>
