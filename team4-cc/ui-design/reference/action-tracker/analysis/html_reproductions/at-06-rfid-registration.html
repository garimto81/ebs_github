<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AT-06 RFID Registration — Pure HTML Reproduction</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    /* ── Root container: 786 × 553 ── */
    .screenshot-container {
      width: 786px;
      height: 553px;
      position: relative;
      overflow: hidden;
    }

    /* ─────────────────────────────────────
       id=6  Black Background (content area)
       top: 3.6% of 553 = ~20px  (titlebar height)
    ───────────────────────────────────── */
    .black-bg {
      position: absolute;
      left: 0; top: 0;
      width: 100%;
      height: 100%;
      background: #000;
    }

    /* ─────────────────────────────────────
       TITLEBAR  (ids 1–5)
       Windows-style: light gray bg, ~30px tall
    ───────────────────────────────────── */
    .titlebar {
      position: absolute;
      left: 0; top: 0;
      width: 100%;
      height: 30px;
      background: #f0f0f0;
      border-bottom: 1px solid #c8c8c8;
      display: flex;
      align-items: center;
      padding: 0 6px 0 6px;
      z-index: 5;
    }

    /* id=1  App Icon */
    .tb-icon {
      width: 16px;
      height: 16px;
      background: #2d7bc4;
      border-radius: 2px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .tb-icon::after {
      content: '';
      width: 8px;
      height: 8px;
      background: #fff;
      border-radius: 1px;
    }

    /* id=2  Title Text */
    .tb-title {
      flex: 1;
      font-size: 12px;
      color: #1a1a1a;
      margin-left: 7px;
      white-space: nowrap;
      overflow: hidden;
    }

    /* ids 3,4,5  Window control buttons */
    .tb-buttons {
      display: flex;
      height: 100%;
      margin-left: 4px;
    }
    .tb-btn {
      width: 46px;
      height: 30px;
      border: none;
      background: transparent;
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 11px;
      color: #333;
      cursor: default;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .tb-btn:hover {
      background: #e1e1e1;
    }
    .tb-btn.close {
      background: #C0392B;
      color: #fff;
    }
    .tb-btn.close:hover {
      background: #e04030;
    }

    /* ─────────────────────────────────────
       Content centering wrapper
       Starts at top: 30px (after titlebar)
    ───────────────────────────────────── */
    .content-area {
      position: absolute;
      left: 0;
      top: 30px;
      width: 100%;
      height: calc(100% - 30px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 22px;
    }

    /* ─────────────────────────────────────
       id=7  Instruction Label
       bbox_pct: x=22.5 y=38 w=55 h=8
       → absolute coords: left=177px top=210px w=432px h=44px
    ───────────────────────────────────── */
    .instruction-label {
      background: #111;
      border: 2.5px solid #aaa;
      border-radius: 10px;
      padding: 10px 28px;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.4px;
      white-space: nowrap;
      text-shadow: 0 1px 2px rgba(0,0,0,0.8);
    }

    /* ─────────────────────────────────────
       id=8  Card Image
       bbox_pct: x=34 y=47 w=18 h=18
       → abs: left=267px top=260px w=141px h=100px
    ───────────────────────────────────── */
    .card-image {
      width: 141px;
      height: 100px;
      background: #d8d8d8;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      box-shadow:
        0 2px 0 #bbb,
        0 3px 6px rgba(0,0,0,0.6);
    }
    .card-rank {
      font-size: 52px;
      font-weight: 900;
      color: #111;
      line-height: 1;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    .card-suit {
      font-size: 44px;
      color: #111;
      line-height: 1;
    }

    /* ─────────────────────────────────────
       id=9  CANCEL Button
       bbox_pct: x=22.5 y=67 w=55 h=10
       → abs: left=177px top=370px w=432px h=55px
    ───────────────────────────────────── */
    .cancel-btn {
      width: 432px;
      height: 55px;
      background: linear-gradient(to bottom, #8B0000 0%, #6e0000 50%, #4a0000 100%);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 1.5px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 1px 0 rgba(255,255,255,0.1) inset,
        0 3px 8px rgba(0,0,0,0.7);
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>
  <div class="screenshot-container">

    <!-- id=6: Black Background (entire content area behind titlebar) -->
    <div
      class="black-bg"
      data-element-id="6"
      data-element-name="Black Background"
      data-element-group="background"
    ></div>

    <!-- ── TITLEBAR (ids 1–5) ── -->
    <div class="titlebar">
      <!-- id=1: App Icon -->
      <div
        class="tb-icon"
        data-element-id="1"
        data-element-name="App Icon"
        data-element-group="titlebar"
      ></div>

      <!-- id=2: Title Text -->
      <span
        class="tb-title"
        data-element-id="2"
        data-element-name="Title Text"
        data-element-group="titlebar"
      >PokerGFX Action Tracker © 2026</span>

      <div class="tb-buttons">
        <!-- id=3: Minimize Button -->
        <button
          class="tb-btn minimize"
          data-element-id="3"
          data-element-name="Minimize Button"
          data-element-group="titlebar"
        >&#x2014;</button>

        <!-- id=4: Maximize Button -->
        <button
          class="tb-btn maximize"
          data-element-id="4"
          data-element-name="Maximize Button"
          data-element-group="titlebar"
        >&#x25A1;</button>

        <!-- id=5: Close Button (Window) -->
        <button
          class="tb-btn close"
          data-element-id="5"
          data-element-name="Close Button (Window)"
          data-element-group="titlebar"
        >&#x2715;</button>
      </div>
    </div>

    <!-- ── CONTENT AREA: ids 7, 8, 9 ── -->
    <div class="content-area">

      <!-- id=7: Instruction Label -->
      <div
        class="instruction-label"
        data-element-id="7"
        data-element-name="Instruction Label"
        data-element-group="rfid"
      >PLACE THIS CARD ON ANY ANTENNA</div>

      <!-- id=8: Card Image (Ace of Spades) -->
      <div
        class="card-image"
        data-element-id="8"
        data-element-name="Card Image"
        data-element-group="rfid"
      >
        <span class="card-rank">A</span>
        <span class="card-suit">&#x2660;</span>
      </div>

      <!-- id=9: CANCEL Button -->
      <div
        class="cancel-btn"
        data-element-id="9"
        data-element-name="CANCEL Button"
        data-element-group="rfid"
      >CANCEL</div>

    </div>

  </div>
</body>
</html>
