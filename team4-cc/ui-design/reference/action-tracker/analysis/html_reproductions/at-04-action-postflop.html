<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=786">
<title>AT-04: Post-Flop Action</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a1a;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    font-family: 'Segoe UI', Arial, sans-serif;
  }

  .screenshot-container {
    width: 786px;
    height: 553px;
    position: relative;
    background: #1a1a1a;
    overflow: hidden;
  }

  /* =========================================
     TITLEBAR (id=1)
     ========================================= */
  .titlebar {
    position: absolute;
    left: 0; top: 0;
    width: 100%;
    height: 4.5%;
    background: #2d2d2d;
    display: flex;
    align-items: center;
    padding: 0 6px;
    border-bottom: 1px solid #555;
    z-index: 10;
  }
  .titlebar-icon {
    width: 14px;
    height: 14px;
    margin-right: 5px;
    background: #aaa;
    border-radius: 2px;
    flex-shrink: 0;
    font-size: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #333;
  }
  .titlebar-text {
    color: #ddd;
    font-size: 11px;
    flex: 1;
  }
  .titlebar-buttons {
    display: flex;
    height: 100%;
  }
  .titlebar-btn {
    width: 28px;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #ccc;
    font-size: 12px;
    cursor: pointer;
  }
  .titlebar-btn:hover { background: #555; }
  .titlebar-btn.close-btn { background: transparent; color: #ccc; }
  .titlebar-btn.close-btn:hover { background: #e74c3c; color: #fff; }

  /* =========================================
     TOOLBAR (id=2~10)
     ========================================= */
  .toolbar {
    position: absolute;
    left: 0;
    top: 4.5%;
    width: 100%;
    height: 12.7%;
    background: #2a2a2a;
    display: flex;
    border-bottom: 1px solid #444;
    z-index: 5;
  }
  .toolbar-cell {
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    border-right: 1px solid #444;
    cursor: pointer;
    flex-shrink: 0;
    overflow: hidden;
  }

  /* id=2: USB (0–8.1%) */
  .tb-usb {
    width: 8.1%;
    background: #333;
  }
  .usb-symbol {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .usb-arrow {
    color: #bbb;
    font-size: 18px;
    transform: rotate(90deg);
    line-height: 1;
  }
  .usb-plug {
    width: 8px; height: 4px;
    background: #bbb;
    border-radius: 1px;
  }

  /* id=3: WiFi (8.1–16.2%) */
  .tb-wifi {
    width: 8.1%;
    background: #4CAF50;
  }
  .wifi-bars {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    height: 20px;
  }
  .wifi-bar {
    width: 5px;
    background: #fff;
    border-radius: 1px;
  }

  /* id=4: input (16.2–36.9%) */
  .tb-input {
    width: 20.7%;
    background: #222;
    padding: 5px 6px;
  }
  .tb-input-box {
    width: 100%;
    height: 70%;
    background: #000;
    border: 1px solid #555;
    border-radius: 2px;
  }

  /* id=5: HAND (36.9–48.1%) */
  .tb-hand {
    width: 11.2%;
    background: #111;
    flex-direction: column;
    gap: 0;
  }
  .hand-label {
    color: #aaa;
    font-size: 10px;
    font-weight: bold;
    letter-spacing: 1px;
    line-height: 1.4;
  }
  .hand-number {
    color: #fff;
    font-size: 20px;
    font-weight: bold;
    line-height: 1;
  }

  /* gap 48.1–57.8% */
  .tb-gap {
    width: 9.7%;
    background: #1a1a1a;
  }

  /* id=6: camera (57.8–67%) */
  .tb-camera {
    width: 9.2%;
    background: #8B0000;
  }
  .cam-icon {
    display: flex;
    align-items: center;
    gap: 2px;
  }
  .cam-body {
    width: 20px; height: 14px;
    background: #eee;
    border-radius: 2px;
    position: relative;
  }
  .cam-lens {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 8px; height: 8px;
    background: #666;
    border-radius: 50%;
    border: 1px solid #333;
  }
  .cam-trigger {
    position: absolute;
    top: -4px; left: 50%;
    transform: translateX(-50%);
    width: 6px; height: 4px;
    background: #eee;
    border-radius: 1px 1px 0 0;
  }

  /* id=7: GFX (67–76.2%) */
  .tb-gfx {
    width: 9.2%;
    background: #333;
  }
  .tb-gfx .lbl {
    color: #fff;
    font-size: 14px;
    font-weight: bold;
    letter-spacing: 1px;
  }

  /* id=8: REGISTER (76.2–85.4%) */
  .tb-register {
    width: 9.2%;
    background: #444;
    flex-direction: column;
    gap: 1px;
  }
  .tb-register .lbl {
    color: #fff;
    font-size: 8px;
    font-weight: bold;
    letter-spacing: 0.5px;
    text-align: center;
    line-height: 1.3;
  }

  /* id=9: fullscreen (85.4–92.5%) */
  .tb-fullscreen {
    width: 7.1%;
    background: #444;
  }
  .expand-icon {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 4px;
    width: 18px; height: 18px;
  }
  .expand-icon span {
    color: #fff;
    font-size: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* id=10: close X (92.5–100%) */
  .tb-close {
    width: 7.5%;
    background: #C0392B;
    border-right: none;
  }
  .tb-close .lbl {
    color: #fff;
    font-size: 16px;
    font-weight: bold;
  }

  /* =========================================
     CARD ICONS ROW (id=11~20)
     ========================================= */
  .card-icons-row {
    position: absolute;
    left: 0;
    top: 17.2%;
    width: 100%;
    height: 12.7%;
    display: flex;
    background: #1a1a1a;
    z-index: 5;
  }
  .card-cell {
    width: 10%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    border-right: 1px solid #3a3a3a;
    cursor: pointer;
    flex-shrink: 0;
  }
  .card-cell:last-child { border-right: none; }
  .card-cell.has-card { background: #DAA520; }
  .card-cell.no-card  { background: #2a2a2a; }

  /* Card graphic using CSS only */
  .card-graphic {
    display: flex;
    align-items: center;
    gap: 3px;
  }
  .card-shape {
    width: 22px;
    height: 30px;
    border-radius: 3px;
    border: 2px solid;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .card-cell.has-card .card-shape {
    background: #f5f5f5;
    border-color: #a07000;
  }
  .card-cell.no-card .card-shape {
    background: #444;
    border-color: #555;
  }
  .card-inner {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    border: 1px solid;
  }
  .card-cell.has-card .card-inner { border-color: #888; background: #ddd; }
  .card-cell.no-card  .card-inner { border-color: #666; background: #555; }

  .plus-icon {
    font-size: 14px;
    font-weight: bold;
    line-height: 1;
  }
  .card-cell.has-card .plus-icon { color: #fff; }
  .card-cell.no-card  .plus-icon { color: #555; }

  /* =========================================
     SEAT LABELS ROW (id=21~30)
     ========================================= */
  .seat-labels-row {
    position: absolute;
    left: 0;
    top: 29.9%;
    width: 100%;
    height: 12.7%;
    display: flex;
    z-index: 5;
  }
  .seat-cell {
    width: 10%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    border-right: 1px solid #3a3a3a;
    cursor: pointer;
    flex-shrink: 0;
  }
  .seat-cell:last-child { border-right: none; }

  .seat-cell.turn    { background: #C0392B; }
  .seat-cell.active  { background: #e8e8e8; }
  .seat-cell.empty   { background: #2a2a2a; }

  .seat-cell.turn  .seat-lbl { color: #fff; font-size: 13px; font-weight: bold; text-align: center; }
  .seat-cell.active .seat-lbl { color: #111; font-size: 13px; font-weight: bold; text-align: center; }
  .seat-cell.empty  .seat-lbl { color: #888; font-size: 12px; text-align: center; line-height: 1.3; }

  /* =========================================
     MIDDLE BACKGROUND
     ========================================= */
  .middle-bg {
    position: absolute;
    left: 0;
    top: 42.5%;
    width: 100%;
    height: 40%;
    background: #1a1a1a;
    z-index: 1;
  }

  /* =========================================
     ACTION PANEL elements (id=31–36)
     ========================================= */

  /* id=31: MISS DEAL */
  .miss-deal {
    position: absolute;
    left: 0;
    top: 46%;
    width: 11%;
    height: 20%;
    background: #C0392B;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border: 1px solid #a02020;
    z-index: 5;
  }
  .miss-deal:hover { filter: brightness(1.15); }
  .miss-deal .btn-lbl {
    color: #fff;
    font-size: 15px;
    font-weight: bold;
    text-align: center;
    line-height: 1.3;
  }

  /* id=32: TAG star */
  .tag-btn {
    position: absolute;
    left: 91%;
    top: 44%;
    width: 9%;
    height: 12%;
    background: #8B0000;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border: 1px solid #6a0000;
    border-radius: 4px;
    z-index: 5;
  }
  .tag-btn:hover { filter: brightness(1.2); }
  .star-icon {
    color: #fff;
    font-size: 24px;
    line-height: 1;
  }

  /* id=33: community cards area */
  .community-area {
    position: absolute;
    left: 13%;
    top: 46%;
    width: 68%;
    height: 16%;
    background: #111;
    border: 1px solid #333;
    border-radius: 3px;
    z-index: 5;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .comm-card {
    width: 45px;
    height: 62px;
    background: #fff;
    border-radius: 4px;
    border: 1px solid #ccc;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: bold;
  }
  .comm-card.red { color: #C0392B; }
  .comm-card.black { color: #111; }

  /* id=34: player info bar */
  .player-info {
    position: absolute;
    left: 13%;
    top: 62%;
    width: 68%;
    height: 14%;
    background: #222;
    border: 1px solid #3a3a3a;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 2px;
    z-index: 5;
  }
  .player-info .info-lbl {
    color: #fff;
    font-size: 14px;
    font-weight: bold;
    letter-spacing: 0.5px;
  }

  /* id=35: record button */
  .record-btn {
    position: absolute;
    left: 81%;
    top: 62%;
    width: 10%;
    height: 14%;
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border: 1px solid #333;
    z-index: 5;
  }
  .record-btn:hover { filter: brightness(1.3); }
  .record-dot {
    width: 30px;
    height: 30px;
    background: #E74C3C;
    border-radius: 50%;
    border: 2px solid #c0392b;
    box-shadow: 0 0 8px rgba(231,76,60,0.6);
  }

  /* id=36: HIDE GFX */
  .hide-gfx {
    position: absolute;
    left: 83%;
    top: 53%;
    width: 17%;
    height: 9%;
    background: #666;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border: 1px solid #777;
    border-radius: 3px;
    z-index: 5;
  }
  .hide-gfx:hover { filter: brightness(1.15); }
  .hide-gfx .btn-lbl {
    color: #fff;
    font-size: 12px;
    font-weight: bold;
    letter-spacing: 0.5px;
  }

  /* =========================================
     BOTTOM ACTION BUTTONS (id=37~41)
     ========================================= */
  .action-row {
    position: absolute;
    left: 0;
    top: 82.5%;
    width: 100%;
    height: 17.5%;
    display: flex;
    background: #111;
    border-top: 2px solid #333;
    gap: 0;
    z-index: 5;
  }

  .act-btn {
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: filter 0.1s;
  }
  .act-btn:hover { filter: brightness(1.2); }

  /* id=37: back (0–9%) */
  .btn-back {
    width: 9%;
    background: #6B2222;
    border-right: 1px solid #3a3a3a;
  }
  .btn-back .act-lbl {
    color: #fff;
    font-size: 26px;
    font-weight: bold;
    line-height: 1;
  }

  /* id=38: FOLD (9–28%) */
  .btn-fold {
    width: 19%;
    background: #2E7D32;
    margin: 4px 3px;
    border-radius: 6px;
  }
  .btn-fold .act-lbl {
    color: #fff;
    font-size: 20px;
    font-weight: bold;
    letter-spacing: 1px;
  }

  /* id=39: CHECK (28–46%) */
  .btn-call {
    width: 18%;
    background: #2E7D32;
    margin: 4px 3px;
    border-radius: 6px;
  }
  .btn-call .act-lbl {
    color: #fff;
    font-size: 20px;
    font-weight: bold;
    letter-spacing: 1px;
  }

  /* id=40: BET (46–64%) */
  .btn-raise {
    width: 18%;
    background: #2E7D32;
    margin: 4px 3px;
    border-radius: 6px;
  }
  .btn-raise .act-lbl {
    color: #fff;
    font-size: 15px;
    font-weight: bold;
    letter-spacing: 0.5px;
  }

  /* id=41: ALL IN (64–82%) */
  .btn-allin {
    width: 18%;
    background: #2E7D32;
    margin: 4px 3px;
    border-radius: 6px;
  }
  .btn-allin .act-lbl {
    color: #fff;
    font-size: 18px;
    font-weight: bold;
    letter-spacing: 1px;
  }

  /* spacer 82–100% */
  .btn-spacer {
    flex: 1;
    background: #111;
  }
</style>
