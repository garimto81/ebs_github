<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EBS AT — Settings View</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/quasar@2/dist/quasar.prod.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Icons&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body { margin: 0; padding: 0; background: #fff; font-family: 'Noto Sans KR', sans-serif; }
  #q-app { max-width: 720px; margin: 0 auto; }

  .at-toolbar {
    height: 44px; background: #f0f0f0;
    border-bottom: 1px solid #d0d0d0;
    display: flex; align-items: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; letter-spacing: 0.08em;
    text-transform: uppercase; color: #1a1a1a;
  }
  .tb-seg {
    display: flex; align-items: center; height: 100%;
    padding: 0 12px; border-right: 1px solid #d0d0d0;
    gap: 6px; white-space: nowrap;
  }
  .tb-seg--spacer { flex: 1; }
  .tb-seg--right { border-right: none; border-left: 1px solid #d0d0d0; padding: 0; gap: 0; }
  .tb-icon {
    font-size: 12px; cursor: pointer; padding: 0 10px;
    height: 100%; display: flex; align-items: center;
    border-right: 1px solid #d0d0d0; color: #555;
  }
  .tb-icon:last-child { border-right: none; }
  .tb-icon:hover { background: #e8e8e8; color: #1a1a1a; }
  .conn-dot {
    width: 7px; height: 7px; border-radius: 50%; background: #1a1a1a;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .auto-badge {
    border: 1px solid #1a1a1a; padding: 1px 6px;
    font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
    background: #1a1a1a; color: #fff;
  }
  .hand-label { font-size: 13px; font-weight: 600; letter-spacing: 0.15em; color: #1a1a1a; }

  /* Seat + Straddle Grid */
  .seat-straddle-block { border-bottom: 1px solid #d0d0d0; }
  .seat-row {
    display: flex; height: 30px;
    border-bottom: 1px solid #e0e0e0;
  }
  .seat-cell {
    flex: 1; display: flex; align-items: center; justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;
    border-right: 1px solid #e0e0e0; color: #555;
  }
  .seat-cell:last-child { border-right: none; }

  /* Card Status Row */
  .card-status-row {
    height: 44px; border-bottom: 1px solid #d0d0d0;
    display: flex; align-items: center; justify-content: center;
    gap: 8px; padding: 0 16px; background: #fafafa;
  }
  .status-dot {
    width: 18px; height: 18px; border-radius: 50%;
    border: 1px solid #d0d0d0; background: #f0f0f0;
  }
  .status-dot--ok { background: #1a1a1a; border-color: #1a1a1a; }
  .status-dot--warn { background: #aaa; border-color: #aaa; }
  .status-label {
    font-family: 'IBM Plex Mono', monospace; font-size: 9px;
    color: #999; letter-spacing: 0.08em; text-transform: uppercase;
  }

  /* Settings form */
  .settings-scroll {
    max-height: 420px; overflow-y: auto; background: #fafafa;
  }
  .section-header {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; font-weight: 600; letter-spacing: 0.12em;
    text-transform: uppercase; color: #888;
    padding: 14px 16px 6px 16px;
  }
  .form-row {
    display: flex; align-items: center; gap: 12px;
    padding: 6px 16px;
  }
  .form-row .q-field { flex: 1; }
  .form-row-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: #555;
    min-width: 120px; flex-shrink: 0;
  }

  /* Bottom buttons */
  .bottom-actions {
    height: 56px; display: flex; align-items: center; justify-content: center; gap: 12px;
    border-top: 1px solid #d0d0d0; background: #fafafa;
  }

  /* Quasar overrides */
  .q-field--outlined .q-field__control { font-family: 'IBM Plex Mono', monospace; font-size: 12px; }
  .q-toggle__label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; }
</style>
</head>
<body>
<div id="q-app">

  <!-- TOOLBAR -->
  <div class="at-toolbar">
    <div class="tb-seg">
      <span class="conn-dot"></span>
      <span>CONNECTED</span>
    </div>
    <div class="tb-seg tb-seg--spacer">
      <span class="hand-label">HAND&nbsp;&nbsp;#247</span>
    </div>
    <div class="tb-seg tb-seg--right">
      <div class="tb-icon"><span class="auto-badge">AUTO</span></div>
      <div class="tb-icon"><q-icon name="photo_camera" size="16px"></q-icon></div>
      <div class="tb-icon">GFX</div>
      <div class="tb-icon">REG</div>
      <div class="tb-icon"><q-icon name="close" size="16px"></q-icon></div>
    </div>
  </div>

  <!-- SEAT + STRADDLE GRID -->
  <div class="seat-straddle-block">
    <div class="seat-row">
      <div class="seat-cell" v-for="n in 10" :key="'s'+n">SEAT {{ n }}</div>
    </div>
    <div style="display:flex;height:26px;">
      <div v-for="(s, i) in straddles" :key="'str'+i"
        style="flex:1;display:flex;align-items:center;justify-content:center;border-right:1px solid #e0e0e0;font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:0.05em;text-transform:uppercase;"
        :style="{ color: s ? '#1a1a1a' : '#aaa', fontWeight: s ? '600' : '400', background: s ? '#f0f0f0' : 'transparent' }">
        <q-toggle v-model="straddles[i]" dense size="xs" color="dark" :label="s ? 'ON' : 'OFF'"
          style="font-size:9px;" />
      </div>
    </div>
  </div>

  <!-- CARD STATUS ROW -->
  <div class="card-status-row">
    <div v-for="(st, i) in cardStatus" :key="'cd'+i"
      class="status-dot"
      :class="{ 'status-dot--ok': st === 'ok', 'status-dot--warn': st === 'warn' }">
    </div>
    <span class="status-label">CARD SCAN STATUS</span>
  </div>

  <!-- SETTINGS SECTIONS -->
  <div class="settings-scroll">
    <q-form>

      <!-- Connection -->
      <q-separator />
      <div class="section-header">CONNECTION</div>
      <div class="form-row">
        <span class="form-row-label">SERVER IP</span>
        <q-input v-model="settings.serverIp" outlined dense
          style="flex:1;font-family:'IBM Plex Mono',monospace;" />
      </div>
      <div class="form-row">
        <span class="form-row-label">PORT</span>
        <q-input v-model="settings.port" outlined dense
          style="flex:1;font-family:'IBM Plex Mono',monospace;" />
      </div>
      <div class="form-row">
        <span class="form-row-label">AUTO-RECONNECT</span>
        <q-toggle v-model="settings.autoReconnect" color="dark" />
      </div>

      <!-- Display -->
      <q-separator />
      <div class="section-header">DISPLAY</div>
      <div class="form-row">
        <span class="form-row-label">THEME</span>
        <q-select v-model="settings.theme" :options="['Minimal White']" outlined dense
          style="flex:1;font-family:'IBM Plex Mono',monospace;" />
      </div>
      <div class="form-row">
        <span class="form-row-label">FONT SIZE</span>
        <q-select v-model="settings.fontSize" :options="['Small', 'Medium', 'Large']" outlined dense
          style="flex:1;font-family:'IBM Plex Mono',monospace;" />
      </div>
      <div class="form-row">
        <span class="form-row-label">FULLSCREEN</span>
        <q-toggle v-model="settings.fullscreen" color="dark" />
      </div>

      <!-- Game Defaults -->
      <q-separator />
      <div class="section-header">GAME DEFAULTS</div>
      <div class="form-row">
        <span class="form-row-label">DEFAULT GAME</span>
        <q-select v-model="settings.defaultGame" :options="['HOLDEM', 'PLO4', 'PLO5', 'SHORT DECK']" outlined dense
          style="flex:1;font-family:'IBM Plex Mono',monospace;" />
      </div>
      <div class="form-row">
        <span class="form-row-label">DEFAULT SB</span>
        <q-input v-model="settings.defaultSB" outlined dense
          style="flex:1;font-family:'IBM Plex Mono',monospace;" />
      </div>
      <div class="form-row">
        <span class="form-row-label">DEFAULT BB</span>
        <q-input v-model="settings.defaultBB" outlined dense
          style="flex:1;font-family:'IBM Plex Mono',monospace;" />
      </div>

      <!-- Keyboard -->
      <q-separator />
      <div class="section-header">KEYBOARD</div>
      <div class="form-row">
        <span class="form-row-label">SHORTCUT HINTS</span>
        <q-toggle v-model="settings.shortcutHints" color="dark" />
      </div>
      <div class="form-row">
        <span class="form-row-label">CUSTOM BINDINGS</span>
        <q-btn outline dense no-caps label="CONFIGURE"
          style="font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;letter-spacing:0.08em;color:#1a1a1a;border-color:#d0d0d0;" />
      </div>

    </q-form>
  </div>

  <!-- BOTTOM BUTTONS -->
  <div class="bottom-actions">
    <q-btn flat dense no-caps label="CANCEL"
      style="font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;letter-spacing:0.08em;color:#555;min-width:100px;height:44px;border:1px solid #d0d0d0;" />
    <q-btn unelevated dense no-caps label="SAVE"
      style="font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;letter-spacing:0.08em;color:#fff;background:#1a1a1a;min-width:100px;height:44px;" />
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/quasar@2/dist/quasar.umd.prod.js"></script>
<script>
const app = Vue.createApp({
  data() {
    return {
      straddles: [true, true, false, false, false, false, false, false, false, false],
      cardStatus: ['ok', 'ok', 'ok', 'warn', 'warn', 'warn', 'empty', 'empty', 'empty', 'empty'],
      settings: {
        serverIp: '192.168.1.100',
        port: '9001',
        autoReconnect: true,
        theme: 'Minimal White',
        fontSize: 'Medium',
        fullscreen: false,
        defaultGame: 'HOLDEM',
        defaultSB: '100',
        defaultBB: '200',
        shortcutHints: true
      }
    }
  }
});
app.use(Quasar);
app.mount('#q-app');
</script>
</body>
</html>
