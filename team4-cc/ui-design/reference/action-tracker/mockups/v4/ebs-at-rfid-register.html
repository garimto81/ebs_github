<!DOCTYPE html>
<!-- v4 Quasar — RFID Card Registration (EBS-AT-05) -->
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EBS AT — RFID Register</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/quasar@2/dist/quasar.prod.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Icons&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #fff; }

  .rfid-root {
    width: 720px; max-width: 720px;
    background: #fafafa;
    border: 2px solid #d0d0d0;
    font-family: 'IBM Plex Mono', monospace;
    margin: 0 auto;
    display: flex; flex-direction: column;
    align-items: center;
    padding: 24px 60px;
  }

  /* INSTRUCTION BOX */
  .instr-box {
    width: 100%;
    border: 1px solid #d0d0d0;
    padding: 16px 24px;
    text-align: center;
    margin-bottom: 36px;
    background: #f0f0f0;
    box-shadow: 2px 2px 0 #e0e0e0;
  }
  .instr-text {
    font-size: 14px; font-weight: 600; letter-spacing: 0.2em;
    text-transform: uppercase; color: #1a1a1a; line-height: 1.4;
  }

  /* CARD DISPLAY */
  .card-display {
    display: flex; flex-direction: column; align-items: center;
    margin-bottom: 28px;
  }
  .card-wrap {
    position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  .big-card {
    width: 110px; height: 150px;
    border: 2px solid #d0d0d0; border-radius: 6px;
    background: #fff; color: #1a1a1a;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 4px;
    box-shadow: 3px 3px 0 #e0e0e0;
    position: relative;
  }
  .big-card__corner-tl {
    position: absolute; top: 8px; left: 10px;
    font-size: 16px; font-weight: 600; line-height: 1;
    color: #1a1a1a;
  }
  .big-card__corner-br {
    position: absolute; bottom: 8px; right: 10px;
    font-size: 16px; font-weight: 600; line-height: 1;
    transform: rotate(180deg); color: #1a1a1a;
  }
  .big-card__center-rank {
    font-size: 48px; font-weight: 600; letter-spacing: -0.04em; line-height: 1;
    color: #1a1a1a;
  }
  .big-card__center-suit {
    font-size: 28px; line-height: 1; color: #1a1a1a;
  }
  .card-label {
    font-size: 9px; color: #888; text-align: center; letter-spacing: 0.12em;
    text-transform: uppercase; margin-top: 10px;
  }

  /* SCAN ANIMATION */
  .scan-ring {
    width: 130px; height: 170px;
    border: 1px solid #d0d0d0;
    border-radius: 8px;
    position: absolute;
    animation: scan-pulse 1.5s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes scan-pulse {
    0%   { transform: scale(1);    opacity: 0.8; border-color: #ccc; }
    50%  { transform: scale(1.06); opacity: 0.3; border-color: #aaa; }
    100% { transform: scale(1);    opacity: 0.8; border-color: #ccc; }
  }

  /* WAITING */
  .waiting-row {
    display: flex; align-items: center; gap: 8px;
    margin-top: -20px; margin-bottom: 28px;
  }
  .wait-dot {
    width: 6px; height: 6px; border-radius: 50%; background: #1a1a1a;
    animation: wait-blink 1.2s ease-in-out infinite;
  }
  .wait-dot:nth-child(2) { animation-delay: 0.2s; }
  .wait-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes wait-blink { 0%,100%{opacity:0.2} 50%{opacity:1} }
  .wait-label { font-size: 9px; color: #888; letter-spacing: 0.15em; text-transform: uppercase; }

  /* PROGRESS (q-linear-progress overrides) */
  .progress-section {
    width: 100%;
    display: flex; flex-direction: column; align-items: center;
    gap: 8px; margin-bottom: 36px;
  }
  .progress-label-row {
    display: flex; align-items: center; gap: 8px;
  }
  .progress-label {
    font-size: 11px; color: #888; letter-spacing: 0.12em; text-transform: uppercase;
  }
  .progress-count {
    font-size: 14px; font-weight: 600; color: #1a1a1a; letter-spacing: 0.04em;
  }
  .progress-total {
    font-size: 11px; color: #888; letter-spacing: 0.04em;
  }
  .progress-bar-wrap {
    width: 320px;
  }
  .progress-bar-wrap .q-linear-progress {
    height: 6px;
    border: 1px solid #d0d0d0;
    border-radius: 0;
  }
  .progress-bar-wrap .q-linear-progress__track {
    background: #e8e8e8 !important;
  }
  .progress-bar-wrap .q-linear-progress__model {
    background: #1a1a1a !important;
  }

  /* CANCEL BUTTON */
  .cancel-btn.q-btn {
    width: 100%; height: 48px;
    border: 1px solid #d0d0d0;
    background: #f0f0f0; color: #555;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 16px; font-weight: 600; letter-spacing: 0.3em;
    text-transform: uppercase;
    border-radius: 0;
    box-shadow: 2px 2px 0 #e0e0e0;
  }
  .cancel-btn.q-btn:hover { background: #e8e8e8; color: #1a1a1a; }
</style>
</head>
<body>
<div id="q-app">
  <div class="rfid-root">

    <!-- INSTRUCTION BOX -->
    <div class="instr-box">
      <div class="instr-text">PLACE CARD ON RFID ANTENNA</div>
    </div>

    <!-- CARD DISPLAY -->
    <div class="card-display">
      <div class="card-wrap">
        <div class="scan-ring"></div>
        <div class="big-card">
          <div class="big-card__corner-tl">{{ currentCard.rank }}<br>{{ currentCard.suit }}</div>
          <div class="big-card__center-rank">{{ currentCard.rank }}</div>
          <div class="big-card__center-suit">{{ currentCard.suit }}</div>
          <div class="big-card__corner-br">{{ currentCard.rank }}<br>{{ currentCard.suit }}</div>
        </div>
      </div>
      <div class="card-label">{{ currentCard.name }}</div>
    </div>

    <!-- WAITING -->
    <div class="waiting-row">
      <div class="wait-dot"></div>
      <div class="wait-dot"></div>
      <div class="wait-dot"></div>
      <span class="wait-label">Waiting for RFID scan</span>
    </div>

    <!-- PROGRESS with q-linear-progress -->
    <div class="progress-section">
      <div class="progress-label-row">
        <span class="progress-label">REGISTERING:</span>
        <span class="progress-count">{{ registered }}</span>
        <span class="progress-total">/ {{ total }}</span>
      </div>
      <div class="progress-bar-wrap">
        <q-linear-progress
          :value="registered / total"
          color="dark"
          track-color="grey-3"
          size="6px"
        ></q-linear-progress>
      </div>
    </div>

    <!-- CANCEL -->
    <q-btn flat class="cancel-btn" label="C A N C E L"></q-btn>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/quasar@2/dist/quasar.umd.prod.js"></script>
<script>
const app = Vue.createApp({
  data() {
    return {
      currentCard: {
        rank: 'A',
        suit: '\u2660',
        name: 'ACE OF SPADES'
      },
      registered: 1,
      total: 52
    };
  }
});
app.use(Quasar);
app.mount('#q-app');
</script>
</body>
</html>
