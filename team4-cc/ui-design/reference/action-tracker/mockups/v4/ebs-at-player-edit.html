<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EBS AT — Player Edit Popup</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/quasar@2/dist/quasar.prod.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Icons&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body { margin: 0; padding: 20px; background: #e0e0e0; font-family: 'Noto Sans KR', sans-serif; }
  #q-app { max-width: 720px; margin: 0 auto; }

  .dialog-card {
    background: #fafafa; border: 2px solid #d0d0d0;
    max-width: 720px; width: 100%;
  }

  /* Title bar */
  .title-bar {
    height: 44px; background: #f0f0f0;
    border-bottom: 1px solid #d0d0d0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px;
  }
  .title-bar__label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px; font-weight: 600; letter-spacing: 0.15em;
    text-transform: uppercase; color: #1a1a1a;
  }

  /* Top area: photo + actions */
  .top-area {
    display: flex; align-items: stretch;
    border-bottom: 1px solid #d0d0d0;
  }
  .photo-area {
    flex: 0 0 112px; display: flex; align-items: center; justify-content: center;
    padding: 16px; border-right: 1px solid #d0d0d0;
  }
  .photo-box {
    width: 80px; height: 80px;
    border: 2px dashed #d0d0d0; background: #f0f0f0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: #aaa; cursor: pointer; gap: 4px;
  }
  .photo-box__label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px; letter-spacing: 0.06em; text-transform: uppercase; color: #bbb;
  }
  .action-area {
    flex: 1; display: flex; flex-direction: column; justify-content: center;
  }
  .action-btn-row {
    display: flex; gap: 8px; padding: 16px 16px 10px 16px;
  }
  .sit-out-row {
    display: flex; align-items: center; gap: 10px; padding: 0 16px 16px 16px;
  }
  .sit-out-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: #555;
  }

  /* Field sections */
  .field-section {
    padding: 12px 16px; border-bottom: 1px solid #d0d0d0;
  }
  .field-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; color: #888; margin-bottom: 6px;
  }

  /* Bottom buttons */
  .bottom-row {
    height: 52px; display: flex; align-items: center; justify-content: center; gap: 12px;
    border-top: 1px solid #d0d0d0; background: #fafafa;
  }

  /* Quasar overrides */
  .q-field--outlined .q-field__control { font-family: 'IBM Plex Mono', monospace; font-size: 13px; }
</style>
</head>
<body>
<div id="q-app">
  <div class="dialog-card">

    <!-- PE-01: Title bar + PE-10: Close -->
    <div class="title-bar">
      <span class="title-bar__label">SEAT 3</span>
      <q-btn flat dense round icon="close" size="sm" style="color:#555;" />
    </div>

    <!-- Top area: Photo + Action buttons + Sit out -->
    <div class="top-area">
      <!-- PE-05: Photo Area -->
      <div class="photo-area">
        <div class="photo-box">
          <q-icon name="photo_camera" size="24px" color="grey-6" />
          <span class="photo-box__label">No Photo</span>
        </div>
      </div>

      <div class="action-area">
        <!-- PE-06: DELETE + PE-07: MOVE SEAT -->
        <div class="action-btn-row">
          <q-btn outline dense no-caps label="DELETE"
            style="font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;letter-spacing:0.06em;min-width:88px;height:32px;color:#1a1a1a;border-color:#d0d0d0;" />
          <q-btn outline dense no-caps label="MOVE SEAT"
            style="font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;letter-spacing:0.06em;min-width:100px;height:32px;color:#1a1a1a;border-color:#d0d0d0;" />
        </div>
        <!-- PE-08: SIT OUT toggle -->
        <div class="sit-out-row">
          <span class="sit-out-label">SIT OUT</span>
          <q-toggle v-model="sitOut" color="dark" />
        </div>
      </div>
    </div>

    <!-- PE-02: NAME input -->
    <div class="field-section">
      <div class="field-label">NAME</div>
      <q-input v-model="playerName" outlined dense placeholder="Player Name"
        style="font-family:'IBM Plex Mono',monospace;" />
    </div>

    <!-- PE-03: COUNTRY select -->
    <div class="field-section">
      <div class="field-label">COUNTRY</div>
      <q-select v-model="country" :options="countries" outlined dense
        style="font-family:'IBM Plex Mono',monospace;">
        <template v-slot:prepend>
          <span style="font-size:16px;">{{ countryFlag }}</span>
        </template>
      </q-select>
    </div>

    <!-- Bottom buttons: PE-09 OK + PE-10 CANCEL -->
    <div class="bottom-row">
      <q-btn flat dense no-caps label="CANCEL"
        style="font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;letter-spacing:0.08em;color:#555;min-width:100px;height:36px;border:1px solid #d0d0d0;" />
      <q-btn unelevated dense no-caps label="OK"
        style="font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;letter-spacing:0.08em;color:#fff;background:#1a1a1a;min-width:100px;height:36px;" />
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/quasar@2/dist/quasar.umd.prod.js"></script>
<script>
const app = Vue.createApp({
  data() {
    return {
      playerName: 'KIM CHEOLSU',
      country: 'South Korea',
      sitOut: false,
      countries: [
        'South Korea', 'United States', 'Japan', 'China',
        'United Kingdom', 'Brazil', 'Canada', 'Australia'
      ]
    }
  },
  computed: {
    countryFlag() {
      const flags = {
        'South Korea': '\u{1F1F0}\u{1F1F7}',
        'United States': '\u{1F1FA}\u{1F1F8}',
        'Japan': '\u{1F1EF}\u{1F1F5}',
        'China': '\u{1F1E8}\u{1F1F3}',
        'United Kingdom': '\u{1F1EC}\u{1F1E7}',
        'Brazil': '\u{1F1E7}\u{1F1F7}',
        'Canada': '\u{1F1E8}\u{1F1E6}',
        'Australia': '\u{1F1E6}\u{1F1FA}'
      };
      return flags[this.country] || '';
    }
  }
});
app.use(Quasar);
app.mount('#q-app');
</script>
</body>
</html>
