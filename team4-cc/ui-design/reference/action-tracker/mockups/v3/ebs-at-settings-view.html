<!DOCTYPE html>
<!-- Style Reference: White Minimal — AT Settings/Configuration View (AT-S01~S17) -->
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=720">
<title>EBS AT — Settings View</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { margin: 0; padding: 0; background: #fff; display: inline-block; }

  .component {
    width: 720px;
    background: #fafafa;
    border: 2px solid #d0d0d0;
    font-family: 'Noto Sans KR', 'Helvetica Neue', Arial, sans-serif;
    display: flex;
    flex-direction: column;
  }

  /* TOOLBAR */
  .toolbar {
    height: 44px; background: #f0f0f0; color: #1a1a1a;
    display: flex; align-items: center;
    border-bottom: 1px solid #d0d0d0; flex-shrink: 0;
  }
  .tb-seg {
    display: flex; align-items: center; height: 100%;
    padding: 0 12px; border-right: 1px solid #d0d0d0;
    gap: 6px; font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; letter-spacing: 0.08em;
    text-transform: uppercase; white-space: nowrap;
  }
  .tb-seg--spacer { flex: 1; }
  .tb-seg--right { border-right: none; border-left: 1px solid #d0d0d0; padding: 0; gap: 0; }
  .tb-icon {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px; cursor: pointer; padding: 0 10px;
    height: 100%; display: flex; align-items: center;
    border-right: 1px solid #d0d0d0;
    color: #555;
  }
  .tb-icon:last-child { border-right: none; }
  .tb-icon:hover { background: #e8e8e8; color: #1a1a1a; }
  .hand-label { font-size: 13px; font-weight: 600; letter-spacing: 0.15em; color: #1a1a1a; }
  .conn-dot {
    width: 7px; height: 7px; border-radius: 50%; background: #1a1a1a;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .auto-badge {
    border: 1px solid #1a1a1a; padding: 1px 6px;
    font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
    background: #1a1a1a; color: #fff;
  }

  /* SEAT + STRADDLE GRID */
  .seat-straddle-block {
    border-bottom: 1px solid #d0d0d0; flex-shrink: 0;
  }
  .seat-row {
    display: flex; height: 30px;
    border-bottom: 1px solid #e0e0e0;
  }
  .seat-cell {
    flex: 1; display: flex; align-items: center; justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;
    border-right: 1px solid #e0e0e0; color: #555;
  }
  .seat-cell:last-child { border-right: none; }
  .straddle-row {
    display: flex; height: 26px;
  }
  .straddle-cell {
    flex: 1; display: flex; align-items: center; justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px; letter-spacing: 0.05em; text-transform: uppercase;
    border-right: 1px solid #e0e0e0; color: #aaa;
  }
  .straddle-cell:last-child { border-right: none; }
  .straddle-cell--active { color: #1a1a1a; font-weight: 600; background: #f0f0f0; }

  /* CARD STATUS ROW */
  .card-status-row {
    height: 44px; border-bottom: 1px solid #d0d0d0;
    display: flex; align-items: center; justify-content: center;
    gap: 8px; padding: 0 16px; background: #fafafa;
    flex-shrink: 0;
  }
  .status-dot {
    width: 18px; height: 18px; border-radius: 50%;
    border: 1px solid #d0d0d0; background: #f0f0f0;
    display: flex; align-items: center; justify-content: center;
    font-size: 8px; font-weight: 600; flex-shrink: 0;
  }
  .status-dot--ok { background: #1a1a1a; border-color: #1a1a1a; }
  .status-dot--warn { background: #aaa; border-color: #aaa; }
  .status-label { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: #999; letter-spacing: 0.08em; text-transform: uppercase; }

  /* SETTING BUTTON ROWS */
  .setting-section {
    border-bottom: 1px solid #d0d0d0; flex-shrink: 0;
  }
  .setting-section:last-child { border-bottom: none; }
  .setting-row {
    display: flex; height: 52px;
  }
  .set-btn {
    flex: 1; height: 100%;
    border: none; border-right: 1px solid #d0d0d0;
    background: #fafafa;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.06em; text-transform: uppercase;
    cursor: pointer; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 2px;
    transition: background 0.08s;
    box-shadow: inset 0 -1px 0 #e0e0e0;
    color: #1a1a1a;
  }
  .set-btn:last-child { border-right: none; }
  .set-btn:hover { background: #f0f0f0; }
  .set-btn:active { background: #1a1a1a; color: #fff; box-shadow: none; }
  .set-btn__val {
    font-size: 14px; font-weight: 600; letter-spacing: 0.02em; color: #1a1a1a;
  }
  .set-btn__label { font-size: 8px; color: #888; letter-spacing: 0.1em; }
  .set-btn--active { background: #e8e8e8; color: #1a1a1a; box-shadow: inset 0 -1px 0 #d0d0d0; border-bottom: 2px solid #1a1a1a; }
  .set-btn--active .set-btn__val { color: #1a1a1a; }
  .set-btn--active .set-btn__label { color: #666; }

  /* BOTTOM ROW */
  .bottom-row {
    height: 52px; display: flex; flex-shrink: 0;
  }
  .game-select {
    flex: 0 0 160px; height: 100%;
    border: none; border-right: 1px solid #d0d0d0;
    background: #1a1a1a; color: #fff;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
    cursor: pointer; display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px;
  }
  .game-select__caret { font-size: 10px; color: #888; }
  .board-mode-btn {
    flex: 1; height: 100%;
    border: none; border-right: 1px solid #d0d0d0;
    background: #fafafa;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.06em; text-transform: uppercase;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    box-shadow: inset 0 -1px 0 #e0e0e0;
    color: #555;
  }
  .board-mode-btn:hover { background: #f0f0f0; color: #1a1a1a; }
  .settings-final-btn {
    flex: 0 0 110px; height: 100%;
    border: none;
    background: #f0f0f0;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    border-left: 1px solid #d0d0d0;
    box-shadow: inset 0 -1px 0 #e0e0e0;
    color: #555;
  }
  .settings-final-btn:hover { background: #e8e8e8; color: #1a1a1a; }
</style>
</head>
<body>
<div class="component">

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="tb-seg">
      <span class="conn-dot"></span>
      <span>CONNECTED</span>
    </div>
    <div class="tb-seg"><span>⇌</span></div>
    <div class="tb-seg"><span>WiFi</span></div>
    <div class="tb-seg tb-seg--spacer">
      <span class="hand-label">HAND&nbsp;&nbsp;#247</span>
    </div>
    <div class="tb-seg tb-seg--right">
      <div class="tb-icon"><span class="auto-badge">AUTO</span></div>
      <div class="tb-icon">📷</div>
      <div class="tb-icon">GFX</div>
      <div class="tb-icon">REG</div>
      <div class="tb-icon">✕</div>
    </div>
  </div>

  <!-- SEAT + STRADDLE -->
  <div class="seat-straddle-block">
    <div class="seat-row">
      <div class="seat-cell">SEAT 1</div>
      <div class="seat-cell">SEAT 2</div>
      <div class="seat-cell">SEAT 3</div>
      <div class="seat-cell">SEAT 4</div>
      <div class="seat-cell">SEAT 5</div>
      <div class="seat-cell">SEAT 6</div>
      <div class="seat-cell">SEAT 7</div>
      <div class="seat-cell">SEAT 8</div>
      <div class="seat-cell">SEAT 9</div>
      <div class="seat-cell">SEAT 10</div>
    </div>
    <div class="straddle-row">
      <div class="straddle-cell straddle-cell--active">STRDL1</div>
      <div class="straddle-cell straddle-cell--active">STRDL2</div>
      <div class="straddle-cell">STRDL</div>
      <div class="straddle-cell">STRDL</div>
      <div class="straddle-cell">STRDL</div>
      <div class="straddle-cell">STRDL</div>
      <div class="straddle-cell">STRDL</div>
      <div class="straddle-cell">STRDL</div>
      <div class="straddle-cell">STRDL</div>
      <div class="straddle-cell">STRDL</div>
    </div>
  </div>

  <!-- CARD STATUS ROW -->
  <div class="card-status-row">
    <div class="status-dot status-dot--ok"></div>
    <div class="status-dot status-dot--ok"></div>
    <div class="status-dot status-dot--ok"></div>
    <div class="status-dot status-dot--warn"></div>
    <div class="status-dot status-dot--warn"></div>
    <div class="status-dot status-dot--warn"></div>
    <div class="status-dot"></div>
    <div class="status-dot"></div>
    <div class="status-dot"></div>
    <div class="status-dot"></div>
    <span class="status-label">Card Scan Status</span>
  </div>

  <!-- SETTING ROW 1: CAP / ANTE / BTN BLIND / DEALER / SB / BB / 3B -->
  <div class="setting-section">
    <div class="setting-row">
      <button class="set-btn">
        <span class="set-btn__val">—</span>
        <span class="set-btn__label">CAP</span>
      </button>
      <button class="set-btn">
        <span class="set-btn__val">0</span>
        <span class="set-btn__label">ANTE</span>
      </button>
      <button class="set-btn">
        <span class="set-btn__val">—</span>
        <span class="set-btn__label">BTN BLIND</span>
      </button>
      <button class="set-btn set-btn--active">
        <span class="set-btn__val">S3</span>
        <span class="set-btn__label">DEALER</span>
      </button>
      <button class="set-btn">
        <span class="set-btn__val">S4</span>
        <span class="set-btn__label">SB</span>
      </button>
      <button class="set-btn">
        <span class="set-btn__val">S5</span>
        <span class="set-btn__label">BB</span>
      </button>
      <button class="set-btn">
        <span class="set-btn__val">—</span>
        <span class="set-btn__label">3B</span>
      </button>
    </div>
  </div>

  <!-- SETTING ROW 2: MIN CHIP / 7 DEUCE / BOMB POT / # BOARDS / HIT GAME -->
  <div class="setting-section">
    <div class="setting-row">
      <button class="set-btn">
        <span class="set-btn__val">100</span>
        <span class="set-btn__label">MIN CHIP</span>
      </button>
      <button class="set-btn">
        <span class="set-btn__val">—</span>
        <span class="set-btn__label">7 DEUCE</span>
      </button>
      <button class="set-btn">
        <span class="set-btn__val">—</span>
        <span class="set-btn__label">BOMB POT</span>
      </button>
      <button class="set-btn">
        <span class="set-btn__val">1</span>
        <span class="set-btn__label"># BOARDS</span>
      </button>
      <button class="set-btn">
        <span class="set-btn__val">—</span>
        <span class="set-btn__label">HIT GAME</span>
      </button>
    </div>
  </div>

  <!-- BOTTOM ROW -->
  <div class="bottom-row">
    <button class="game-select">
      <span>HOLDEM</span>
      <span class="game-select__caret">▼</span>
    </button>
    <button class="board-mode-btn">SINGLE BOARD</button>
    <button class="settings-final-btn">⚙ SETTINGS</button>
  </div>

</div>
</body>
</html>
