<!DOCTYPE html>
<!-- Style Reference: White Minimal — AT Player Edit Popup (PE-01~PE-03, PE-05~PE-10) -->
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=720">
<title>EBS AT — Player Edit Popup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { margin: 0; padding: 0; background: #fff; display: inline-block; }

  .component {
    width: 720px;
    background: #fafafa;
    border: 2px solid #d0d0d0;
    font-family: 'Noto Sans KR', 'Helvetica Neue', Arial, sans-serif;
    display: flex;
    flex-direction: column;
  }

  /* TITLE BAR (PE-01, PE-10) */
  .title-bar {
    height: 44px;
    background: #f0f0f0;
    border-bottom: 1px solid #d0d0d0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    flex-shrink: 0;
  }
  .title-bar__label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #1a1a1a;
  }
  .title-bar__close {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    cursor: pointer;
    color: #555;
    background: none;
    border: none;
    padding: 4px 6px;
    line-height: 1;
  }
  .title-bar__close:hover { color: #1a1a1a; }

  /* TOP AREA: photo + action buttons + sit out */
  .top-area {
    display: flex;
    align-items: stretch;
    border-bottom: 1px solid #d0d0d0;
    flex-shrink: 0;
  }

  /* PHOTO AREA (PE-05) */
  .photo-area {
    flex: 0 0 112px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    border-right: 1px solid #d0d0d0;
  }
  .photo-box {
    width: 80px;
    height: 80px;
    border: 2px dashed #d0d0d0;
    background: #f0f0f0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #aaa;
    cursor: pointer;
    gap: 4px;
  }
  .photo-box__icon { font-size: 20px; line-height: 1; }
  .photo-box__label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #bbb;
  }

  /* ACTION + SIT OUT AREA */
  .action-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  /* ACTION BUTTONS ROW (PE-06, PE-07) */
  .action-btn-row {
    display: flex;
    gap: 8px;
    padding: 16px 16px 10px 16px;
  }
  .btn-delete {
    height: 32px;
    min-width: 88px;
    background: #1a1a1a;
    color: #fff;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border: none;
    cursor: pointer;
  }
  .btn-delete:hover { background: #333; }
  .btn-move-seat {
    height: 32px;
    min-width: 100px;
    border: 1px solid #d0d0d0;
    background: #fafafa;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    color: #1a1a1a;
  }
  .btn-move-seat:hover { background: #f0f0f0; }

  /* SIT OUT ROW (PE-08) */
  .sit-out-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 16px 16px 16px;
  }
  .sit-out-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #555;
  }
  /* TOGGLE (PE-08) */
  .toggle {
    display: inline-flex;
    min-width: 52px;
    height: 24px;
    background: #1a1a1a;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    color: #fff;
    letter-spacing: 0.06em;
    border: none;
    cursor: pointer;
    align-items: center;
    justify-content: center;
    text-transform: uppercase;
  }
  .toggle--inactive {
    background: #d0d0d0;
    color: #555;
  }

  /* FIELD SECTIONS */
  .field-section {
    padding: 12px 16px;
    border-bottom: 1px solid #d0d0d0;
    flex-shrink: 0;
  }
  .field-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 6px;
  }

  /* NAME TEXT FIELD (PE-02) */
  .text-field {
    height: 36px;
    width: 100%;
    border: 1px solid #d0d0d0;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    padding: 0 12px;
    background: #fff;
    color: #1a1a1a;
    outline: none;
    appearance: none;
  }
  .text-field:focus { border-color: #999; }

  /* COUNTRY DROPDOWN WRAPPER (PE-03) */
  .dropdown-wrap {
    position: relative;
    width: 100%;
  }
  .dropdown-wrap::after {
    content: '▼';
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 9px;
    color: #888;
    pointer-events: none;
  }
  .dropdown-field {
    height: 36px;
    width: 100%;
    border: 1px solid #d0d0d0;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    padding: 0 32px 0 12px;
    background: #fff;
    color: #1a1a1a;
    outline: none;
    appearance: none;
    -webkit-appearance: none;
    cursor: pointer;
  }
  .dropdown-field:focus { border-color: #999; }

  /* BOTTOM BUTTON ROW (PE-09, PE-10) */
  .bottom-row {
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    border-top: 1px solid #d0d0d0;
    flex-shrink: 0;
    background: #fafafa;
  }
  .btn-cancel {
    height: 36px;
    min-width: 100px;
    border: 1px solid #d0d0d0;
    background: #fafafa;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    color: #555;
  }
  .btn-cancel:hover { background: #f0f0f0; color: #1a1a1a; }
  .btn-ok {
    height: 36px;
    min-width: 100px;
    border: none;
    background: #1a1a1a;
    color: #fff;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
  }
  .btn-ok:hover { background: #333; }
</style>
</head>
<body>
<div class="component">

  <!-- TITLE BAR: PE-01 (Seat Label) + PE-10 (X Close) -->
  <div class="title-bar">
    <span class="title-bar__label">SEAT 1</span>
    <button class="title-bar__close">&#x2715;</button>
  </div>

  <!-- TOP AREA: Photo + Action Buttons + Sit Out -->
  <div class="top-area">

    <!-- PE-05: Photo Area -->
    <div class="photo-area">
      <div class="photo-box">
        <span class="photo-box__icon">&#128247;</span>
        <span class="photo-box__label">No Photo</span>
      </div>
    </div>

    <!-- PE-06 DELETE + PE-07 MOVE SEAT + PE-08 SIT OUT -->
    <div class="action-area">
      <div class="action-btn-row">
        <button class="btn-delete">DELETE</button>
        <button class="btn-move-seat">MOVE SEAT</button>
      </div>
      <div class="sit-out-row">
        <span class="sit-out-label">SIT OUT</span>
        <!-- PE-08: Toggle (inactive = OFF state) -->
        <button class="toggle toggle--inactive">OFF</button>
      </div>
    </div>

  </div>

  <!-- NAME FIELD (PE-02) -->
  <div class="field-section">
    <div class="field-label">NAME</div>
    <input class="text-field" type="text" placeholder="Player Name" value="KIM CHEOLSU">
  </div>

  <!-- COUNTRY DROPDOWN (PE-03) -->
  <div class="field-section">
    <div class="field-label">COUNTRY</div>
    <div class="dropdown-wrap">
      <select class="dropdown-field">
        <option>&#127472;&#127479; South Korea</option>
        <option>&#127482;&#127480; United States</option>
        <option>&#127471;&#127477; Japan</option>
        <option>&#127464;&#127475; China</option>
        <option>&#127468;&#127463; United Kingdom</option>
        <option>&#127463;&#127479; Brazil</option>
        <option>&#127464;&#127462; Canada</option>
        <option>&#127462;&#127482; Australia</option>
      </select>
    </div>
  </div>

  <!-- BOTTOM BUTTONS: PE-10 (CANCEL) + PE-09 (OK) -->
  <div class="bottom-row">
    <button class="btn-cancel">CANCEL</button>
    <button class="btn-ok">OK</button>
  </div>

</div>
</body>
</html>
