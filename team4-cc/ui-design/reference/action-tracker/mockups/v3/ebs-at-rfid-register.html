<!DOCTYPE html>
<!-- Style Reference: White Minimal — AT RFID Card Registration Modal (AT-R01~R04) -->
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=720">
<title>EBS AT — RFID Register</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { margin: 0; padding: 0; background: #fff; display: inline-block; }

  .component {
    width: 720px;
    background: #fafafa;
    border: 2px solid #d0d0d0;
    font-family: 'IBM Plex Mono', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    padding: 24px 60px;
  }

  /* INSTRUCTION BOX (AT-R01) */
  .instr-box {
    width: 100%;
    border: 1px solid #d0d0d0;
    padding: 16px 24px;
    text-align: center;
    margin-bottom: 36px;
    background: #f0f0f0;
    box-shadow: 2px 2px 0 #e0e0e0;
  }
  .instr-text {
    font-size: 14px; font-weight: 600; letter-spacing: 0.2em;
    text-transform: uppercase; color: #1a1a1a; line-height: 1.4;
  }

  /* CARD DISPLAY (AT-R02) */
  .card-display {
    display: flex; flex-direction: column; align-items: center;
    gap: 0; margin-bottom: 28px;
  }
  .big-card {
    width: 110px; height: 150px;
    border: 2px solid #d0d0d0; border-radius: 6px;
    background: #fff; color: #1a1a1a;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 4px;
    box-shadow: 3px 3px 0 #e0e0e0;
    position: relative;
  }
  .big-card__corner-tl {
    position: absolute; top: 8px; left: 10px;
    font-size: 16px; font-weight: 600; line-height: 1;
    color: #1a1a1a;
  }
  .big-card__corner-br {
    position: absolute; bottom: 8px; right: 10px;
    font-size: 16px; font-weight: 600; line-height: 1;
    transform: rotate(180deg);
    color: #1a1a1a;
  }
  .big-card__center-rank {
    font-size: 48px; font-weight: 600; letter-spacing: -0.04em; line-height: 1;
    color: #1a1a1a;
  }
  .big-card__center-suit {
    font-size: 28px; line-height: 1;
    color: #1a1a1a;
  }
  .card-corner-label {
    font-size: 9px; color: #888; text-align: center; letter-spacing: 0.12em;
    text-transform: uppercase; margin-top: 10px;
  }

  /* PROGRESS (AT-R04) */
  .progress-row {
    display: flex; align-items: center; gap: 16px;
    margin-bottom: 36px;
  }
  .progress-label {
    font-size: 11px; color: #888; letter-spacing: 0.12em; text-transform: uppercase;
  }
  .progress-bar {
    width: 200px; height: 6px;
    background: #e8e8e8; border: 1px solid #d0d0d0;
    position: relative; overflow: hidden;
  }
  .progress-fill {
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 1.9%;  /* 1/52 */
    background: #1a1a1a;
  }
  .progress-count {
    font-size: 14px; font-weight: 600; color: #1a1a1a;
    letter-spacing: 0.04em;
  }
  .progress-total {
    font-size: 11px; color: #888; letter-spacing: 0.04em;
  }

  /* CANCEL BUTTON (AT-R03) */
  .cancel-btn {
    width: 100%;
    height: 60px;
    border: 1px solid #d0d0d0; background: #f0f0f0; color: #555;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 16px; font-weight: 600; letter-spacing: 0.3em;
    text-transform: uppercase;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    box-shadow: 2px 2px 0 #e0e0e0;
    transition: background 0.1s;
  }
  .cancel-btn:hover { background: #e8e8e8; color: #1a1a1a; }
  .cancel-btn:active { background: #1a1a1a; color: #fff; }

  /* SCAN ANIMATION */
  .scan-ring {
    width: 130px; height: 170px;
    border: 1px solid #d0d0d0;
    border-radius: 8px;
    position: absolute;
    animation: scan-pulse 1.5s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes scan-pulse {
    0%   { transform: scale(1);    opacity: 0.8; border-color: #ccc; }
    50%  { transform: scale(1.06); opacity: 0.3; border-color: #aaa; }
    100% { transform: scale(1);    opacity: 0.8; border-color: #ccc; }
  }
  .card-wrap { position: relative; display: flex; align-items: center; justify-content: center; }

  /* WAITING indicator */
  .waiting-row {
    display: flex; align-items: center; gap: 8px; margin-top: -20px; margin-bottom: 28px;
  }
  .wait-dot {
    width: 6px; height: 6px; border-radius: 50%; background: #1a1a1a;
    animation: wait-blink 1.2s ease-in-out infinite;
  }
  .wait-dot:nth-child(2) { animation-delay: 0.2s; }
  .wait-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes wait-blink { 0%,100%{opacity:0.2} 50%{opacity:1} }
  .wait-label { font-size: 9px; color: #888; letter-spacing: 0.15em; text-transform: uppercase; }
</style>
</head>
<body>
<div class="component">

  <!-- INSTRUCTION BOX -->
  <div class="instr-box">
    <div class="instr-text">PLACE THIS CARD ON ANY ANTENNA</div>
  </div>

  <!-- CARD DISPLAY with scan animation -->
  <div class="card-display">
    <div class="card-wrap">
      <div class="scan-ring"></div>
      <div class="big-card">
        <div class="big-card__corner-tl">A<br>♠</div>
        <div class="big-card__center-rank">A</div>
        <div class="big-card__center-suit">♠</div>
        <div class="big-card__corner-br">A<br>♠</div>
      </div>
    </div>
    <div class="card-corner-label">ACE OF SPADES</div>
  </div>

  <!-- WAITING -->
  <div class="waiting-row">
    <div class="wait-dot"></div>
    <div class="wait-dot"></div>
    <div class="wait-dot"></div>
    <span class="wait-label">Waiting for RFID scan</span>
  </div>

  <!-- PROGRESS -->
  <div class="progress-row">
    <span class="progress-label">Progress</span>
    <div class="progress-bar"><div class="progress-fill"></div></div>
    <span class="progress-count">1</span>
    <span class="progress-total">/ 52</span>
  </div>

  <!-- CANCEL -->
  <button class="cancel-btn">C A N C E L</button>

</div>
</body>
</html>
