<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AT-06: RFID Registration — EBS v6 White</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #e8e8e8;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Noto Sans KR', 'Segoe UI', sans-serif;
  }

  /* ── Root container: 640 x auto ── */
  .screenshot-container {
    width: 640px;
    position: relative;
    overflow: hidden;
    background: #ffffff;
    border: 1px solid #d0d0d0;
    border-radius: 8px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }

  /* ─────────────────────────────────────
     TITLEBAR (ids 1-5)
  ───────────────────────────────────── */
  .titlebar {
    width: 100%;
    height: 36px;
    background: #f0f0f0;
    border-bottom: 1px solid #d0d0d0;
    display: flex;
    align-items: center;
    padding: 0 10px;
  }

  /* id=1 App Icon */
  .tb-icon {
    width: 16px;
    height: 16px;
    background: #1a1a1a;
    border-radius: 3px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .tb-icon::after {
    content: '';
    width: 8px;
    height: 8px;
    background: #fff;
    border-radius: 1px;
  }

  /* id=2 Title Text */
  .tb-title {
    flex: 1;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    color: #1a1a1a;
    margin-left: 8px;
    white-space: nowrap;
    overflow: hidden;
  }

  /* ids 3,4,5 Window control buttons */
  .tb-buttons {
    display: flex;
    height: 100%;
    margin-left: 4px;
  }
  .tb-btn {
    width: 36px;
    height: 36px;
    border: none;
    background: transparent;
    font-size: 11px;
    color: #555;
    cursor: default;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .tb-btn:hover { background: #e0e0e0; }
  .tb-btn.close:hover { background: #dd0000; color: #fff; }

  /* ─────────────────────────────────────
     id=6 Content Area
  ───────────────────────────────────── */
  .content-area {
    width: 100%;
    background: #fafafa;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px 40px;
    gap: 28px;
  }

  /* ─────────────────────────────────────
     id=7 Instruction Label
  ───────────────────────────────────── */
  .instruction-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1px;
    color: #1a1a1a;
    text-transform: uppercase;
    text-align: center;
    padding: 12px 32px;
    border: 2px solid #1a1a1a;
    border-radius: 6px;
    background: #ffffff;
  }

  /* ─────────────────────────────────────
     id=8 Card Image
  ───────────────────────────────────── */
  .card-image {
    width: 120px;
    height: 168px;
    background: #ffffff;
    border: 2px solid #d0d0d0;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .card-rank {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 48px;
    font-weight: 700;
    color: #1a1a1a;
    line-height: 1;
  }
  .card-suit {
    font-size: 40px;
    color: #1a1a1a;
    line-height: 1;
  }

  /* ─────────────────────────────────────
     id=9 Progress Indicator
  ───────────────────────────────────── */
  .progress-area {
    width: 360px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .progress-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: #888;
    letter-spacing: 0.5px;
  }
  .progress-bar-track {
    width: 100%;
    height: 4px;
    background: #e0e0e0;
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar-fill {
    width: 35%;
    height: 100%;
    background: #1a1a1a;
    border-radius: 2px;
    animation: pulse-progress 2s ease-in-out infinite;
  }
  @keyframes pulse-progress {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* ─────────────────────────────────────
     id=10 CANCEL Button
  ───────────────────────────────────── */
  .cancel-btn {
    width: 360px;
    height: 44px;
    background: #ffffff;
    border: 2px solid #dd0000;
    border-radius: 6px;
    color: #dd0000;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .cancel-btn:hover {
    background: #dd0000;
    color: #ffffff;
  }
</style>
</head>
<body>
  <div class="screenshot-container">

    <!-- ── TITLEBAR (ids 1-5) ── -->
    <div class="titlebar">
      <!-- id=1 --> <div class="tb-icon"></div>
      <!-- id=2 --> <span class="tb-title">EBS Action Tracker</span>
      <div class="tb-buttons">
        <!-- id=3 --> <button class="tb-btn">&#x2014;</button>
        <!-- id=4 --> <button class="tb-btn">&#x25A1;</button>
        <!-- id=5 --> <button class="tb-btn close">&#x2715;</button>
      </div>
    </div>

    <!-- id=6: Content Area -->
    <div class="content-area">

      <!-- id=7: Instruction Label -->
      <div class="instruction-label">Place card on RFID antenna</div>

      <!-- id=8: Card Image (Ace of Spades) -->
      <div class="card-image">
        <span class="card-rank">A</span>
        <span class="card-suit">&#x2660;</span>
      </div>

      <!-- id=9: Progress Indicator -->
      <div class="progress-area">
        <span class="progress-label">Waiting for RFID scan...</span>
        <div class="progress-bar-track">
          <div class="progress-bar-fill"></div>
        </div>
      </div>

      <!-- id=10: CANCEL Button -->
      <button class="cancel-btn">Cancel</button>

    </div>

  </div>
</body>
</html>
