<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=640">
<title>AT-04: Post-Flop Action (v7 White Minimal)</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+KR:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #fafafa;
    --bg-tertiary: #f0f0f0;
    --bg-muted: #f5f5f5;
    --fg-primary: #1a1a1a;
    --fg-secondary: #555555;
    --fg-muted: #888888;
    --fg-disabled: #bbbbbb;
    --border-default: #d0d0d0;
    --border-light: #e0e0e0;
    --accent: #1a1a1a;
    --error: #dd0000;
    --rfid-detected: #FFD600;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-secondary);
    display: flex;
    justify-content: center;
    align-items: flex-start;
    font-family: 'Noto Sans KR', 'Segoe UI', Arial, sans-serif;
  }

  .screenshot-container {
    width: 640px;
    height: 450px;
    position: relative;
    background: var(--bg-primary);
    overflow: hidden;
  }

  /* =========================================
     TITLEBAR (id=1)
     ========================================= */
  .titlebar {
    position: absolute;
    left: 0; top: 0;
    width: 100%;
    height: 4.5%;
    background: var(--bg-tertiary);
    display: flex;
    align-items: center;
    padding: 0 6px;
    border-bottom: 1px solid var(--border-light);
    z-index: 10;
  }
  .titlebar-icon {
    width: 14px;
    height: 14px;
    margin-right: 5px;
    background: var(--accent);
    border-radius: 2px;
    flex-shrink: 0;
    font-size: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
  }
  .titlebar-text {
    color: var(--fg-primary);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    flex: 1;
  }
  .titlebar-buttons {
    display: flex;
    height: 100%;
  }
  .titlebar-btn {
    width: 28px;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--fg-secondary);
    font-size: 11px;
    cursor: pointer;
  }
  .titlebar-btn:hover { background: var(--border-light); }
  .titlebar-btn.close-btn:hover { background: var(--error); color: #fff; }

  /* =========================================
     TOOLBAR (id=2~10)
     ========================================= */
  .toolbar {
    position: absolute;
    left: 0;
    top: 4.5%;
    width: 100%;
    height: 12.7%;
    background: var(--bg-tertiary);
    display: flex;
    border-bottom: 1px solid var(--border-default);
    z-index: 5;
  }
  .toolbar-cell {
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    border-right: 1px solid var(--border-light);
    cursor: pointer;
    flex-shrink: 0;
    overflow: hidden;
  }
  .toolbar-cell:hover { background: var(--bg-muted); }

  /* id=2: USB */
  .tb-usb {
    width: 8.1%;
    background: var(--bg-secondary);
  }
  .usb-symbol {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .usb-arrow {
    color: var(--fg-muted);
    font-size: 16px;
    transform: rotate(90deg);
    line-height: 1;
  }

  /* id=3: WiFi */
  .tb-wifi {
    width: 8.1%;
    background: var(--bg-secondary);
  }
  .wifi-bars {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    height: 18px;
  }
  .wifi-bar {
    width: 4px;
    background: var(--accent);
    border-radius: 1px;
  }

  /* id=4: input */
  .tb-input {
    width: 20.7%;
    background: var(--bg-primary);
    padding: 5px 6px;
  }
  .tb-input-box {
    width: 100%;
    height: 70%;
    background: var(--bg-primary);
    border: 1px solid var(--border-default);
    border-radius: 2px;
  }

  /* id=5: HAND */
  .tb-hand {
    width: 11.2%;
    background: var(--bg-secondary);
    flex-direction: column;
    gap: 0;
  }
  .hand-label {
    color: var(--fg-muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 8px;
    font-weight: 600;
    letter-spacing: 0.12em;
    line-height: 1.4;
    text-transform: uppercase;
  }
  .hand-number {
    color: var(--fg-primary);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 18px;
    font-weight: 600;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }

  /* gap */
  .tb-gap {
    width: 9.7%;
    background: var(--bg-primary);
  }

  /* id=6: camera */
  .tb-camera {
    width: 9.2%;
    background: var(--bg-secondary);
  }
  .cam-icon {
    display: flex;
    align-items: center;
    gap: 2px;
  }
  .cam-body {
    width: 18px; height: 12px;
    background: var(--fg-muted);
    border-radius: 2px;
    position: relative;
  }
  .cam-lens {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 7px; height: 7px;
    background: var(--bg-secondary);
    border-radius: 50%;
    border: 1px solid var(--fg-disabled);
  }
  .cam-trigger {
    position: absolute;
    top: -3px; left: 50%;
    transform: translateX(-50%);
    width: 5px; height: 3px;
    background: var(--fg-muted);
    border-radius: 1px 1px 0 0;
  }

  /* id=7: GFX */
  .tb-gfx {
    width: 9.2%;
    background: var(--bg-secondary);
  }
  .tb-gfx .lbl {
    color: var(--fg-primary);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.12em;
  }

  /* id=8: REGISTER */
  .tb-register {
    width: 9.2%;
    background: var(--bg-secondary);
    flex-direction: column;
    gap: 1px;
  }
  .tb-register .lbl {
    color: var(--fg-primary);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 7px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-align: center;
    line-height: 1.3;
    text-transform: uppercase;
  }

  /* id=9: fullscreen */
  .tb-fullscreen {
    width: 7.1%;
    background: var(--bg-secondary);
  }
  .expand-icon {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 3px;
    width: 14px; height: 14px;
  }
  .expand-icon span {
    color: var(--fg-muted);
    font-size: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* id=10: close X */
  .tb-close {
    width: 7.5%;
    background: var(--bg-secondary);
    border-right: none;
  }
  .tb-close:hover { background: var(--error); }
  .tb-close .lbl {
    color: var(--fg-primary);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    font-weight: 600;
  }
  .tb-close:hover .lbl { color: #fff; }

  /* =========================================
     CARD ICONS ROW (id=11~20)
     ========================================= */
  .card-icons-row {
    position: absolute;
    left: 0;
    top: 17.2%;
    width: 100%;
    height: 12.7%;
    display: flex;
    background: var(--bg-primary);
    z-index: 5;
    border-bottom: 1px solid var(--border-light);
  }
  .card-cell {
    width: 10%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    border-right: 1px solid var(--border-light);
    cursor: pointer;
    flex-shrink: 0;
  }
  .card-cell:last-child { border-right: none; }
  .card-cell.has-card { background: var(--rfid-detected); }
  .card-cell.no-card  { background: var(--bg-secondary); }
  .card-cell.folded   { background: var(--bg-muted); opacity: 0.5; }

  .card-graphic {
    display: flex;
    align-items: center;
    gap: 3px;
  }
  .card-shape {
    width: 20px;
    height: 28px;
    border-radius: 3px;
    border: 1.5px solid;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card-cell.has-card .card-shape {
    background: var(--bg-primary);
    border-color: var(--fg-primary);
  }
  .card-cell.no-card .card-shape {
    background: var(--bg-muted);
    border-color: var(--border-default);
    border-style: dashed;
  }
  .card-cell.folded .card-shape {
    background: var(--bg-muted);
    border-color: var(--border-default);
    border-style: dashed;
  }
  .card-inner {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    border: 1px solid;
  }
  .card-cell.has-card .card-inner { border-color: var(--fg-secondary); background: var(--bg-secondary); }
  .card-cell.no-card  .card-inner { border-color: var(--border-default); background: var(--bg-muted); }
  .card-cell.folded   .card-inner { border-color: var(--border-default); background: var(--bg-muted); }

  .plus-icon {
    font-size: 12px;
    font-weight: 600;
    font-family: 'IBM Plex Mono', monospace;
    line-height: 1;
  }
  .card-cell.has-card .plus-icon { color: var(--fg-primary); }
  .card-cell.no-card  .plus-icon { color: var(--fg-disabled); }
  .card-cell.folded   .plus-icon { color: var(--fg-disabled); }

  /* =========================================
     SEAT LABELS ROW (id=21~30)
     ========================================= */
  .seat-labels-row {
    position: absolute;
    left: 0;
    top: 29.9%;
    width: 100%;
    height: 12.7%;
    display: flex;
    z-index: 5;
    border-bottom: 1px solid var(--border-light);
  }
  .seat-cell {
    width: 10%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    border-right: 1px solid var(--border-light);
    cursor: pointer;
    flex-shrink: 0;
  }
  .seat-cell:last-child { border-right: none; }

  .seat-cell.turn    { background: var(--accent); }
  .seat-cell.active  { background: var(--bg-primary); border: 1px solid var(--border-default); }
  .seat-cell.empty   { background: var(--bg-muted); }
  .seat-cell.folded  { background: var(--bg-muted); opacity: 0.5; }

  .seat-cell.turn  .seat-lbl {
    color: #fff;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    text-align: center;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .seat-cell.active .seat-lbl {
    color: var(--fg-primary);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    text-align: center;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .seat-cell.empty .seat-lbl {
    color: var(--fg-muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    text-align: center;
    line-height: 1.3;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .seat-cell.folded .seat-lbl {
    color: var(--fg-muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    text-align: center;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* =========================================
     MIDDLE BACKGROUND
     ========================================= */
  .middle-bg {
    position: absolute;
    left: 0;
    top: 42.5%;
    width: 100%;
    height: 40%;
    background: var(--bg-primary);
    z-index: 1;
  }

  /* =========================================
     ACTION PANEL elements (id=31-36)
     ========================================= */

  /* id=31: MISS DEAL */
  .miss-deal {
    position: absolute;
    left: 0;
    top: 46%;
    width: 11%;
    height: 8%;
    background: var(--bg-primary);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border: 1.5px solid var(--error);
    z-index: 5;
  }
  .miss-deal:hover { background: var(--bg-muted); }
  .miss-deal .btn-lbl {
    color: var(--error);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    font-weight: 600;
    text-align: center;
    line-height: 1.3;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* id=31b: CHOP */
  .chop-btn {
    position: absolute;
    left: 0;
    top: 54%;
    width: 11%;
    height: 7%;
    background: var(--bg-primary);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border: 1px solid var(--border-default);
    z-index: 5;
  }
  .chop-btn:hover { background: var(--bg-tertiary); }
  .chop-btn .btn-lbl {
    color: var(--fg-secondary);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    font-weight: 600;
    text-align: center;
    line-height: 1.3;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* id=31c: RUN IT */
  .runit-btn {
    position: absolute;
    left: 0;
    top: 61%;
    width: 11%;
    height: 7%;
    background: var(--bg-primary);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border: 1px solid var(--border-default);
    z-index: 5;
  }
  .runit-btn:hover { background: var(--bg-tertiary); }
  .runit-btn .btn-lbl {
    color: var(--fg-secondary);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    font-weight: 600;
    text-align: center;
    line-height: 1.3;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .runit-btn .btn-mode {
    color: var(--fg-muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 8px;
    font-weight: 500;
    margin-left: 3px;
  }

  /* id=32: TAG star */
  .tag-btn {
    position: absolute;
    left: 91%;
    top: 44%;
    width: 9%;
    height: 12%;
    background: var(--bg-primary);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border: 1.5px solid var(--border-default);
    border-radius: 4px;
    z-index: 5;
  }
  .tag-btn:hover { background: var(--bg-muted); }
  .star-icon {
    color: var(--fg-primary);
    font-size: 20px;
    line-height: 1;
  }

  /* id=33: community cards area */
  .community-area {
    position: absolute;
    left: 13%;
    top: 46%;
    width: 68%;
    height: 16%;
    background: var(--bg-secondary);
    border: 1px solid var(--border-default);
    border-radius: 3px;
    z-index: 5;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .comm-card {
    width: 38px;
    height: 52px;
    background: var(--bg-primary);
    border-radius: 4px;
    border: 1px solid var(--border-default);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    font-weight: 600;
  }
  .comm-card.red { color: var(--error); }
  .comm-card.black { color: var(--fg-primary); }

  /* id=34: player info bar */
  .player-info {
    position: absolute;
    left: 13%;
    top: 62%;
    width: 68%;
    height: 14%;
    background: var(--bg-secondary);
    border: 1px solid var(--border-default);
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 2px;
    z-index: 5;
  }
  .player-info .info-lbl {
    color: var(--fg-primary);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.05em;
    font-variant-numeric: tabular-nums;
  }

  /* id=35: record button */
  .record-btn {
    position: absolute;
    left: 81%;
    top: 62%;
    width: 10%;
    height: 14%;
    background: var(--bg-primary);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border: 1px solid var(--border-default);
    z-index: 5;
  }
  .record-btn:hover { background: var(--bg-muted); }
  .record-dot {
    width: 24px;
    height: 24px;
    background: var(--error);
    border-radius: 50%;
    border: 2px solid #bb0000;
  }

  /* id=36: HIDE GFX */
  .hide-gfx {
    position: absolute;
    left: 83%;
    top: 53%;
    width: 17%;
    height: 9%;
    background: var(--bg-secondary);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border: 1px solid var(--border-default);
    border-radius: 3px;
    z-index: 5;
  }
  .hide-gfx:hover { background: var(--bg-muted); }
  .hide-gfx .btn-lbl {
    color: var(--fg-primary);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* =========================================
     BOTTOM ACTION BUTTONS (id=37~41)
     ========================================= */
  .action-row {
    position: absolute;
    left: 0;
    top: 82.5%;
    width: 100%;
    height: 10.5%;
    display: flex;
    background: var(--bg-primary);
    border-top: 1.5px solid var(--border-default);
    gap: 0;
    z-index: 5;
  }

  /* =========================================
     AMOUNT INPUT ROW (Layer 6)
     ========================================= */
  .amount-row {
    position: absolute;
    left: 0;
    top: 93%;
    width: 100%;
    height: 7%;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 8px;
    box-sizing: border-box;
    background: var(--bg-secondary);
    border-top: 1px solid var(--border-light);
    z-index: 5;
  }
  .amount-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--fg-secondary);
    white-space: nowrap;
  }
  .amount-input {
    flex: 1;
    height: 22px;
    border: 1px solid var(--border-default);
    background: #fff;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    text-align: right;
    padding: 0 8px;
    outline: none;
  }

  .act-btn {
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: opacity 0.1s;
  }
  .act-btn:hover { opacity: 0.8; }

  /* id=37: back */
  .btn-back {
    width: 9%;
    background: var(--bg-secondary);
    border-right: 1px solid var(--border-default);
  }
  .btn-back .act-lbl {
    color: var(--fg-secondary);
    font-size: 22px;
    font-weight: 600;
    line-height: 1;
  }

  /* id=38: FOLD */
  .btn-fold {
    width: 19%;
    background: var(--accent);
    margin: 4px 3px;
    border-radius: 4px;
  }
  .btn-fold .act-lbl {
    color: #fff;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  /* id=39: CHECK */
  .btn-call {
    width: 18%;
    background: var(--accent);
    margin: 4px 3px;
    border-radius: 4px;
  }
  .btn-call .act-lbl {
    color: #fff;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  /* id=40: BET */
  .btn-raise {
    width: 18%;
    background: var(--bg-primary);
    margin: 4px 3px;
    border-radius: 4px;
    border: 1.5px solid var(--accent);
  }
  .btn-raise .act-lbl {
    color: var(--fg-primary);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* id=41: ALL IN */
  .btn-allin {
    width: 18%;
    background: var(--bg-primary);
    margin: 4px 3px;
    border-radius: 4px;
    border: 1.5px solid var(--accent);
  }
  .btn-allin .act-lbl {
    color: var(--fg-primary);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* spacer */
  .btn-spacer {
    flex: 1;
    background: var(--bg-primary);
  }
</style>
</head>
<body>
<div class="screenshot-container">

  <!-- id=1: 윈도우 타이틀바 -->
  <div
    class="titlebar"
    data-element-id="1"
    data-element-name="윈도우 타이틀바"
    data-element-group="titlebar"
  >
    <div class="titlebar-icon">&#9654;</div>
    <span class="titlebar-text">EBS Action Tracker &copy; 2026</span>
    <div class="titlebar-buttons">
      <div class="titlebar-btn">&#8212;</div>
      <div class="titlebar-btn">&#9633;</div>
      <div class="titlebar-btn close-btn">&#10005;</div>
    </div>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">

    <!-- id=2: USB 연결 버튼 -->
    <div
      class="toolbar-cell tb-usb"
      data-element-id="2"
