<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AT-03 Card Selector — EBS Action Tracker</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Noto Sans KR', 'Segoe UI', Arial, sans-serif;
    }

    /* ── Root container: 560 × auto ── */
    .screenshot-container {
      width: 560px;
      position: relative;
      overflow: hidden;
      background: #ffffff;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    /* ─────────────────────────────────────
       id=1  Title Bar
    ───────────────────────────────────── */
    .titlebar {
      width: 100%;
      height: 36px;
      background: #f0f0f0;
      border-bottom: 1px solid #d0d0d0;
      display: flex;
      align-items: center;
      padding: 0 10px;
    }
    .tb-icon {
      width: 14px;
      height: 14px;
      background: #1a1a1a;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .tb-title {
      flex: 1;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      color: #1a1a1a;
      margin-left: 8px;
      white-space: nowrap;
    }
    .tb-buttons {
      display: flex;
      height: 100%;
    }
    .tb-btn {
      width: 36px;
      height: 36px;
      border: none;
      background: transparent;
      font-size: 11px;
      color: #888;
      cursor: default;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    .tb-btn:hover { background: #e0e0e0; }
    .tb-btn.close:hover { background: #dd0000; color: #fff; }

    /* ─────────────────────────────────────
       id=2~4  Top toolbar
    ───────────────────────────────────── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-bottom: 1px solid #e0e0e0;
      background: #fafafa;
    }

    /* id=2: Back Button */
    .back-btn {
      width: 48px;
      height: 36px;
      background: #ffffff;
      border: 1px solid #d0d0d0;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 16px;
      color: #1a1a1a;
      font-weight: bold;
    }
    .back-btn:hover { background: #f0f0f0; }

    /* id=3: Selected Card Display */
    .selected-display {
      flex: 1;
      height: 36px;
      background: #ffffff;
      border: 1px solid #d0d0d0;
      border-radius: 4px;
      display: flex;
      align-items: center;
      padding: 0 8px;
      gap: 6px;
    }
    .sel-card {
      width: 32px;
      height: 28px;
      background: #fafafa;
      border: 1px solid #d0d0d0;
      border-radius: 3px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
    .sel-card .sel-rank {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      font-weight: 700;
    }
    .sel-card .sel-suit {
      font-size: 10px;
    }
    .sel-card.heart .sel-rank,
    .sel-card.heart .sel-suit { color: #dd0000; }
    .sel-card.spade .sel-rank,
    .sel-card.spade .sel-suit { color: #1a1a1a; }

    /* id=4: OK Button */
    .ok-btn {
      width: 64px;
      height: 36px;
      background: #1a1a1a;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: none;
    }
    .ok-btn:hover { background: #333; }
    .ok-btn span {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 14px;
      font-weight: 700;
      color: #ffffff;
    }

    /* ─────────────────────────────────────
       CARD GRID (ids 5–8)
       4 rows × 13 cols
    ───────────────────────────────────── */
    .card-grid {
      display: flex;
      flex-direction: column;
    }

    .card-row {
      display: flex;
      height: 72px;
      border-bottom: 1px solid #e0e0e0;
    }
    .card-row:last-child { border-bottom: none; }

    .card-row.spade  { background: #ffffff; }
    .card-row.heart  { background: #fafafa; }
    .card-row.diamond{ background: #ffffff; }
    .card-row.club   { background: #fafafa; }

    .card-cell {
      flex: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      padding: 4px 2px;
    }

    .card-face {
      width: calc(100% - 4px);
      height: calc(100% - 6px);
      border-radius: 4px;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 1px solid #d0d0d0;
      gap: 1px;
      transition: background 0.1s;
    }
    .card-cell:hover .card-face {
      background: #f0f0f0;
      border-color: #1a1a1a;
    }

    .c-rank {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1;
    }
    .c-suit {
      font-size: 12px;
      color: #1a1a1a;
      line-height: 1;
    }

    /* Spade / Club suit text color: black */
    .card-row.spade .c-rank,
    .card-row.spade .c-suit,
    .card-row.club .c-rank,
    .card-row.club .c-suit {
      color: #1a1a1a;
    }

    /* Heart / Diamond suit text color: red */
    .card-row.heart .c-rank,
    .card-row.heart .c-suit,
    .card-row.diamond .c-rank,
    .card-row.diamond .c-suit {
      color: #dd0000;
    }

    /* Disabled (already selected) card */
    .card-cell.disabled .card-face {
      opacity: 0.3;
    }
    .card-cell.disabled:hover .card-face {
      background: #ffffff;
      border-color: #d0d0d0;
      cursor: default;
    }
  </style>
</head>
<body>
  <div class="screenshot-container">

    <!-- id=1: Title Bar -->
    <div
      class="titlebar"
      data-element-id="1"
      data-element-name="Title Bar"
      data-element-group="chrome"
    >
      <div class="tb-icon"></div>
      <span class="tb-title">EBS Action Tracker</span>
      <div class="tb-buttons">
        <button class="tb-btn">&#x2014;</button>
        <button class="tb-btn">&#x25A1;</button>
        <button class="tb-btn close">&#x2715;</button>
      </div>
    </div>
    <!-- id=1: Title Bar -->

    <!-- id=2~4: Toolbar -->
    <div class="toolbar">

      <!-- id=2: Back Button -->
      <div
        class="back-btn"
        data-element-id="2"
        data-element-name="Back Button"
        data-element-group="navigation"
      >&#9664;</div>
      <!-- id=2: Back Button -->

      <!-- id=3: Selected Card Display -->
      <div
        class="selected-display"
        data-element-id="3"
        data-element-name="Selected Card Display"
        data-element-group="display"
      >
        <!-- 7♥ selected -->
        <div class="sel-card heart">
          <span class="sel-rank">7</span>
          <span class="sel-suit">&#x2665;</span>
        </div>
        <!-- 6♠ selected -->
        <div class="sel-card spade">
          <span class="sel-rank">6</span>
          <span class="sel-suit">&#x2660;</span>
        </div>
      </div>
      <!-- id=3: Selected Card Display -->

      <!-- id=4: OK Button -->
      <div
        class="ok-btn"
        data-element-id="4"
        data-element-name="OK Button"
        data-element-group="action"
      >
        <span>OK</span>
      </div>
      <!-- id=4: OK Button -->

    </div>

    <!-- Card Grid -->
    <div class="card-grid">

      <!-- id=5: Spade Row -->
      <div
        class="card-row spade"
        data-element-id="5"
        data-element-name="Spade Row"
        data-element-group="card_grid"
      >
        <div class="card-cell"><div class="card-face"><span class="c-rank">A</span><span class="c-suit">&#x2660;</span></div></div>
        <div class="card-cell"><div class="card-face"><span class="c-rank">K</span><span class="c-suit">&#x2660;</span></div></div>
        <div class="card-cell"><div class="card-face"><span class="c-rank">Q</span><span class="c-suit">&#x2660;</span></div></div>
        <div class="card-cell"><div class="card-face"><span class="c-rank">J</span><span class="c-suit">&#x2660;</span></div></div>
        <div class="card-cell"><div class="card-face"><span class="c-rank">10</span><span class="c-suit">&#x2660;</span></div></div>
        <div class="card-cell"><div class="card-face"><span class="c-rank">9</span><span class="c-suit">&#x2660;</span></div></div>
        <div class="card-cell"><div class="card-face"><span class="c-rank">8</span><span class="c-suit">&#x2660;</span></div></div>
        <div class="card-cell"><div class="card-face"><span class="c-rank">7</span><span class="c-suit">&#x2660;</span></div></div>
        <!-- 6♠ disabled (already selected) -->
        <div class="card-cell disabled"><div class="card-face"><span class="c-rank">6</span><span class="c-suit">&#x2660;</span></div></div>
        <div class="card-cell"><div class="card-face"><span class="c-rank">5</span><span class="c-suit">&#x2660;</span></div></div>
        <div class="card-cell"><div class="card-face"><span class="c-rank">4</span><span class="c-suit">&#x2660;</span></div></div>
        <div class="card-cell"><div class="card-face"><span class="c-rank">3</span><span class="c-suit">&#x2660;</span></div></div>
        <div class="card-cell"><div class="card-face"><span class="c-rank">2</span><span class="c-suit">&#x2660;</span></div></div>
      </div>
      <!-- id=5: Spade Row -->

      <!-- id=6: Heart Row -->
      <div
        class="card-row heart"
        data-element-id="6"
        data-element-name="Heart Row"
        data-element-group="card_grid"
      >
        <div class="card-cell"><div class="card-face"><span class="c-rank">A</span><span class="c-suit">&#x2665;</span></div></div>
        <div class="card-cell"><div class="card-face"><span class="c-rank">K</span><span class="c-suit">&#x2665;</span></div></div>
        <div class="card-cell"><div class="card-face"><span class="c-rank">Q</span><span class="c-suit">&#x2665;</span></div></div>
        <div class="card-cell"><div class="card-face"><span class="c-rank">J</span><span class="c-suit">&#x2665;</span></div></div>
        <div class="card-cell"><div class="card-face"><span class="c-rank">10</span><span class="c-suit">&#x2665;</span></div></div>
        <div class="card-cell"><div class="card-face"><span class="c-rank">9</span><span class="c-suit">&#x2665;</span></div></div>
        <div class="card-cell"><div class="card-face"><span class="c-rank">8</span><span class="c-suit">&#x2665;</span></div></div>
        <!-- 7♥ disabled (already selected) -->
        <div class="card-cell disabled"><div class="card-face"><span class="c-rank">7</span><span class="c-suit">&#x2665;</span></div></div>
        <div class="card-cell"><div class="card-face"><span class="c-rank">6</span><span class="c-suit">&#x2665;</span></div></div>
        <div class="card-cell"><div class="card-face"><span class="c-rank">5</span><span class="c-suit">&#x2665;</span></div></div>
        <div class="card-cell"><div class="card-face"><span class="c-rank">4</span><span class="c-suit">&#x2665;</span></div></div>
        <div class="card-cell"><div class="card-face"><span class="c-rank">3</span><span class="c-suit">&#x2665;</span></div></div>
        <div class="card-cell"><div class="card-face"><span class="c-rank">2</span><span class="c-suit">&#x2665;</span></div></div>
      </div>
      <!-- id=6: Heart Row -->

      <!-- id=7: Diamond Row -->
      <div
        class="card-row diamond"
        data-element-id="7"
        data-element-name="Diamond Row"
        data-element-group="card_grid"
      >
        <div class="card-cell"><div class="card-face"><span class="c-rank">A</span><span class="c-suit">&#x2666;</span></div></div>
        <div class="card-cell"><div class="card-face"><span class="c-rank">K</span><span class="c-suit">&#x2666;</span></div></div>
        <div class="card-cell"><div class="card-face"><span class="c-rank">Q</span><span class="c-suit">&#x2666;</span></div></div>
        <div class="card-cell"><div class="card-face"><span class="c-rank">J</span><span class="c-suit">&#x2666;</span></div></div>
        <div class="card-cell"><div class="card-face"><span class="c-rank">10</span><span class="c-suit">&#x2666;</span></div></div>
        <div class="card-cell"><div class="card-face"><span class="c-rank">9</span><span class="c-suit">&#x2666;</span></div></div>
        <div class="card-cell"><div class="card-face"><span class="c-rank">8</span><span class="c-suit">&#x2666;</span></div></div>
        <div class="card-cell"><div class="card-face"><span class="c-rank">7</span><span class="c-suit">&#x2666;</span></div></div>
        <div class="card-cell"><div class="card-face"><span class="c-rank">6</span><span class="c-suit">&#x2666;</span></div></div>
        <div class="card-cell"><div class="card-face"><span class="c-rank">5</span><span class="c-suit">&#x2666;</span></div></div>
        <div class="card-cell"><div class="card-face"><span class="c-rank">4</span><span class="c-suit">&#x2666;</span></div></div>
        <div class="card-cell"><div class="card-face"><span class="c-rank">3</span><span class="c-suit">&#x2666;</span></div></div>
        <div class="card-cell"><div class="card-face"><span class="c-rank">2</span><span class="c-suit">&#x2666;</span></div></div>
      </div>
      <!-- id=7: Diamond Row -->

      <!-- id=8: Club Row -->
      <div
        class="card-row club"
        data-element-id="8"
        data-element-name="Club Row"
        data-element-group="card_grid"
      >
        <div class="card-cell"><div class="card-face"><span class="c-rank">A</span><span class="c-suit">&#x2663;</span></div></div>
        <div class="card-cell"><div class="card-face"><span class="c-rank">K</span><span class="c-suit">&#x2663;</span></div></div>
        <div class="card-cell"><div class="card-face"><span class="c-rank">Q</span><span class="c-suit">&#x2663;</span></div></div>
        <div class="card-cell"><div class="card-face"><span class="c-rank">J</span><span class="c-suit">&#x2663;</span></div></div>
        <div class="card-cell"><div class="card-face"><span class="c-rank">10</span><span class="c-suit">&#x2663;</span></div></div>
        <div class="card-cell"><div class="card-face"><span class="c-rank">9</span><span class="c-suit">&#x2663;</span></div></div>
        <div class="card-cell"><div class="card-face"><span class="c-rank">8</span><span class="c-suit">&#x2663;</span></div></div>
        <div class="card-cell"><div class="card-face"><span class="c-rank">7</span><span class="c-suit">&#x2663;</span></div></div>
        <div class="card-cell"><div class="card-face"><span class="c-rank">6</span><span class="c-suit">&#x2663;</span></div></div>
        <div class="card-cell"><div class="card-face"><span class="c-rank">5</span><span class="c-suit">&#x2663;</span></div></div>
        <div class="card-cell"><div class="card-face"><span class="c-rank">4</span><span class="c-suit">&#x2663;</span></div></div>
        <div class="card-cell"><div class="card-face"><span class="c-rank">3</span><span class="c-suit">&#x2663;</span></div></div>
        <div class="card-cell"><div class="card-face"><span class="c-rank">2</span><span class="c-suit">&#x2663;</span></div></div>
      </div>
      <!-- id=8: Club Row -->

    </div>

  </div>
</body>
</html>
