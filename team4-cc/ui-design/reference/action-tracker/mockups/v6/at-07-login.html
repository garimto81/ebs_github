<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AT-07: Login Screen — EBS v6 White</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #e8e8e8;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Noto Sans KR', 'Segoe UI', sans-serif;
  }

  /* ── Root container: 480 x 360 ── */
  .screenshot-container {
    width: 480px;
    height: 360px;
    position: relative;
    overflow: hidden;
    background: #ffffff;
    border: 1px solid #d0d0d0;
    border-radius: 8px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.1);
    display: flex;
    flex-direction: column;
  }

  /* ─────────────────────────────────────
     TITLEBAR (ids 1-5)
  ───────────────────────────────────── */
  .titlebar {
    width: 100%;
    height: 36px;
    background: #f0f0f0;
    border-bottom: 1px solid #d0d0d0;
    display: flex;
    align-items: center;
    padding: 0 10px;
    flex-shrink: 0;
  }

  /* id=1 App Icon */
  .tb-icon {
    width: 16px;
    height: 16px;
    background: #1a1a1a;
    border-radius: 3px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .tb-icon::after {
    content: '';
    width: 8px;
    height: 8px;
    background: #fff;
    border-radius: 1px;
  }

  /* id=2 Title Text */
  .tb-title {
    flex: 1;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    color: #1a1a1a;
    margin-left: 8px;
    white-space: nowrap;
    overflow: hidden;
  }

  /* ids 3,4,5 Window controls */
  .tb-buttons {
    display: flex;
    height: 100%;
    margin-left: 4px;
  }
  .tb-btn {
    width: 36px;
    height: 36px;
    border: none;
    background: transparent;
    font-size: 11px;
    color: #555;
    cursor: default;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .tb-btn:hover { background: #e0e0e0; }
  .tb-btn.close:hover { background: #dd0000; color: #fff; }

  /* ─────────────────────────────────────
     Content area (center form)
  ───────────────────────────────────── */
  .content-area {
    flex: 1;
    background: #fafafa;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 60px;
  }

  /* ─────────────────────────────────────
     id=6 App Title
  ───────────────────────────────────── */
  .app-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #1a1a1a;
    text-align: center;
    margin-bottom: 4px;
  }
  .app-version {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: #888;
    letter-spacing: 1px;
    text-align: center;
    margin-bottom: 28px;
  }

  /* ─────────────────────────────────────
     Form wrapper
  ───────────────────────────────────── */
  .form-wrapper {
    width: 100%;
    max-width: 320px;
    display: flex;
    flex-direction: column;
  }

  /* Input group */
  .input-group {
    margin-bottom: 14px;
  }
  .input-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 5px;
    display: block;
  }

  /* ─────────────────────────────────────
     id=7, id=8 Input fields
  ───────────────────────────────────── */
  .text-field {
    width: 100%;
    height: 40px;
    border: 1px solid #d0d0d0;
    background: #ffffff;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: #1a1a1a;
    padding: 0 12px;
    outline: none;
    border-radius: 4px;
  }
  .text-field:focus {
    border-color: #1a1a1a;
    box-shadow: 0 0 0 1px #1a1a1a;
  }
  .text-field::placeholder {
    color: #bbb;
  }

  /* ─────────────────────────────────────
     id=9 CONNECT Button
  ───────────────────────────────────── */
  .connect-btn {
    width: 100%;
    height: 42px;
    background: #1a1a1a;
    color: #ffffff;
    border: none;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 6px;
    margin-bottom: 16px;
    border-radius: 4px;
  }
  .connect-btn:hover { background: #333; }
  .connect-btn:active { background: #000; }

  /* ─────────────────────────────────────
     id=10 Status Indicator
  ───────────────────────────────────── */
  .status-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #dd0000;
    flex-shrink: 0;
    animation: pulse-red 1.8s ease-in-out infinite;
  }
  @keyframes pulse-red {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }
  .status-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: #888;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* ─────────────────────────────────────
     id=11 Error Message
  ───────────────────────────────────── */
  .error-message {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 11px;
    color: #dd0000;
    letter-spacing: 0.2px;
    min-height: 16px;
    line-height: 1.4;
  }
</style>
</head>
<body>
<div class="screenshot-container">

  <!-- TITLEBAR (ids 1-5) -->
  <div class="titlebar">
    <!-- id=1 --> <div class="tb-icon"></div>
    <!-- id=2 --> <span class="tb-title">EBS Action Tracker</span>
    <div class="tb-buttons">
      <!-- id=3 --> <button class="tb-btn">&#x2014;</button>
      <!-- id=4 --> <button class="tb-btn">&#x25A1;</button>
      <!-- id=5 --> <button class="tb-btn close">&#x2715;</button>
    </div>
  </div>

  <!-- Content area -->
  <div class="content-area">

    <!-- id=6: App Title -->
    <div class="app-title">EBS Action Tracker</div>
    <div class="app-version">v1.0.0</div>

    <div class="form-wrapper">

      <!-- id=7: Server IP -->
      <div class="input-group">
        <label class="input-label">Server IP</label>
        <input class="text-field" type="text" placeholder="192.168.1.100:9001">
      </div>

      <!-- id=8: Password -->
      <div class="input-group">
        <label class="input-label">Password</label>
        <input class="text-field" type="password" placeholder="&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;">
      </div>

      <!-- id=9: CONNECT Button -->
      <button class="connect-btn">Connect</button>

      <!-- id=10: Status Indicator -->
      <div class="status-row">
        <div class="status-dot"></div>
        <span class="status-label">Disconnected</span>
      </div>

      <!-- id=11: Error Message -->
      <div class="error-message">Connection refused — check server address and retry.</div>

    </div>

  </div>

</div>
</body>
</html>
