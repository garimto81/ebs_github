# EBS cc-web nginx config — image 내부 SSOT (S11 Cycle 10, 2026-05-12).
#
# 본 파일은 image build 시 multi-stage Dockerfile 의 nginx stage 로 COPY 된다.
# Cycle 9 (PR #360, issue #355) 의 docker-compose bind-mount (infra/web/cc-web.nginx.conf)
# 가 우회로서 image stale config 를 덮어쓰던 패턴을 흡수 — bind-mount 제거 가능 상태.
#
# 책임
#   1. Flutter Web (Command Center) 정적 서빙 (port 3001, Lobby :3000 와 별개 컨테이너)
#   2. /api/    -> bo:8000/api/      reverse proxy
#   3. /ws/     -> bo:8000/ws/       WebSocket upgrade (CC monitoring + dealer events)
#   4. /engine/ -> engine:8080/      reverse proxy fallback (CC 가 engine 직접 호출 시)
#   5. SPA fallback + /healthz
#
# 브라우저 모델 (Same-origin)
#   클라이언트 (PC/태블릿) 는 동일 origin (http://<lan-ip>:3001/) 으로 모든 요청 발생.
#   /api/* /ws/* /engine/* 모두 nginx reverse proxy 로 내부 ebs-net 서비스에 도달.
#   .'. hosts 매핑 (api.ebs.local) 불필요.

server {
    listen       3001 default_server;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript
               application/json application/wasm image/svg+xml font/woff2;

    # Healthcheck
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Cache: hashed assets + .riv (Rive animation) 1년 immutable
    location ~* \.(?:js|css|woff2?|ttf|otf|svg|png|jpg|jpeg|webp|ico|map|wasm|riv)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # REST API reverse proxy
    location /api/ {
        proxy_pass http://bo:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # WebSocket reverse proxy
    location /ws/ {
        proxy_pass http://bo:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 10s;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Engine direct call (옵션 — CC 가 /engine/health 등 직접 호출 시 fallback)
    # SG-002 Engine_Dependency_Contract: CC 는 ENGINE_URL env 로 직접 접근하므로
    # 본 location 은 fallback 으로만 사용. 기본 트래픽은 ENGINE_URL=http://engine:8080.
    location /engine/ {
        proxy_pass http://engine:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 보안 헤더
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
