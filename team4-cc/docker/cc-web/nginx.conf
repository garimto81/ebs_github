# 2026-04-27 — cc-web Nginx site config.
# SG-022 폐기 cascade. Lobby (3000) 와 별개 컨테이너 — port 3001.
# SPA + static caching + healthcheck endpoint.

server {
    listen       3001 default_server;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # gzip
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # ----------------------------------------------------------------------
    # Healthcheck — Docker HEALTHCHECK + Compose 의존성 게이트
    # ----------------------------------------------------------------------
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # ----------------------------------------------------------------------
    # Cache strategy
    # ----------------------------------------------------------------------
    # Hashed assets — 1년 immutable
    location ~* \.(?:js|css|woff2?|ttf|otf|svg|png|jpg|jpeg|webp|ico|map|riv)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html — 항상 신선하게
    location = /index.html {
        add_header Cache-Control "no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # ----------------------------------------------------------------------
    # SPA fallback — go_router 가 client-side 처리하도록 모두 index.html
    # ----------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ----------------------------------------------------------------------
    # Security headers
    # ----------------------------------------------------------------------
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
}
