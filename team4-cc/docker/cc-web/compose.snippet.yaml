# 본 snippet 은 레포 루트 docker-compose.yml 에 통합되어 있음 (Conductor 가 sync).
# 단독 검토용 참조 자료.
# 2026-04-27 — SG-022 폐기 cascade.

services:
  cc-web:
    image: ebs/cc-web:${CC_WEB_TAG:-latest}
    build:
      context: ./team4-cc
      dockerfile: docker/cc-web/Dockerfile
      args:
        ENV_FILE: production.json
    container_name: ebs-cc-web
    profiles: ["web"]
    restart: unless-stopped
    ports:
      - "3001:3001"
    networks:
      - ebs-net
    environment:
      - BO_URL=http://bo:8000
      - ENGINE_URL=http://engine:8080
      - LOBBY_URL=http://lobby-web:3000
    depends_on:
      bo:
        condition: service_healthy
      engine:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3001/healthz"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
    labels:
      - "ebs.team=team4"
      - "ebs.service=cc-web"
      - "ebs.phase=5-production"
      - "ebs.deprecates=SG-022"
