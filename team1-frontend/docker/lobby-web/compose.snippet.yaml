# 본 snippet 을 레포 루트 docker-compose.yml 의 services 블록에 merge.
# Conductor 가 sync phase 에서 통합.

services:
  lobby-web:
    image: ebs/lobby-web:${LOBBY_WEB_TAG:-latest}
    build:
      context: ./team1-frontend
      dockerfile: docker/lobby-web/Dockerfile
      args:
        ENV_FILE: production.json
    container_name: ebs-lobby-web
    profiles: ["web"]
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - ebs-net
    depends_on:
      bo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/healthz"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
    labels:
      - "ebs.team=team1"
      - "ebs.service=lobby-web"
      - "ebs.phase=5-production"
