name: team1-frontend CI
on:
  pull_request:
    paths:
      - 'team1-frontend/**'
      - '.github/workflows/team1-ci.yml'
  push:
    branches: [main, 'team1/**', 'work/team1/**']
    paths:
      - 'team1-frontend/**'

# Flutter test gate — Quasar/pnpm 단계는 2026-04-21 Flutter 단일 스택 전환으로 제거.
jobs:
  test-gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: team1-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Freezed/json_serializable
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Static analysis
        run: flutter analyze --no-fatal-infos

      - name: Unit + widget tests
        run: flutter test --coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: team1-coverage
          path: team1-frontend/coverage/
