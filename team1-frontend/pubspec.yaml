name: ebs_lobby
description: EBS Team 1 — Lobby + Settings + Graphic Editor (Flutter Desktop)
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.5
  dio: ^5.4.0
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.1
  web_socket_channel: ^2.4.5
  go_router: ^14.0.0
  rive: ^0.13.4
  archive: ^3.6.1
  uuid: ^4.4.0
  intl: ^0.20.2
  sentry_flutter: ^8.3.0
  file_picker: ^8.0.0
  window_manager: ^0.3.9
  collection: ^1.18.0
  logging: ^1.2.0
  ebs_common:
    path: ../shared/ebs_common

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true
