# nginx config — team1-frontend (EBS Lobby Web)
#
# 역할:
#   1. Flutter Web SPA 정적 서빙 (/usr/share/nginx/html)
#   2. /api/ → ebs-bo:8000/api/ (Docker compose 내부 네트워크)
#   3. /ws/  → ebs-bo:8000/ws/  (WebSocket upgrade)
#
# 브라우저는 동일 origin (http://<host>:3000) 로 모든 요청 발생.
# CORS 불필요 — nginx 가 reverse proxy 로 Backend 와 통신.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip 압축 (Flutter Web .js 크기 큼) ──
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript
               application/json application/wasm font/woff2;

    # ── Cache policy ──
    # main.dart.js, assets: 빌드시 hash 포함 — long cache OK
    location ~* \.(js|css|wasm|woff2|png|jpg|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html: no-cache (배포 즉시 반영)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # ── SPA fallback ──
    # Flutter go_router hash/path 라우팅 지원
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Backend REST API proxy ──
    location /api/ {
        proxy_pass http://bo:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # ── WebSocket proxy (Lobby + CC channels) ──
    location /ws/ {
        proxy_pass http://bo:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # WebSocket 장시간 연결 유지
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Healthcheck endpoint ──
    location /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── 민감 파일 보호 ──
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
