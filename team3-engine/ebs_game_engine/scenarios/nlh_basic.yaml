# Basic NLH scenario — 3 players, simple preflop action
variant: nlh
dealer: 0

blinds:
  sb: 5
  bb: 10

seats:
  - index: 0
    label: "Seat 1"
    stack: 1000
  - index: 1
    label: "Seat 2"
    stack: 1000
  - index: 2
    label: "Seat 3"
    stack: 1000

events:
  - deal_hole:
      0: [As, Kh]
      1: [Qd, Qc]
      2: [7h, 2c]
  - action:
      seat: 0
      type: call
      amount: 10
  - action:
      seat: 1
      type: call
      amount: 5
  - action:
      seat: 2
      type: check
  - street_advance: flop
  - deal_community: [Ac, Ks, Qh]
  - action:
      seat: 1
      type: check
  - action:
      seat: 2
      type: check
  - action:
      seat: 0
      type: bet
      amount: 20
  - action:
      seat: 1
      type: raise
      amount: 60
  - action:
      seat: 2
      type: fold
  - action:
      seat: 0
      type: call
      amount: 40
  - street_advance: turn
  - deal_community: [5d]
  - action:
      seat: 1
      type: check
  - action:
      seat: 0
      type: bet
      amount: 50

expectations:
  pot_after_flop: 150
  winner: seat_0
