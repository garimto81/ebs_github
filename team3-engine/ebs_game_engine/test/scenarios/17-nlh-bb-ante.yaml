# Scenario 17: NLH with BB Ante (type 2)
# 4 players, ante=5 per player, BB pays all antes (5×4=20)
# dealer=seat0, SB=seat1, BB=seat2, UTG=seat3
# After HandStart:
# - BB posts ante for all: 5×4=20, seat2 stack=1000-20=980
# - seat1 posts SB=10: stack=990
# - seat2 posts BB=20: stack=980-20=960
# - pot = 20(ante) + 10(SB) + 20(BB) = 50
# Preflop: seat3(UTG) raises 50, seat0 folds, seat1 folds, seat2 calls 30
# - seat3: 1000-50=950, pot=50+50=100
# - seat2: 960-30=930, pot=100+30=130
# Flop to river, checks through
# Showdown: seat3 wins with AK vs seat2's 9-4
# pot_awarded: seat3 gets 130
# Final: seat0=1000, seat1=990, seat2=930, seat3=950+130=1080
# Check: 1000+990+930+1080 = 4000 ✓
variant: nlh
dealer: 0
blinds:
  sb: 10
  bb: 20
config:
  ante_type: 2
  ante_amount: 5
seats:
  - { label: "BTN", stack: 1000 }
  - { label: "SB", stack: 1000 }
  - { label: "BB", stack: 1000 }
  - { label: "UTG", stack: 1000 }
events:
  - deal_hole:
      0: [7h, 2c]
      1: [8d, 3c]
      2: [9s, 4d]
      3: [As, Kh]
  # Preflop: UTG acts first
  - action: { seat: 3, type: raise, amount: 50 }
  - action: { seat: 0, type: fold }
  - action: { seat: 1, type: fold }
  - action: { seat: 2, type: call, amount: 30 }
  # Flop
  - street_advance: flop
  - deal_community: [Ah, 7d, 2s]
  - action: { seat: 2, type: check }
  - action: { seat: 3, type: check }
  # Turn
  - street_advance: turn
  - deal_community: [Ts]
  - action: { seat: 2, type: check }
  - action: { seat: 3, type: check }
  # River
  - street_advance: river
  - deal_community: [3s]
  - action: { seat: 2, type: check }
  - action: { seat: 3, type: check }
  # Showdown
  - pot_awarded: { 3: 130 }
  - hand_end: true
expectations:
  hand_ended: true
  pot_total: 0
  community_count: 5
  stacks:
    0: 1000
    1: 990
    2: 930
    3: 1080
