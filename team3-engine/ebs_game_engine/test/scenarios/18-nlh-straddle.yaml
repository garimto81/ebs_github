# Scenario 18: NLH with Straddle
# 4 players, BB=20, straddle on seat3 (UTG), straddle=2×BB=40
# dealer=seat0, SB=seat1, BB=seat2, UTG/straddle=seat3
# After HandStart:
# - seat1 posts SB=10: stack=990
# - seat2 posts BB=20: stack=980
# - seat3 posts straddle=40: stack=960
# - pot = 10+20+40 = 70
# Action order: first to act = seat after straddle = seat0
# Preflop: seat0 folds, seat1 folds, seat2 folds → straddle wins
# pot_awarded: seat3 gets 70
# Final: seat0=1000, seat1=990, seat2=980, seat3=960+70=1030
# Check: 1000+990+980+1030 = 4000 ✓
variant: nlh
dealer: 0
blinds:
  sb: 10
  bb: 20
config:
  straddle_enabled: true
  straddle_seat: 3
seats:
  - { label: "BTN", stack: 1000 }
  - { label: "SB", stack: 1000 }
  - { label: "BB", stack: 1000 }
  - { label: "UTG", stack: 1000 }
events:
  - deal_hole:
      0: [7h, 2c]
      1: [8d, 3c]
      2: [9s, 4d]
      3: [As, Kh]
  # Preflop: seat0 acts first (after straddle seat3)
  - action: { seat: 0, type: fold }
  - action: { seat: 1, type: fold }
  - action: { seat: 2, type: fold }
  # Straddle wins uncontested
  - pot_awarded: { 3: 70 }
  - hand_end: true
expectations:
  hand_ended: true
  pot_total: 0
  stacks:
    0: 1000
    1: 990
    2: 980
    3: 1030
  seat_statuses:
    0: folded
    1: folded
    2: folded
