# Scenario 03: NLH 3-way side pot — different stacks, all go all-in preflop
# dealer=seat0, SB=seat1(100 stack), BB=seat2(300 stack)
# seat0(500) is UTG
# Short stack goes all-in for their stack
variant: nlh
dealer: 0
blinds:
  sb: 5
  bb: 10
seats:
  - { label: "Big Stack", stack: 500 }
  - { label: "Short Stack", stack: 100 }
  - { label: "Mid Stack", stack: 300 }
events:
  - deal_hole:
      0: [As, Kh]
      1: [Qd, Qc]
      2: [Jd, Jc]
  # Preflop: seat0(UTG) raises all-in
  - action: { seat: 0, type: allin, amount: 500 }
  # SB(seat1) calls all-in for remaining stack (100-5=95)
  - action: { seat: 1, type: allin, amount: 95 }
  # BB(seat2) calls all-in for remaining stack (300-10=290)
  - action: { seat: 2, type: allin, amount: 290 }
  # All players are all-in — deal community cards
  - deal_community: [Ac, Ad, 2s]
  - deal_community: [3h]
  - deal_community: [4d]
  # Award main pot to short stack winner, side pots to others
  - pot_awarded: { 1: 300, 0: 600 }
  - hand_end: true
expectations:
  hand_ended: true
  pot_total: 0
  community_count: 5
  stacks:
    0: 600     # 500 - 500 + 600 (side pot winner)
    1: 300     # 100 - 100 + 300 (main pot winner)
    2: 0       # 300 - 300 (lost all)
  seat_statuses:
    0: allIn
    1: allIn
    2: allIn
