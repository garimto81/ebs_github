<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EBS Game Engine — Interactive Simulator</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- HEADER -->
  <header class="header">
    <div class="header-brand">
      <span class="brand-icon">♠</span>
      <span class="brand-title">EBS Game Engine</span>
      <span class="brand-sub">Interactive Simulator</span>
    </div>
    <div class="header-controls">
      <div class="ctrl-group">
        <label>Variant</label>
        <select id="sel-variant">
          <option value="nlh">NL Hold'em</option>
        </select>
      </div>
      <div class="ctrl-group">
        <label>Seats</label>
        <select id="sel-seats">
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="6" selected>6</option>
          <option value="9">9</option>
          <option value="10">10</option>
        </select>
      </div>
      <div class="ctrl-group">
        <label>Stack</label>
        <input id="inp-stack" type="number" value="1000" min="10" max="99999" />
      </div>
      <div class="ctrl-group">
        <label>BB</label>
        <input id="inp-bb" type="number" value="20" min="1" max="9999" />
      </div>
      <button id="btn-new-hand" class="btn btn-primary">
        <span>&#9654;</span> New Hand
      </button>
    </div>
  </header>

  <!-- MAIN AREA -->
  <main class="main-layout">
    <!-- TABLE PANEL -->
    <section class="panel panel-table" id="panel-table">
      <div class="panel-header">
        <span class="panel-title" id="lbl-variant">NL Hold'em</span>
        <span class="panel-badge" id="lbl-street"></span>
      </div>
      <div class="table-container">
        <svg id="table-svg" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
          <text x="400" y="300" text-anchor="middle" fill="#555" font-size="18">
            Start a new hand to begin
          </text>
        </svg>
      </div>
    </section>

    <!-- LOG PANEL -->
    <section class="panel panel-log" id="panel-log">
      <div class="panel-header">
        <span class="panel-title">Event Log</span>
        <span id="lbl-event-count" class="panel-badge">0 events</span>
      </div>
      <ul class="event-list" id="event-list"></ul>
    </section>
  </main>

  <!-- BOTTOM BAR -->
  <footer class="footer">
    <!-- CONTROLS -->
    <div class="footer-section controls-section">
      <div class="action-row" id="action-row">
        <span class="no-actions">No active session</span>
      </div>
      <div class="amount-row" id="amount-row" style="display:none">
        <div class="amount-presets" id="amount-presets">
          <button class="btn btn-sm preset-btn" data-preset="min">Min</button>
          <button class="btn btn-sm preset-btn" data-preset="half">½ Pot</button>
          <button class="btn btn-sm preset-btn" data-preset="pot">Pot</button>
          <button class="btn btn-sm preset-btn" data-preset="allin">All-In</button>
        </div>
        <input id="amount-slider" type="range" min="0" max="1000" value="0" />
        <input id="amount-input" type="number" min="0" max="99999" value="0" />
        <button id="btn-send" class="btn btn-primary">Send</button>
      </div>
    </div>

    <!-- TIMELINE -->
    <div class="footer-section timeline-section">
      <div class="timeline-controls">
        <button class="btn btn-sm tl-btn" id="tl-first" title="First">&#9664;&#9664;</button>
        <button class="btn btn-sm tl-btn" id="tl-prev"  title="Prev">&#9664;</button>
        <button class="btn btn-sm tl-btn" id="tl-next"  title="Next">&#9654;</button>
        <button class="btn btn-sm tl-btn" id="tl-last"  title="Last">&#9654;&#9654;</button>
        <input id="tl-slider" type="range" min="0" max="0" value="0" />
        <span id="tl-label" class="tl-label">0/0</span>
        <span id="tl-replay-badge" class="replay-badge" style="display:none">REPLAY MODE</span>
      </div>
      <div class="utility-row">
        <button class="btn btn-sm" id="btn-manual-deal">Manual Deal</button>
        <button class="btn btn-sm" id="btn-save">Save YAML</button>
        <button class="btn btn-sm btn-danger" id="btn-undo">Undo</button>
        <div class="ctrl-group">
          <label>Scenario</label>
          <select id="sel-scenario">
            <option value="">— Load Scenario —</option>
          </select>
        </div>
      </div>
    </div>
  </footer>

  <!-- MANUAL DEAL MODAL -->
  <div id="modal-manual-deal" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <div class="modal-header">
        <h2>Manual Card Assignment</h2>
        <button class="btn btn-sm modal-close" id="modal-close-btn">&#x2715;</button>
      </div>
      <div class="modal-body">
        <p class="modal-hint" id="modal-hint">Click a slot below, then click a card to assign it.</p>
        <div class="deal-slots" id="deal-slots">
          <!-- Populated by JS -->
        </div>
        <hr class="modal-divider" />
        <div class="card-grid" id="card-grid">
          <!-- Populated by JS -->
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" id="modal-apply">Apply</button>
        <button class="btn" id="modal-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
