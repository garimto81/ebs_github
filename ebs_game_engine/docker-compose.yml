services:
  # ── Production: compiled binary ──────────────────────────────────────────────
  harness:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./scenarios:/app/scenarios:rw
      - ./out:/app/out:rw
    environment:
      - LOG_LEVEL=debug

  # ── Dev: live reload with Dart SDK ───────────────────────────────────────────
  harness-dev:
    image: dart:stable
    working_dir: /app
    command: dart run bin/harness.dart --port 8080
    ports:
      - "8080:8080"
    volumes:
      - .:/app:rw
      - ./scenarios:/app/scenarios:rw
    profiles:
      - dev
