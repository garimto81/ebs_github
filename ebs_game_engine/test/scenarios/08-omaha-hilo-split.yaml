# Scenario 08: Omaha Hi-Lo — one player wins hi, another wins lo, pot splits 50/50
# dealer=seat0(HU: BTN/SB), seat1=BB
# seat0 has strong hi hand, seat1 has strong lo hand
variant: omaha_hilo
dealer: 0
blinds:
  sb: 5
  bb: 10
seats:
  - { label: "Hi Hand", stack: 1000 }
  - { label: "Lo Hand", stack: 1000 }
events:
  - deal_hole:
      0: [Ac, Kc, Qc, Jc]
      1: [Ad, 2s, 3s, 4s]
  # HU preflop: seat0 calls
  - action: { seat: 0, type: call, amount: 5 }
  - action: { seat: 1, type: check }
  # Flop
  - street_advance: flop
  - deal_community: [Kh, 5d, 6h]
  - action: { seat: 1, type: check }
  - action: { seat: 0, type: check }
  # Turn
  - street_advance: turn
  - deal_community: [7d]
  - action: { seat: 1, type: check }
  - action: { seat: 0, type: check }
  # River
  - street_advance: river
  - deal_community: [8c]
  - action: { seat: 1, type: check }
  - action: { seat: 0, type: check }
  # seat0 wins hi (top pair + nut flush draw), seat1 wins lo (A2345 wheel)
  # Pot splits: each wins half
  - pot_awarded: { 0: 10, 1: 10 }
  - hand_end: true
expectations:
  hand_ended: true
