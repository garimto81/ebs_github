# Scenario 10: Pineapple — players receive 3 cards, discard 1 before flop
# dealer=seat0(HU), seat1=BB
# Each player discards one hole card after preflop betting
variant: pineapple
dealer: 0
blinds:
  sb: 5
  bb: 10
seats:
  - { label: "Hero", stack: 1000 }
  - { label: "Villain", stack: 1000 }
events:
  - deal_hole:
      0: [As, Kh, 2d]
      1: [Qd, Qc, 3s]
  # HU preflop: seat0 raises
  - action: { seat: 0, type: raise, amount: 30 }
  - action: { seat: 1, type: call, amount: 20 }
  # Discard phase — each player discards 1 card
  - pineapple_discard: { seat: 0, card: 2d }
  - pineapple_discard: { seat: 1, card: 3s }
  # Flop
  - street_advance: flop
  - deal_community: [Ac, Qh, Jd]
  - action: { seat: 1, type: check }
  - action: { seat: 0, type: bet, amount: 40 }
  - action: { seat: 1, type: call, amount: 40 }
  # Turn
  - street_advance: turn
  - deal_community: [Th]
  - action: { seat: 1, type: check }
  - action: { seat: 0, type: check }
  # River
  - street_advance: river
  - deal_community: [4c]
  - action: { seat: 1, type: check }
  - action: { seat: 0, type: check }
  # seat0 wins (AK vs QQ, pair of aces beats pair of queens)
  - pot_awarded: { 0: 140 }
  - hand_end: true
expectations:
  hand_ended: true
  pot_total: 0
  community_count: 5
  stacks:
    0: 1070    # 1000 - 25 - 40 + 140 (wait: -5 SB, -25 raise incr, -40 bet + 140)
    1: 930     # 1000 - 10 - 20 - 40
