# Scenario 19: NLH Bomb Pot
# 4 players, bomb_pot amount=50, BB=20
# dealer=seat0, SB=seat1, BB=seat2
# After HandStart with bomb pot:
# - seat1 posts SB=10, seat2 posts BB=20
# - All 4 post bomb_pot=50 each: 200 total
# - pot = 10+20+200 = 230
# - Skip to flop (bomb pot skips preflop betting)
# Deal flop, then normal post-flop play
# Flop: seat1 checks, seat2 bets 100, seat3 folds, seat0 folds, seat1 folds
# seat2 wins pot = 230 + 100 = 330
# Wait - only seat2 bet 100, others folded before calling.
# pot = 230 + 100 = 330? No - only seat2 bet, others folded.
# Actually seat2 bets 100, added to pot = 230+100=330. But seat2 paid that 100.
# Then seat3, seat0, seat1 fold. seat2 wins 330.
# Stacks after bomb pot posting:
#   seat0: 1000-50=950, seat1: 1000-10-50=940, seat2: 1000-20-50=930, seat3: 1000-50=950
# After seat2 bets 100: seat2: 930-100=830
# seat2 wins 330: 830+330=1160
# Final: seat0=950, seat1=940, seat2=1160, seat3=950
# Check: 950+940+1160+950 = 4000 ✓
variant: nlh
dealer: 0
blinds:
  sb: 10
  bb: 20
config:
  bomb_pot_enabled: true
  bomb_pot_amount: 50
seats:
  - { label: "BTN", stack: 1000 }
  - { label: "SB", stack: 1000 }
  - { label: "BB", stack: 1000 }
  - { label: "UTG", stack: 1000 }
events:
  - deal_hole:
      0: [7h, 2c]
      1: [8d, 3c]
      2: [As, Kh]
      3: [9s, 4d]
  # Bomb pot: skip preflop, start on flop
  - deal_community: [Ah, 7d, 2s]
  # Post-flop: first to act after dealer (seat1)
  - action: { seat: 1, type: check }
  - action: { seat: 2, type: bet, amount: 100 }
  - action: { seat: 3, type: fold }
  - action: { seat: 0, type: fold }
  - action: { seat: 1, type: fold }
  # seat2 wins
  - pot_awarded: { 2: 330 }
  - hand_end: true
expectations:
  hand_ended: true
  pot_total: 0
  stacks:
    0: 950
    1: 940
    2: 1160
    3: 950
