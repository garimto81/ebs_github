# Scenario 05: NLH — SB calls, BB exercises option (checks), then flop
# dealer=seat0, SB=seat1, BB=seat2
# seat0(UTG) calls, seat1(SB) calls, seat2(BB) checks option
variant: nlh
dealer: 0
blinds:
  sb: 5
  bb: 10
seats:
  - { label: "UTG", stack: 1000 }
  - { label: "SB", stack: 1000 }
  - { label: "BB", stack: 1000 }
events:
  - deal_hole:
      0: [As, Kh]
      1: [Td, 9c]
      2: [7h, 6d]
  # Preflop: UTG calls, SB calls, BB checks option
  - action: { seat: 0, type: call, amount: 10 }
  - action: { seat: 1, type: call, amount: 5 }
  - action: { seat: 2, type: check }
  # Flop
  - street_advance: flop
  - deal_community: [Ac, Ks, Qh]
  - action: { seat: 1, type: check }
  - action: { seat: 2, type: check }
  - action: { seat: 0, type: bet, amount: 20 }
  - action: { seat: 1, type: fold }
  - action: { seat: 2, type: fold }
  # seat0 wins
  - pot_awarded: { 0: 50 }
  - hand_end: true
expectations:
  hand_ended: true
