# Scenario 29: Pot Limit Hold'em — pot-limit raise
# 3 players, SB=10, BB=20
# dealer=seat0, SB=seat1, BB=seat2
# Preflop: pot=30 (10+20)
# seat0(UTG) pot-raises: call 20 + pot after call = 20+30+20=70. Raise to 70.
# seat0 cost=70, stack=930. pot=30+70=100.
# seat1 folds (stack=990), seat2 calls 50 (needs 70-20=50, stack=980-50=930)
# pot=100+50=150.
# Flop: seat2 checks, seat0 bets pot (150), stack=930-150=780. pot=150+150=300.
# seat2 folds. seat0 wins 300.
# Final: seat0=780+300=1080, seat1=990, seat2=930.
# Check: 1080+990+930 = 3000 ✓
variant: plh
dealer: 0
blinds:
  sb: 10
  bb: 20
seats:
  - { label: "BTN", stack: 1000 }
  - { label: "SB", stack: 1000 }
  - { label: "BB", stack: 1000 }
events:
  - deal_hole:
      0: [As, Kh]
      1: [8d, 3c]
      2: [Qd, Qc]
  # Preflop: UTG pot-raises to 70
  - action: { seat: 0, type: raise, amount: 70 }
  - action: { seat: 1, type: fold }
  - action: { seat: 2, type: call, amount: 50 }
  # Flop: pot=150, seat0 bets pot-sized (150)
  - street_advance: flop
  - deal_community: [Ah, 7d, 2c]
  - action: { seat: 2, type: check }
  - action: { seat: 0, type: bet, amount: 150 }
  - action: { seat: 2, type: fold }
  # seat0 wins
  - pot_awarded: { 0: 300 }
  - hand_end: true
expectations:
  hand_ended: true
  pot_total: 0
  stacks:
    0: 1080
    1: 990
    2: 930
