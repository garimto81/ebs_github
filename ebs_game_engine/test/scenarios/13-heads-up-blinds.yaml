# Scenario 13: Heads-Up blind structure
# BTN=seat0=SB, seat1=BB. In HU, BTN/SB acts first preflop, BB acts last.
# seat0 calls, seat1 raises, seat0 calls.
variant: nlh
dealer: 0
blinds:
  sb: 5
  bb: 10
seats:
  - { label: "BTN/SB", stack: 1000 }
  - { label: "BB", stack: 1000 }
events:
  - deal_hole:
      0: [As, Kh]
      1: [Qd, Qc]
  # HU preflop: BTN/SB acts first
  - action: { seat: 0, type: call, amount: 5 }
  - action: { seat: 1, type: raise, amount: 30 }
  - action: { seat: 0, type: call, amount: 20 }
  # Flop — BB acts first postflop in HU
  - street_advance: flop
  - deal_community: [Ah, 7d, 2c]
  - action: { seat: 1, type: check }
  - action: { seat: 0, type: bet, amount: 30 }
  - action: { seat: 1, type: fold }
  # seat0 wins
  - pot_awarded: { 0: 60 }
  - hand_end: true
expectations:
  hand_ended: true
