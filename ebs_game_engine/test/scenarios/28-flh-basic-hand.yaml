# Scenario 28: Fixed Limit Hold'em ($2/$4) basic hand
# 3 players, SB=1, BB=2, smallBet=2, bigBet=4
# dealer=seat0, SB=seat1, BB=seat2
# Preflop (small bet=2): seat0 raises to 4, seat1 folds, seat2 calls 2
# pot = 1+2+4+2 = 9
# Flop (small bet=2): seat2 bets 2, seat0 raises to 4, seat2 calls 2
# pot = 9+2+4+2 = 17
# Turn (big bet=4): seat2 checks, seat0 bets 4, seat2 calls 4
# pot = 17+4+4 = 25
# River (big bet=4): seat2 checks, seat0 bets 4, seat2 calls 4
# pot = 25+4+4 = 33
# Showdown: seat0 wins
# Final: seat0=1000-4-4-4-4+33=1017, seat1=999, seat2=1000-2-2-2-4-4=986
# Wait let me recalculate.
# seat0: posted 0 blind. Preflop raise 4 (stack 996). Flop raise to 4, but already put 2+2? No.
# FL: preflop. seat0 is UTG (3-player). seat0 raises to 4 (costs 4). seat1 folds SB=1. seat2 calls: BB=2, needs 2 more.
# pot = 1 + 2 + 4 + 2 = 9. seat0=996, seat1=999, seat2=996.
# Flop: seat2 bets 2 (stack=994), seat0 raises to 4 (stack=996-4=992? No. currentBet resets.)
# Wait — after street advance, currentBet resets to 0.
# Flop: seat2 bets 2 (cost=2, stack=996-2=994), seat0 raises to 4 (cost=4, stack=996-4=992), seat2 calls 2 more (stack=994-2=992)
# pot = 9 + 2 + 4 + 2 = 17. seat0=992, seat2=992.
# Turn: seat2 checks, seat0 bets 4 (stack=992-4=988), seat2 calls 4 (stack=992-4=988)
# pot = 17 + 4 + 4 = 25. seat0=988, seat2=988.
# River: seat2 checks, seat0 bets 4 (stack=988-4=984), seat2 calls 4 (stack=988-4=984)
# pot = 25 + 4 + 4 = 33. seat0=984, seat2=984.
# pot_awarded: seat0 gets 33. seat0=984+33=1017.
# Final: seat0=1017, seat1=999, seat2=984.
# Check: 1017+999+984 = 3000 ✓
variant: flh
dealer: 0
blinds:
  sb: 1
  bb: 2
seats:
  - { label: "BTN", stack: 1000 }
  - { label: "SB", stack: 1000 }
  - { label: "BB", stack: 1000 }
events:
  - deal_hole:
      0: [As, Kh]
      1: [8d, 3c]
      2: [Qd, Qc]
  # Preflop (small bet=2): UTG=seat0 raises, SB folds, BB calls
  - action: { seat: 0, type: raise, amount: 4 }
  - action: { seat: 1, type: fold }
  - action: { seat: 2, type: call, amount: 2 }
  # Flop (small bet=2)
  - street_advance: flop
  - deal_community: [Ah, 7d, 2c]
  - action: { seat: 2, type: bet, amount: 2 }
  - action: { seat: 0, type: raise, amount: 4 }
  - action: { seat: 2, type: call, amount: 2 }
  # Turn (big bet=4)
  - street_advance: turn
  - deal_community: [9s]
  - action: { seat: 2, type: check }
  - action: { seat: 0, type: bet, amount: 4 }
  - action: { seat: 2, type: call, amount: 4 }
  # River (big bet=4)
  - street_advance: river
  - deal_community: [3s]
  - action: { seat: 2, type: check }
  - action: { seat: 0, type: bet, amount: 4 }
  - action: { seat: 2, type: call, amount: 4 }
  # Showdown: seat0 wins with top pair AK
  - pot_awarded: { 0: 33 }
  - hand_end: true
expectations:
  hand_ended: true
  pot_total: 0
  community_count: 5
  stacks:
    0: 1017
    1: 999
    2: 984
