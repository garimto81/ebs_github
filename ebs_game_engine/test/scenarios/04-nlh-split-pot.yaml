# Scenario 04: NLH split pot — board makes the best hand, both players split
# dealer=seat0(HU: seat0=SB/BTN, seat1=BB)
# Board: Ah Kd Qc Js Th — Broadway straight on board, both players split
variant: nlh
dealer: 0
blinds:
  sb: 5
  bb: 10
seats:
  - { label: "Hero", stack: 1000 }
  - { label: "Villain", stack: 1000 }
events:
  - deal_hole:
      0: [2s, 3h]
      1: [4d, 5c]
  # Heads-up preflop: seat0(BTN/SB) acts first
  - action: { seat: 0, type: call, amount: 5 }
  - action: { seat: 1, type: check }
  # Flop
  - street_advance: flop
  - deal_community: [Ah, Kd, Qc]
  - action: { seat: 1, type: check }
  - action: { seat: 0, type: check }
  # Turn
  - street_advance: turn
  - deal_community: [Js]
  - action: { seat: 1, type: check }
  - action: { seat: 0, type: check }
  # River
  - street_advance: river
  - deal_community: [Th]
  - action: { seat: 1, type: check }
  - action: { seat: 0, type: check }
  # Split pot — each gets half
  - pot_awarded: { 0: 10, 1: 10 }
  - hand_end: true
expectations:
  hand_ended: true
  pot_total: 0
  community_count: 5
  stacks:
    0: 1000    # 1000 - 10 + 10 (split)
    1: 1000    # 1000 - 10 + 10 (split)
