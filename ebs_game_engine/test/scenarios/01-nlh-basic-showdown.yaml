# Scenario 01: NLH basic hand to river — Hero (AK) vs Villain (QQ), third player folds preflop
# 3 players: dealer=seat0, SB=seat1, BB=seat2
# Preflop action: seat0(UTG) raises, seat1(SB) folds, seat2(BB) calls
# Board: Qs Jd Th 9c 2d → Hero makes straight (AKQJTh... wait: A K Q J T = Broadway)
variant: nlh
dealer: 0
blinds:
  sb: 5
  bb: 10
seats:
  - { label: "Hero", stack: 1000 }
  - { label: "Villain", stack: 1000 }
  - { label: "Fish", stack: 1000 }
events:
  - deal_hole:
      0: [As, Kh]
      1: [Qd, Qc]
      2: [7h, 2c]
  # Preflop: seat0 acts first (UTG), seat1=SB, seat2=BB
  - action: { seat: 0, type: raise, amount: 30 }
  - action: { seat: 1, type: fold }
  - action: { seat: 2, type: call, amount: 20 }
  # Flop
  - street_advance: flop
  - deal_community: [Qs, Jd, Th]
  - action: { seat: 2, type: check }
  - action: { seat: 0, type: bet, amount: 40 }
  - action: { seat: 2, type: call, amount: 40 }
  # Turn
  - street_advance: turn
  - deal_community: [9c]
  - action: { seat: 2, type: check }
  - action: { seat: 0, type: bet, amount: 80 }
  - action: { seat: 2, type: call, amount: 80 }
  # River
  - street_advance: river
  - deal_community: [2d]
  - action: { seat: 2, type: check }
  - action: { seat: 0, type: check }
  # Showdown — Hero (AK) has Broadway straight, Villain (QQ) has trips
  - pot_awarded: { 0: 305 }
  - hand_end: true
expectations:
  hand_ended: true
  pot_total: 0
  community_count: 5
  stacks:
    0: 1155    # 1000 - 30 - 40 - 80 + 305
    1: 995     # 1000 - 5 (folded SB)
    2: 850     # 1000 - 10 - 20 - 40 - 80
  seat_statuses:
    1: folded
