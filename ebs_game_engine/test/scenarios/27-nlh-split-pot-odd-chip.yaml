# Actually, the simplest demonstration: create a pot where 2 players split with an odd amount.
# We handle this entirely through pot_awarded values.
# Pot = 15 (blinds). seat0 bets 3, seat1 calls 3. pot=21. Split: 11 to seat nearest dealer, 10 to other.
# Let's keep it very simple: 3 players, one folds preflop, remaining check to showdown.
# dealer=seat0, SB=seat1, BB=seat2
# seat0 raises 25, seat1 folds, seat2 calls 15
# pot = 5 + 10 + 25 + 15 = 55. Odd! Split: 28 and 27 (odd chip left of dealer → seat2)
# After: seat0=1000-25+27=1002, seat1=995, seat2=1000-10-15+28=1003
# Check: 1002+995+1003 = 3000 ✓
variant: nlh
dealer: 0
blinds:
  sb: 5
  bb: 10
seats:
  - { label: "Hero", stack: 1000 }
  - { label: "SB", stack: 1000 }
  - { label: "BB", stack: 1000 }
events:
  - deal_hole:
      0: [2s, 3h]
      1: [8d, 7c]
      2: [4d, 5c]
  - action: { seat: 0, type: raise, amount: 25 }
  - action: { seat: 1, type: fold }
  - action: { seat: 2, type: call, amount: 15 }
  # Flop
  - street_advance: flop
  - deal_community: [Ah, Kd, Qc]
  - action: { seat: 2, type: check }
  - action: { seat: 0, type: check }
  # Turn
  - street_advance: turn
  - deal_community: [Js]
  - action: { seat: 2, type: check }
  - action: { seat: 0, type: check }
  # River
  - street_advance: river
  - deal_community: [Th]
  - action: { seat: 2, type: check }
  - action: { seat: 0, type: check }
  # Broadway on board — split pot. 55 total.
  # Odd chip to seat nearest left of dealer → seat2 gets 28, seat0 gets 27
  - pot_awarded: { 0: 27, 2: 28 }
  - hand_end: true
expectations:
  hand_ended: true
  pot_total: 0
  community_count: 5
  stacks:
    0: 1002
    1: 995
    2: 1003
