# Scenario 24: NLH Timeout Fold
# 3 players, mid-hand timeout fold behaves same as regular fold
# dealer=seat0, SB=seat1, BB=seat2
# Preflop: seat0 raises 30, seat1 timeout_folds, seat2 folds
# pot = 5+10+30 = 45 → seat0 wins 45
# Final: seat0=1000-30+45=1015, seat1=995, seat2=990
# Check: 1015+995+990 = 3000 ✓
variant: nlh
dealer: 0
blinds:
  sb: 5
  bb: 10
seats:
  - { label: "Hero", stack: 1000 }
  - { label: "Timeout", stack: 1000 }
  - { label: "BB", stack: 1000 }
events:
  - deal_hole:
      0: [As, Kh]
      1: [Qd, Qc]
      2: [7h, 2c]
  # Preflop: seat0 raises, seat1 times out (fold), seat2 folds
  - action: { seat: 0, type: raise, amount: 30 }
  - timeout_fold: { seat: 1 }
  - action: { seat: 2, type: fold }
  # seat0 wins
  - pot_awarded: { 0: 45 }
  - hand_end: true
expectations:
  hand_ended: true
  pot_total: 0
  stacks:
    0: 1015
    1: 995
    2: 990
  seat_statuses:
    1: folded
    2: folded
