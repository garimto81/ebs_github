# Scenario 16: NLH with Standard Ante (type 0)
# 4 players, ante=5 per player, BB=20, SB=10
# dealer=seat0, SB=seat1, BB=seat2, UTG=seat3
# All 4 post ante=5 (total=20 in antes) + SB=10 + BB=20 = pot 50
# Preflop: seat3 raises to 60, seat1 folds, seat2 calls 40, seat0 folds
# Flop: seat2 checks, seat3 bets 80, seat2 folds
# seat3 wins pot = 50 + 60 + 40 = 150 (initial pot + raises)
# Actually: pot = 20(antes) + 10(SB) + 20(BB) + 60(seat3 raise) + 40(seat2 call) = 150
# But seat3 posted 5 ante + 60 raise = 65 total out. seat2 posted 5 ante + 20 BB + 40 call = 65.
# Wait, let me recalculate. After HandStart:
# - All 4 post ante=5: stacks become 995 each, pot += 20
# - seat1 posts SB=10: stack=985, pot=30
# - seat2 posts BB=20: stack=975, pot=50
# Preflop action (UTG=seat3 first):
# - seat3 raises to 60: stack=995-60=935, currentBet=60, pot=50+60=110
# - seat0 folds: stack=995
# - seat1 folds: stack=985
# - seat2 calls 40 (needs 60-20=40): stack=975-40=935, pot=110+40=150
# Flop:
# - seat2 checks
# - seat3 bets 80: stack=935-80=855, pot=150+80=230
# - seat2 folds
# pot_awarded: seat3 gets 230
# Final: seat0=995, seat1=985, seat2=935, seat3=855+230=1085
# Check: 995+985+935+1085 = 4000 ✓
variant: nlh
dealer: 0
blinds:
  sb: 10
  bb: 20
config:
  ante_type: 0
  ante_amount: 5
seats:
  - { label: "BTN", stack: 1000 }
  - { label: "SB", stack: 1000 }
  - { label: "BB", stack: 1000 }
  - { label: "UTG", stack: 1000 }
events:
  - deal_hole:
      0: [7h, 2c]
      1: [8d, 3c]
      2: [9s, 4d]
      3: [As, Kh]
  # Preflop: UTG (seat3) acts first
  - action: { seat: 3, type: raise, amount: 60 }
  - action: { seat: 0, type: fold }
  - action: { seat: 1, type: fold }
  - action: { seat: 2, type: call, amount: 40 }
  # Flop
  - street_advance: flop
  - deal_community: [Ah, 7d, 2s]
  - action: { seat: 2, type: check }
  - action: { seat: 3, type: bet, amount: 80 }
  - action: { seat: 2, type: fold }
  # seat3 wins
  - pot_awarded: { 3: 230 }
  - hand_end: true
expectations:
  hand_ended: true
  pot_total: 0
  stacks:
    0: 995
    1: 985
    2: 935
    3: 1085
