# Scenario 23: NLH Dealer Rotation across 2 hands
# 3 players, verify dealer moves from 0→1 after first hand
# Hand 1: dealer=0, SB=seat1, BB=seat2
# Preflop: seat0(UTG) raises 30, seat1 folds, seat2 folds
# pot = 5+10+30 = 45 → seat0 wins 45
# HandEnd: dealer moves to seat1, handNumber=1
# Hand 2: dealer=1, SB=seat2, BB=seat0
# Use hand_start event for second hand
# Preflop: seat1(UTG) raises 30, seat2 folds, seat0 folds
# pot = 5+10+30 = 45 → seat1 wins 45
# HandEnd: dealer moves to seat2, handNumber=2
#
# After Hand 1: seat0=1000-30+45=1015, seat1=995, seat2=990
# After Hand 2: seat0=1015-10=1005, seat1=995-30+45=1010, seat2=990-5=985
# Check: 1005+1010+985 = 3000 ✓
variant: nlh
dealer: 0
blinds:
  sb: 5
  bb: 10
seats:
  - { label: "Seat0", stack: 1000 }
  - { label: "Seat1", stack: 1000 }
  - { label: "Seat2", stack: 1000 }
events:
  # === Hand 1 ===
  - deal_hole:
      0: [As, Kh]
      1: [Qd, Qc]
      2: [7h, 2c]
  - action: { seat: 0, type: raise, amount: 30 }
  - action: { seat: 1, type: fold }
  - action: { seat: 2, type: fold }
  - pot_awarded: { 0: 45 }
  - hand_end: true
  # === Hand 2 === dealer is now seat1
  - hand_start: { dealer: 1, blinds: { 2: 5, 0: 10 } }
  - deal_hole:
      0: [Jd, Tc]
      1: [Ah, Kd]
      2: [8s, 3d]
  - action: { seat: 1, type: raise, amount: 30 }
  - action: { seat: 2, type: fold }
  - action: { seat: 0, type: fold }
  - pot_awarded: { 1: 45 }
  - hand_end: true
expectations:
  hand_ended: true
  hand_number: 2
  dealer_seat: 2
  pot_total: 0
  stacks:
    0: 1005
    1: 1010
    2: 985
