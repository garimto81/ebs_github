# Scenario 07: Omaha — player must use exactly 2 hole cards
# Board has 4 hearts, but player has only 1 heart in hole cards
# Tests that mustUseHole=2 rule is enforced
# dealer=seat0, SB=seat1, BB=seat2
variant: omaha
dealer: 0
blinds:
  sb: 5
  bb: 10
seats:
  - { label: "Hero", stack: 1000 }
  - { label: "Villain", stack: 1000 }
  - { label: "Fish", stack: 1000 }
events:
  - deal_hole:
      0: [As, Kd, Qh, Jc]
      1: [2h, 3d, 4s, 5c]
      2: [6h, 7d, 8s, 9c]
  # Preflop: seat0(UTG) calls, SB calls, BB checks
  - action: { seat: 0, type: call, amount: 10 }
  - action: { seat: 1, type: call, amount: 5 }
  - action: { seat: 2, type: check }
  # Flop: 3 hearts
  - street_advance: flop
  - deal_community: [Th, 9h, 8h]
  - action: { seat: 1, type: check }
  - action: { seat: 2, type: check }
  - action: { seat: 0, type: check }
  # Turn: 4th heart
  - street_advance: turn
  - deal_community: [7h]
  - action: { seat: 1, type: check }
  - action: { seat: 2, type: check }
  - action: { seat: 0, type: check }
  # River
  - street_advance: river
  - deal_community: [2d]
  - action: { seat: 1, type: check }
  - action: { seat: 2, type: check }
  - action: { seat: 0, type: check }
  # Villain (2h3d) has best hand using must-use-2 rule
  - pot_awarded: { 1: 30 }
  - hand_end: true
expectations:
  hand_ended: true
  pot_total: 0
  community_count: 5
  stacks:
    0: 990     # 1000 - 10
    1: 1020    # 1000 - 5 - 5 + 30 (won with must-use-2)
    2: 990     # 1000 - 10
