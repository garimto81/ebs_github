# M5 Quickstart_Local_Cluster — 30분 내 multi-instance EBS BO + Redis + PostgreSQL 기동
# 신규 입사자가 분산 인증 동작 (blacklist propagation, multi-device session) 을 로컬에서
# 직접 관찰하기 위한 최소 셋업. Production 토폴로지는 M8 Production_Deployment.md 참조.
#
# Usage (team2-backend 디렉토리에서):
#   docker compose -f docker-compose.cluster.yml up -d --build
#   docker compose -f docker-compose.cluster.yml ps
#   docker compose -f docker-compose.cluster.yml down -v   # cleanup
#
# 노출 포트:
#   8001 — BO worker A
#   8002 — BO worker B
#   5432 — PostgreSQL
#   6379 — Redis (single node, dev 용. M8 production 은 cluster)

services:
  postgres:
    image: postgres:15-alpine
    container_name: ebs-quickstart-pg
    environment:
      POSTGRES_DB: ebs
      POSTGRES_USER: ebs
      POSTGRES_PASSWORD: ebs_local_dev
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ebs"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pg-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ebs-quickstart-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  bo-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ebs-quickstart-bo-1
    environment:
      DATABASE_URL: postgresql://ebs:ebs_local_dev@postgres:5432/ebs
      REDIS_URL: redis://redis:6379
      AUTH_PROFILE: dev
      JWT_SECRET: quickstart-local-dev-secret-do-not-use-in-prod
      WORKER_ID: bo-1
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  bo-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ebs-quickstart-bo-2
    environment:
      DATABASE_URL: postgresql://ebs:ebs_local_dev@postgres:5432/ebs
      REDIS_URL: redis://redis:6379
      AUTH_PROFILE: dev
      JWT_SECRET: quickstart-local-dev-secret-do-not-use-in-prod
      WORKER_ID: bo-2
    ports:
      - "8002:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pg-data:
